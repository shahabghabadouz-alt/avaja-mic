<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AVAJA · Mirror Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#080b10;color:#b8cce0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;overflow:hidden;user-select:none;}
#canvas{position:fixed;inset:0;pointer-events:none;}
#bar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.05);}
#bar-title{font-size:9px;letter-spacing:.28em;color:rgba(140,170,200,.45);text-transform:uppercase;}
#mic-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(140,180,220,.3);background:transparent;color:rgba(140,180,220,.7);font-size:16px;cursor:pointer;}
#mic-btn.on{border-color:rgba(100,210,150,.7);color:rgba(100,220,160,.9);}
#mic-status{font-size:8px;letter-spacing:.1em;color:rgba(100,140,170,.4);}
/* note display */
#note-display{position:fixed;top:52px;left:0;right:0;height:80px;display:flex;align-items:center;justify-content:center;gap:0;}
#note-name{font-size:52px;font-weight:100;color:rgba(160,190,255,.12);transition:color .06s;}
#note-name.on{color:rgba(185,215,255,.85);}
#note-info{font-size:9px;letter-spacing:.2em;color:rgba(100,130,180,.28);align-self:flex-end;padding-bottom:12px;margin-left:6px;transition:color .06s;}
#note-info.on{color:rgba(140,170,220,.60);}
/* ring */
#ring-wrap{position:fixed;top:132px;left:0;right:0;bottom:180px;display:flex;align-items:center;justify-content:center;}
#ring{position:relative;width:280px;height:280px;}
.nb{position:absolute;width:48px;height:48px;border-radius:50%;border:1px solid rgba(140,180,220,.22);background:rgba(10,15,30,.8);color:rgba(170,200,230,.8);font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .08s,box-shadow .08s;}
.nb.dc{width:62px;height:62px;font-size:12px;border-color:rgba(180,220,255,.4);}
.nb.heard{border-color:rgba(100,220,160,.9)!important;box-shadow:0 0 16px rgba(60,200,130,.5)!important;}
.nb.playing{border-color:rgba(140,190,255,.8)!important;box-shadow:0 0 14px rgba(100,160,255,.35)!important;}
/* sliders */
#sliders{position:fixed;bottom:52px;left:0;right:0;display:flex;gap:20px;padding:12px 20px;}
.sw{flex:1;display:flex;flex-direction:column;gap:5px;}
.sl{font-size:8px;letter-spacing:.18em;color:rgba(120,155,190,.38);text-transform:uppercase;}
input[type=range]{width:100%;height:2px;-webkit-appearance:none;background:rgba(140,180,220,.2);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:rgba(160,200,255,.7);}
.sv{font-size:9px;color:rgba(140,175,210,.5);text-align:center;}
/* bottom */
#bottom{position:fixed;bottom:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-top:1px solid rgba(255,255,255,.05);}
#heard{font-size:11px;letter-spacing:.15em;color:rgba(100,200,150,.7);}
#fade-btn{font-size:8px;letter-spacing:.12em;color:rgba(180,140,80,.45);text-transform:uppercase;padding:5px 10px;border:1px solid rgba(180,130,60,.16);border-radius:4px;cursor:pointer;background:transparent;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="bar">
  <div id="bar-title">AVAJA · MIRROR PRO</div>
  <div id="mic-status">off</div>
  <button id="mic-btn" onclick="toggleMic()">🎤</button>
</div>

<div id="note-display">
  <div id="note-name">—</div>
  <div id="note-info">— Hz</div>
</div>

<div id="ring-wrap"><div id="ring"></div></div>

<div id="sliders">
  <div class="sw"><div class="sl">Vol</div><input type="range" id="svol" min="10" max="100" value="70" oninput="document.getElementById('vval').textContent=this.value"><div class="sv" id="vval">70</div></div>
  <div class="sw"><div class="sl">Reverb</div><input type="range" id="srvb" min="0" max="100" value="55" oninput="document.getElementById('rval').textContent=this.value"><div class="sv" id="rval">55</div></div>
  <div class="sw"><div class="sl">Sustain</div><input type="range" id="ssus" min="1" max="12" value="5" oninput="document.getElementById('sval').textContent=this.value+'s'"><div class="sv" id="sval">5s</div></div>
</div>

<div id="bottom">
  <div id="heard"></div>
  <button id="fade-btn" onclick="killPadNow()">Fade</button>
</div>

<script>
// ── Notes — same as working presence lab ──────────────────────────────
var SC=[
  {f:123.47,n:'B2'},{f:146.83,n:'D3'},{f:164.81,n:'E3'},
  {f:185.00,n:'F#3'},{f:207.65,n:'G#3'},{f:220.00,n:'A3'},
  {f:246.94,n:'B3'},{f:277.18,n:'C#4'},{f:293.66,n:'D4'},
  {f:329.63,n:'E4'},{f:369.99,n:'F#4'},{f:415.30,n:'G#4'},
  {f:440.00,n:'A4'},{f:493.88,n:'B4'},{f:554.37,n:'C#5'},
  {f:587.33,n:'D5'},{f:659.25,n:'E5'}
];
var DING=1;
var ac,mg,rv,rvG,sbus,nbEls=[];

function gV(){return+document.getElementById('svol').value/100;}
function gR(){return+document.getElementById('srvb').value/100;}
function gSus(){return+document.getElementById('ssus').value;}

// ── Audio init — EXACT from working presence lab ───────────────────────
function ia(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
  ac.resume();
  mg=ac.createGain();mg.gain.value=1;mg.connect(ac.destination);
  var sr=ac.sampleRate,ln=sr*4,b=ac.createBuffer(2,ln,sr);
  for(var c=0;c<2;c++){var d=b.getChannelData(c);for(var i=0;i<ln;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/ln,2.2);}
  rv=ac.createConvolver();rv.buffer=b;
  rvG=ac.createGain();rvG.gain.value=0.5;rv.connect(rvG);rvG.connect(mg);
  sbus=ac.createGain();sbus.gain.value=1;sbus.connect(mg);
}
function sr2(g,a){var rg=ac.createGain();rg.gain.value=a;g.connect(rg);rg.connect(rv);}
function dF(f){return Math.max(1.5,4*Math.pow(220/f,0.6));}

// ── Sound functions — EXACT from working presence lab ─────────────────
function sOpen(f,v,r,t){
  var dec=dF(f)*gD(),atk=Math.max(.018,.03*Math.pow(440/f,.3));
  var g=ac.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+atk);
  g.gain.setTargetAtTime(v*.5,t+atk,dec*.15);g.gain.setTargetAtTime(.001,t+dec*.65,dec*.5);
  g.connect(mg);sr2(g,r*.7);
  var HP=[[1,.58],[1.002,.16],[2.004,.11],[3.009,.045],[0.5,.07]];
  HP.forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=f*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+2);});
  var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=.7;lfg.gain.value=.06;lfo.connect(lfg);lfg.connect(g.gain);lfo.start(t);lfo.stop(t+dec+2);
}
function gD(){return 1.0;} // fixed decay for pad

// ── Pad — smooth crossfading mirror pad ───────────────────────────────
var curPadG=null,curPadO=[],curPadIdx=-1;

function killPad(xf){
  if(!curPadG||!ac)return;
  var t=ac.currentTime;
  curPadG.gain.cancelScheduledValues(t);
  curPadG.gain.setValueAtTime(curPadG.gain.value,t);
  curPadG.gain.linearRampToValueAtTime(0,t+xf);
  var os=curPadO.slice(),pi=curPadIdx;
  curPadG=null;curPadO=[];curPadIdx=-1;
  setTimeout(function(){
    os.forEach(function(o){try{o.stop();}catch(e){}});
    if(pi>=0&&nbEls[pi])nbEls[pi].classList.remove('playing');
  },(xf+.4)*1000);
}
function killPadNow(){ia();killPad(1.5);}

function playPad(idx,velocity){
  var f=SC[idx].f;
  var v=gV()*velocity;
  var r=gR();
  var sus=gSus();
  // velocity-based crossfade
  var xf=velocity>0.55?0.12:0.80;
  killPad(xf);
  var t=ac.currentTime;
  var atk=Math.min(0.35,sus*0.06);
  var pv=v*0.78;
  var G=ac.createGain();
  G.gain.setValueAtTime(0,t);
  G.gain.linearRampToValueAtTime(pv,t+atk);
  G.gain.setTargetAtTime(pv*0.68,t+atk,sus*0.22);
  G.gain.setTargetAtTime(.001,t+atk+sus,sus*0.25);
  G.connect(mg);sr2(G,r*0.80);
  var os=[];
  // Use exact same HP partials as working lab
  var HP=[[1,.52],[1.002,.14],[2.004,.20],[3.009,.08],[0.5,.06]];
  HP.forEach(function(p){
    var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];
    o.type='sine';o.frequency.value=f*p[0];o.detune.value=(Math.random()-.5)*3;
    o.connect(og);og.connect(G);o.start(t);o.stop(t+atk+sus+xf+2);os.push(o);
  });
  // slow LFO breath
  var lf=ac.createOscillator(),lg=ac.createGain();
  lf.type='sine';lf.frequency.value=0.07;lg.gain.value=0.032;
  lf.connect(lg);lg.connect(G.gain);
  lf.start(t);lf.stop(t+atk+sus+xf+2);os.push(lf);
  curPadG=G;curPadO=os;curPadIdx=idx;
  // ring highlight
  nbEls.forEach(function(e){e.classList.remove('playing');});
  if(nbEls[idx])nbEls[idx].classList.add('playing');
  setTimeout(function(){if(curPadIdx===idx&&nbEls[idx])nbEls[idx].classList.remove('playing');},(atk+sus+.5)*1000);
}

// ── Manual play ───────────────────────────────────────────────────────
function play(idx){
  ia();
  playPad(idx,1.0);
  fl(nbEls[idx]);
  rpl(SC[idx].f);
}

// ── Canvas ────────────────────────────────────────────────────────────
var cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
var W,H,CX,CY;
function sz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;CX=W/2;CY=H/2;}
window.addEventListener('resize',sz);sz();
var rps=[],rng2=[];
for(var i=0;i<4;i++)rng2.push({r:70+i*55,ph:i*.9,sp:.0002+i*.00015});
function rpl(f){var h=Math.round(180+120*(f-120)/(660-120));rps.push({r:60,op:.55,sp:3.5,col:'hsla('+h+',60%,70%,'});}
function df(){
  requestAnimationFrame(df);ctx.clearRect(0,0,W,H);
  rng2.forEach(function(r){r.ph+=r.sp;var op=.025+.012*Math.sin(r.ph);ctx.beginPath();ctx.arc(CX,CY*.55,r.r+Math.sin(r.ph*1.8)*2,0,Math.PI*2);ctx.strokeStyle='rgba(100,140,220,'+op.toFixed(3)+')';ctx.lineWidth=1;ctx.stroke();});
  rps=rps.filter(function(r){r.r+=r.sp;r.op*=.94;if(r.op<.01)return false;ctx.beginPath();ctx.arc(CX,CY*.55,r.r,0,Math.PI*2);ctx.strokeStyle=r.col+r.op.toFixed(3)+')';ctx.lineWidth=1.5;ctx.stroke();return true;});
}
df();

// ── Ring — same layout as working lab ────────────────────────────────
var ring=document.getElementById('ring');
SC.forEach(function(s,i){
  var el=document.createElement('button');el.className='nb'+(i===DING?' dc':'');el.textContent=s.n;
  if(i===DING){el.style.cssText='left:50%;top:50%;transform:translate(-50%,-50%)';}
  else{var ot=SC.length-1,j=i<DING?i:i-1,a=(j/ot)*Math.PI*2-Math.PI/2,r=115,x=50+r/2.8*Math.cos(a),y=50+r/2.8*Math.sin(a);el.style.cssText='left:'+x+'%;top:'+y+'%;transform:translate(-50%,-50%)';}
  el.addEventListener('touchstart',function(e){e.preventDefault();play(i);},{passive:false});
  el.addEventListener('mousedown',function(){play(i);});
  ring.appendChild(el);nbEls.push(el);
});
function fl(el){if(!el)return;el.style.borderColor='rgba(160,210,255,.8)';setTimeout(function(){el.style.borderColor='';},120);}
function mH(idx){nbEls.forEach(function(e){e.classList.remove('heard');});if(idx>=0&&nbEls[idx]){nbEls[idx].classList.add('heard');setTimeout(function(){if(nbEls[idx])nbEls[idx].classList.remove('heard');},1800);}}

// ── MIC — EXACT from working lab, only echo() replaced ────────────────
var mStr=null,mAn=null,mTb=null,mFb=null,mOn=false,lO=0,oH=[],FFT=8192;
var hEl=document.getElementById('heard'),mSt=document.getElementById('mic-status');
var silUntil=0;

function toggleMic(){if(!mOn)startMic();else stopMic();}

function startMic(){
  ia();
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false})
  .then(function(s){
    mStr=s;
    var src=ac.createMediaStreamSource(s);
    mAn=ac.createAnalyser();mAn.fftSize=FFT;mAn.smoothingTimeConstant=0.5;
    src.connect(mAn);
    mTb=new Float32Array(FFT);mFb=new Float32Array(mAn.frequencyBinCount);
    mOn=true;
    document.getElementById('mic-btn').classList.add('on');
    mSt.textContent='on';
    mTick();
  }).catch(function(e){mSt.textContent='denied:'+e.name;});
}

function stopMic(){
  mOn=false;
  if(mStr)mStr.getTracks().forEach(function(t){t.stop();});
  document.getElementById('mic-btn').classList.remove('on');
  mSt.textContent='off';
}

function gRMS(b){var s=0;for(var i=0;i<b.length;i++)s+=b[i]*b[i];return Math.sqrt(s/b.length);}

// HPS — EXACT from working lab
function dHPS(fd,sr){
  var bH=sr/FFT,bw=5;
  function bE(f){var b=Math.round(f/bH),e=0;for(var i=Math.max(0,b-bw);i<=Math.min(fd.length-1,b+bw);i++){var l=Math.pow(10,fd[i]/20);e+=l*l;}return Math.sqrt(e);}
  var best=-1,bs=-Infinity;
  SC.forEach(function(s,i){var sc=bE(s.f)*Math.pow(bE(s.f*2),.6)*Math.pow(bE(s.f*3),.3)*Math.pow(bE(s.f*4),.1);if(sc>bs){bs=sc;best=i;}});
  return best;
}

// Echo — replaced with pad, velocity from RMS
function echo(idx,rms){
  ia();
  // velocity from RMS
  var velocity=Math.min(1.0,Math.max(0.25,rms*12));
  var f=SC[idx].f;
  // update display
  document.getElementById('note-name').textContent=SC[idx].n.replace(/[0-9]/g,'');
  document.getElementById('note-name').classList.add('on');
  document.getElementById('note-info').textContent=SC[idx].n.replace(/[^0-9]/g,'')+' · '+f.toFixed(0)+' Hz';
  document.getElementById('note-info').classList.add('on');
  // play pad
  playPad(idx,velocity);
  mH(idx);
  hEl.textContent=SC[idx].n;setTimeout(function(){hEl.textContent='';},2000);
  rpl(f);
  // short silent window — only 800ms to allow fast playing
  silUntil=Date.now()+800;
}

// mTick — EXACT from working lab (requestAnimationFrame kept)
function mTick(){
  if(!mOn||!mAn)return;
  if(ac&&ac.state==='suspended')ac.resume();
  requestAnimationFrame(mTick);
  mAn.getFloatTimeDomainData(mTb);
  var r=gRMS(mTb);
  oH.push(r);if(oH.length>8)oH.shift();
  var avg=oH.reduce(function(a,b){return a+b;},0)/oH.length;
  var now=Date.now();
  // EXACT same condition as working lab + short silent window
  if(now>silUntil&&r>0.03&&r>avg*1.5&&now-lO>280){
    lO=now;
    var capturedR=r;
    setTimeout(function(){
      if(!mAn)return;
      mAn.getFloatFrequencyData(mFb);
      var idx=dHPS(mFb,ac.sampleRate);
      if(idx>=0)echo(idx,capturedR);
    },120);
  }
}

document.addEventListener('touchstart',function(){if(ac&&ac.state==='suspended')ac.resume();},{passive:true});
</script>
</body>
</html>
