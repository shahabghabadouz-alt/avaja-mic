<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AVAJA · Resonance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#04060a;color:#b8c8d8;
  font-family:'Helvetica Neue',Tahoma,sans-serif;overflow:hidden;user-select:none}

/* ── CANVAS ── */
#cv{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── UI ── */
#ui{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:none}

/* Logo */
#logo{position:fixed;top:18px;left:0;right:0;text-align:center;
  font-size:8px;letter-spacing:.55em;color:rgba(90,140,200,.28);text-transform:uppercase}

/* State text */
#state{font-size:10px;letter-spacing:.35em;color:rgba(140,170,200,.35);
  text-transform:uppercase;margin-bottom:14px;min-height:14px;transition:color .6s}
#state.active{color:rgba(120,200,160,.7)}

/* Detected note */
#note-ring{width:110px;height:110px;border-radius:50%;
  border:1px solid rgba(90,140,200,.12);display:flex;flex-direction:column;
  align-items:center;justify-content:center;transition:all .4s;position:relative}
#note-ring.lit{border-color:rgba(90,200,160,.55);
  box-shadow:0 0 32px rgba(90,200,160,.18)}
#note-name{font-size:34px;font-weight:100;color:rgba(90,200,160,.15);
  letter-spacing:.05em;transition:color .2s}
#note-name.lit{color:rgba(120,210,170,.9)}
#note-freq{font-size:8px;letter-spacing:.18em;color:rgba(100,140,120,.35);
  margin-top:2px;transition:color .3s}
#note-freq.lit{color:rgba(100,170,140,.6)}

/* Sub label */
#sub-label{font-size:7px;letter-spacing:.22em;color:rgba(90,130,180,.28);
  margin-top:16px;min-height:10px;transition:color .4s}
#sub-label.active{color:rgba(90,160,220,.55)}

/* Controls */
#controls{position:fixed;bottom:0;left:0;right:0;
  background:rgba(4,6,10,.9);border-top:1px solid rgba(255,255,255,.04);
  padding:12px 16px 14px;pointer-events:all}
.ctrl-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ctrl-row:last-child{margin-bottom:0}
.ctrl-lbl{font-size:7px;letter-spacing:.18em;color:rgba(100,120,150,.45);
  text-transform:uppercase;min-width:52px}
input[type=range]{flex:1;height:2px;-webkit-appearance:none;
  background:rgba(90,140,200,.12);border-radius:1px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:rgba(90,160,200,.7)}
.ctrl-val{font-size:8px;color:rgba(90,160,200,.55);min-width:32px;text-align:left}
#mic-btn{width:100%;padding:12px;border-radius:8px;
  border:1px solid rgba(90,200,160,.25);background:transparent;
  color:rgba(90,200,160,.6);font:700 10px Tahoma;letter-spacing:.2em;
  cursor:pointer;transition:all .35s;pointer-events:all}
#mic-btn.on{border-color:rgba(90,200,160,.7);background:rgba(90,200,160,.08);
  color:rgba(120,220,180,.9);box-shadow:0 0 20px rgba(90,200,160,.12)}

/* Fade hint */
#fade-hint{font-size:7px;letter-spacing:.18em;color:rgba(90,130,100,.3);
  text-align:center;margin-top:6px;min-height:10px}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="ui">
  <div id="state">میکروفن غیرفعال</div>
  <div id="note-ring">
    <div id="note-name">—</div>
    <div id="note-freq"></div>
  </div>
  <div id="sub-label"></div>
</div>

<div id="logo">AVAJA · RESONANCE</div>

<div id="controls">
  <button id="mic-btn" onclick="toggleMic()">🎙 فعال‌سازی میکروفن</button>
  <div id="fade-hint"></div>
  <div class="ctrl-row" style="margin-top:10px">
    <div class="ctrl-lbl">Sub</div>
    <input type="range" id="sl-sub" min="0" max="100" value="55"
      oninput="subVol=this.value/100;document.getElementById('v-sub').textContent=this.value+'%'">
    <div class="ctrl-val" id="v-sub">55%</div>
  </div>
  <div class="ctrl-row">
    <div class="ctrl-lbl">Body</div>
    <input type="range" id="sl-body" min="0" max="100" value="40"
      oninput="bodyVol=this.value/100;document.getElementById('v-body').textContent=this.value+'%'">
    <div class="ctrl-val" id="v-body">40%</div>
  </div>
  <div class="ctrl-row">
    <div class="ctrl-lbl">Pad</div>
    <input type="range" id="sl-pad" min="0" max="100" value="20"
      oninput="padVol=this.value/100;document.getElementById('v-pad').textContent=this.value+'%'">
    <div class="ctrl-val" id="v-pad">20%</div>
  </div>
  <div class="ctrl-row">
    <div class="ctrl-lbl">Fade</div>
    <input type="range" id="sl-fade" min="1" max="12" value="4" step="0.5"
      oninput="fadeTime=+this.value;document.getElementById('v-fade').textContent=this.value+'s'">
    <div class="ctrl-val" id="v-fade">4s</div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// D AEGEAN — 18 notes, exact calibration
// ═══════════════════════════════════════════════════════
var NOTES=[
  {n:'F#5',f:739.99},{n:'E5', f:659.26},{n:'D5', f:587.33},{n:'C#5',f:554.37},
  {n:'B4', f:493.88},{n:'A4', f:440.00},{n:'G#4',f:415.30},{n:'F#4',f:369.99},
  {n:'E4', f:329.63},{n:'D4', f:293.66},{n:'C#4',f:277.18},{n:'B3', f:246.94},
  {n:'A3', f:220.00},{n:'G#3',f:207.65},{n:'F#3',f:185.00},{n:'E3', f:164.81},
  {n:'D3', f:146.83},{n:'B2', f:123.47}
];

// ═══════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════
var ax=null,mg=null,rv=null;
var subVol=0.55,bodyVol=0.40,padVol=0.20,fadeTime=4;

function initAudio(){
  if(ax)return;
  ax=new(window.AudioContext||window.webkitAudioContext)({sampleRate:48000});
  mg=ax.createGain();mg.gain.value=0.78;
  var eq=ax.createBiquadFilter();eq.type='lowshelf';eq.frequency.value=160;eq.gain.value=4;
  mg.connect(eq);eq.connect(ax.destination);
  rv=ax.createConvolver();
  var sr=ax.sampleRate,ln=sr*7,bf=ax.createBuffer(2,ln,sr);
  for(var c=0;c<2;c++){var d=bf.getChannelData(c);for(var i=0;i<ln;i++){var t=i/ln;d[i]=(Math.random()*2-1)*Math.pow(1-t,1.3)*(t<0.014?t/0.014:1);}}
  rv.buffer=bf;
  var rvG=ax.createGain();rvG.gain.value=0.55;rv.connect(rvG);rvG.connect(ax.destination);
  mg.connect(rv);
}
function resum(){if(ax&&ax.state==='suspended')ax.resume();}

// ── Active resonance nodes (so we can fade them out) ──
var activeNodes=[];

function fadeAllOut(dur){
  var now=ax.currentTime;
  activeNodes.forEach(function(n){
    try{
      n.gain.cancelScheduledValues(now);
      n.gain.setValueAtTime(n.gain.value,now);
      n.gain.linearRampToValueAtTime(0,now+(dur||fadeTime));
    }catch(e){}
  });
  setTimeout(function(){
    activeNodes.forEach(function(n){try{n.osc&&n.osc.stop();}catch(e){}});
    activeNodes=[];
  },(dur||fadeTime)*1000+100);
}

// ── Sub-felt: pure sine at f*0.5, felt not heard ──
function playSubFelt(f,vol){
  var n=ax.currentTime+0.01;
  var o=ax.createOscillator();o.type='sine';o.frequency.value=f*0.5;
  var g=ax.createGain();g.gain.setValueAtTime(0,n);
  g.gain.linearRampToValueAtTime(vol*subVol,n+1.2);
  o.connect(g);g.connect(mg);o.start(n);
  activeNodes.push({gain:g,osc:o});
  return g;
}

// ── Body resonance: harmonic series of detected note ──
function playBodyResonance(f,vol){
  var n=ax.currentTime+0.01;
  var out=ax.createGain();out.gain.setValueAtTime(0,n);out.gain.linearRampToValueAtTime(vol*bodyVol,n+0.8);
  var rG=ax.createGain();rG.gain.value=0.52;out.connect(mg);out.connect(rG);rG.connect(rv);
  [[0.5,0.48],[1,0.62],[2.004,0.14],[3.009,0.06]].forEach(function(p){
    var o=ax.createOscillator();o.type='sine';o.frequency.value=f*p[0];
    var g=ax.createGain();g.gain.value=p[1];o.connect(g);g.connect(out);o.start(n);
    activeNodes.push({gain:out,osc:o});
  });
  activeNodes.push({gain:out,osc:null});
  return out;
}

// ── Pad: ultra-soft chord around detected note ──
var padGain=null,padOscs=[];
function updatePad(f,vol){
  var n=ax.currentTime+0.01;
  // kill old pad
  if(padGain){
    var pg=padGain;
    pg.gain.cancelScheduledValues(n);pg.gain.setValueAtTime(pg.gain.value,n);
    pg.gain.linearRampToValueAtTime(0,n+1.5);
    setTimeout(function(){padOscs.forEach(function(o){try{o.stop();}catch(e){}});padOscs=[];try{pg.disconnect();}catch(e){}},2000);
  }
  var g=ax.createGain();g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(vol*padVol*0.12,n+2.5);
  var lpf=ax.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=600;lpf.Q.value=0.4;
  var lfo=ax.createOscillator();lfo.type='sine';lfo.frequency.value=0.05;
  var lfg=ax.createGain();lfg.gain.value=40;lfo.connect(lfg);lfg.connect(lpf.frequency);lfo.start(n);
  lpf.connect(g);
  var rG=ax.createGain();rG.gain.value=0.85;g.connect(rG);rG.connect(rv);g.connect(mg);
  [1,1.498,2.0,0.667].forEach(function(ratio,i){
    var o=ax.createOscillator();o.type='sine';o.frequency.value=f*ratio;
    var og=ax.createGain();og.gain.value=[0.55,0.28,0.10,0.07][i];
    o.connect(og);og.connect(lpf);o.start(n);padOscs.push(o);
  });
  padOscs.push(lfo);
  padGain=g;
  activeNodes.push({gain:g,osc:null});
}

// ═══════════════════════════════════════════════════════
// PITCH DETECTION — HPS (Harmonic Product Spectrum)
// ═══════════════════════════════════════════════════════
var micStream=null,micAnalyser=null,micTick=null;
var micBuf=null,fftBuf=null;
var FFT_SIZE=8192;
var prevRMS=0,lastOnsetTime=0;
var currentNoteIdx=-1,silenceTimer=null;
var MIN_IOI=0.18; // min 180ms between onsets
var SILENCE_TIMEOUT=2200; // ms before fade starts

function hps(spectrum,sr){
  var n=spectrum.length;
  var lo=Math.floor(80/(sr/FFT_SIZE/2));
  var hi=Math.ceil(1100/(sr/FFT_SIZE/2));
  var prod=new Float32Array(hi);
  for(var i=lo;i<hi;i++) prod[i]=spectrum[i];
  for(var h=2;h<=4;h++){
    for(var i=lo;i<hi;i++){
      var j=Math.floor(i*h);
      if(j<n) prod[i]+=spectrum[j];
    }
  }
  var best=-Infinity,bestI=lo;
  for(var i=lo;i<hi;i++) if(prod[i]>best){best=prod[i];bestI=i;}
  return bestI*(sr/FFT_SIZE/2);
}

function nearestNote(f){
  var best=-1,bestDist=Infinity;
  NOTES.forEach(function(note,i){
    var d=Math.abs(Math.log2(f/note.f));
    if(d<bestDist){bestDist=d;best=i;}
  });
  return bestDist<0.12?best:-1; // within ~2 semitones
}

function micStep(){
  if(!micAnalyser)return;
  if(!micBuf)micBuf=new Float32Array(FFT_SIZE);
  if(!fftBuf)fftBuf=new Float32Array(FFT_SIZE/2+1);
  micAnalyser.getFloatTimeDomainData(micBuf);
  // RMS
  var sum=0;for(var i=0;i<micBuf.length;i++)sum+=micBuf[i]*micBuf[i];
  var rms=Math.sqrt(sum/micBuf.length);
  var dE=rms-prevRMS;prevRMS=rms;
  var now=ax.currentTime;
  // Onset detection
  if(dE>0.004&&rms>0.003&&(now-lastOnsetTime)>MIN_IOI){
    lastOnsetTime=now;
    // FFT-based pitch detection
    micAnalyser.getFloatFrequencyData(fftBuf);
    // Convert dB to linear
    var lin=new Float32Array(fftBuf.length);
    for(var i=0;i<fftBuf.length;i++) lin[i]=Math.pow(10,fftBuf[i]/20);
    var f=hps(lin,ax.sampleRate);
    var idx=nearestNote(f);
    if(idx>=0) onNoteDetected(idx,rms);
    // Reset silence watch
    resetSilenceTimer();
  }
}

// ═══════════════════════════════════════════════════════
// NOTE EVENT HANDLING
// ═══════════════════════════════════════════════════════
function onNoteDetected(idx,energy){
  var note=NOTES[idx];
  var vol=Math.min(1,energy*18); // normalize energy to 0-1
  // If same note continues, refresh resonance; if new note, rebuild
  if(idx!==currentNoteIdx){
    // Fade out previous
    if(currentNoteIdx>=0){
      fadeAllOut(1.0);
      activeNodes=[];
    }
    currentNoteIdx=idx;
    // Start new resonance system
    playSubFelt(note.f,vol);
    playBodyResonance(note.f,vol);
    updatePad(note.f,vol);
    // UI
    showNote(note,vol);
    spawnRing(vol,idx);
  } else {
    // Same note — pulse the ring, no restart
    spawnRing(vol*0.5,idx);
  }
}

function resetSilenceTimer(){
  if(silenceTimer)clearTimeout(silenceTimer);
  document.getElementById('fade-hint').textContent='';
  silenceTimer=setTimeout(function(){
    // Player stopped — begin fade
    document.getElementById('fade-hint').textContent='در حال محو شدن...';
    document.getElementById('state').textContent='سکوت — در حال محو شدن';
    document.getElementById('state').classList.remove('active');
    fadeAllOut(fadeTime);
    if(padGain){
      var pg=padGain,n=ax.currentTime;
      pg.gain.cancelScheduledValues(n);pg.gain.setValueAtTime(pg.gain.value,n);
      pg.gain.linearRampToValueAtTime(0,n+fadeTime);
    }
    setTimeout(function(){
      currentNoteIdx=-1;
      showNote(null,0);
      document.getElementById('fade-hint').textContent='';
      document.getElementById('state').textContent='گوش می‌دهم';
      document.getElementById('state').classList.add('active');
    },fadeTime*1000+200);
  },SILENCE_TIMEOUT);
}

// ═══════════════════════════════════════════════════════
// MIC CONTROL
// ═══════════════════════════════════════════════════════
var micActive=false;
function toggleMic(){
  if(micActive){stopMic();return;}
  startMic();
}
function startMic(){
  if(!navigator.mediaDevices){
    alert('میکروفن در دسترس نیست');return;
  }
  initAudio();resum();
  navigator.mediaDevices.getUserMedia({
    audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}
  }).then(function(stream){
    micActive=true;micStream=stream;
    var src=ax.createMediaStreamSource(stream);
    micAnalyser=ax.createAnalyser();
    micAnalyser.fftSize=FFT_SIZE;
    micAnalyser.smoothingTimeConstant=0.35;
    src.connect(micAnalyser);
    micTick=setInterval(micStep,22);
    document.getElementById('mic-btn').textContent='⏹ غیرفعال‌سازی';
    document.getElementById('mic-btn').classList.add('on');
    document.getElementById('state').textContent='گوش می‌دهم';
    document.getElementById('state').classList.add('active');
  }).catch(function(e){
    alert('خطا در دسترسی به میکروفن: '+e.message);
  });
}
function stopMic(){
  micActive=false;
  if(micTick){clearInterval(micTick);micTick=null;}
  if(micStream){micStream.getTracks().forEach(function(t){t.stop()});micStream=null;}
  micAnalyser=null;prevRMS=0;currentNoteIdx=-1;
  fadeAllOut(fadeTime);
  document.getElementById('mic-btn').textContent='🎙 فعال‌سازی میکروفن';
  document.getElementById('mic-btn').classList.remove('on');
  document.getElementById('state').textContent='میکروفن غیرفعال';
  document.getElementById('state').classList.remove('active');
  showNote(null,0);
}

// ═══════════════════════════════════════════════════════
// CANVAS VISUAL
// ═══════════════════════════════════════════════════════
var canvas=document.getElementById('cv'),ctx=canvas.getContext('2d');
var W,H,CX,CY;
var rings=[];
var ambient=[];
// ambient particles
for(var i=0;i<36;i++) ambient.push({x:Math.random()*2-1,y:Math.random()*2-1,
  vx:(Math.random()-.5)*.0006,vy:(Math.random()-.5)*.0006,
  r:Math.random()*.7+.1,op:Math.random()*.10+.03});

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;CX=W/2;CY=H*.44;}
window.addEventListener('resize',resize);resize();

function spawnRing(str,noteIdx){
  var hue=200+(noteIdx/NOTES.length)*80;
  rings.push({r:40,op:str*.6,sp:2.8+str*1.4,hue:hue,maxR:Math.min(W,H)*.42});
}

function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,W,H);
  // ambient
  ambient.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;
    if(Math.abs(p.x)>1.1)p.vx*=-1;
    if(Math.abs(p.y)>1.1)p.vy*=-1;
    var sx=CX+p.x*(Math.min(W,H)*.34);
    var sy=CY+p.y*(Math.min(W,H)*.34);
    ctx.beginPath();ctx.arc(sx,sy,p.r,0,Math.PI*2);
    ctx.fillStyle='hsla(210,35%,65%,'+p.op.toFixed(3)+')';ctx.fill();
  });
  // rings
  rings=rings.filter(function(rn){
    rn.r+=rn.sp;rn.op*=.93;
    if(rn.op<.008||rn.r>rn.maxR)return false;
    ctx.beginPath();ctx.arc(CX,CY,rn.r,0,Math.PI*2);
    ctx.strokeStyle='hsla('+rn.hue+',45%,62%,'+rn.op.toFixed(3)+')';
    ctx.lineWidth=1.4;ctx.stroke();
    return true;
  });
}
draw();

// ═══════════════════════════════════════════════════════
// UI UPDATES
// ═══════════════════════════════════════════════════════
function showNote(note,energy){
  var nr=document.getElementById('note-ring');
  var nn=document.getElementById('note-name');
  var nf=document.getElementById('note-freq');
  var sl=document.getElementById('sub-label');
  if(note){
    nn.textContent=note.n;
    nf.textContent=note.f.toFixed(2)+' Hz';
    sl.textContent='sub → '+(note.f*0.5).toFixed(1)+' Hz · body → '+note.f.toFixed(1)+' Hz';
    nr.classList.add('lit');nn.classList.add('lit');nf.classList.add('lit');
    sl.classList.add('active');
  } else {
    nn.textContent='—';nf.textContent='';sl.textContent='';
    nr.classList.remove('lit');nn.classList.remove('lit');nf.classList.remove('lit');
    sl.classList.remove('active');
  }
}
document.addEventListener('touchstart',function(){if(ax)ax.resume();},{passive:true});
</script>
</body>
</html>
