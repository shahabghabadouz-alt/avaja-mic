<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AVAJA · Mirror Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#07080e;color:#c0cce0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;overflow:hidden;user-select:none;}
#canvas{position:fixed;inset:0;pointer-events:none;}

/* bar */
#bar{position:fixed;top:0;left:0;right:0;height:50px;background:#0a0c14;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.045);}
#bar-title{font-size:8px;letter-spacing:.30em;color:rgba(140,160,220,.4);text-transform:uppercase;}
#mic-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(140,170,220,.25);background:transparent;color:rgba(140,170,220,.65);font-size:15px;cursor:pointer;transition:all .2s;}
#mic-btn.on{border-color:rgba(80,210,150,.7);color:rgba(80,220,160,.9);box-shadow:0 0 12px rgba(40,200,120,.2);}
#mic-status{font-size:8px;letter-spacing:.1em;color:rgba(100,130,170,.4);}

/* note display — center of screen */
#note-center{position:fixed;top:50px;left:0;right:0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;}
#note-big{font-size:72px;font-weight:100;letter-spacing:.05em;color:rgba(160,190,255,.15);transition:color .08s,text-shadow .08s;}
#note-big.active{color:rgba(180,210,255,.90);text-shadow:0 0 40px rgba(120,170,255,.35);}
#note-oct{font-size:13px;letter-spacing:.35em;color:rgba(140,160,220,.3);margin-top:-8px;transition:color .08s;}
#note-oct.active{color:rgba(160,185,240,.65);}
#note-hz{font-size:9px;letter-spacing:.2em;color:rgba(100,120,180,.25);margin-top:4px;transition:color .08s;}
#note-hz.active{color:rgba(120,145,200,.50);}

/* velocity + confidence bars */
#meters{position:fixed;top:258px;left:0;right:0;padding:0 24px;display:flex;flex-direction:column;gap:6px;}
.meter{display:flex;align-items:center;gap:10px;}
.meter-label{font-size:6px;letter-spacing:.22em;color:rgba(100,120,180,.32);text-transform:uppercase;width:56px;text-align:right;}
.meter-track{flex:1;height:2px;background:rgba(255,255,255,.05);border-radius:1px;overflow:visible;}
.meter-fill{height:100%;border-radius:1px;transition:width .06s;}
#vel-fill{background:rgba(140,190,255,.7);width:0%;}
#conf-fill{background:rgba(100,220,160,.6);width:0%;}

/* ring */
#ring-wrap{position:fixed;top:295px;left:0;right:0;bottom:186px;display:flex;align-items:center;justify-content:center;}
#ring{position:relative;width:270px;height:270px;}
.nb{position:absolute;width:44px;height:44px;border-radius:50%;border:1px solid rgba(140,170,220,.16);background:rgba(10,12,24,.88);color:rgba(160,190,230,.65);font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'Helvetica Neue',sans-serif;transition:border-color .08s,box-shadow .08s,color .08s;}
.nb.dc{width:56px;height:56px;font-size:11px;font-weight:300;border-color:rgba(180,200,255,.22);}
.nb.playing{border-color:rgba(140,180,255,.9)!important;box-shadow:0 0 18px rgba(100,150,255,.4)!important;color:rgba(200,220,255,.95)!important;}
.nb.flash{border-color:rgba(80,220,160,.9)!important;box-shadow:0 0 14px rgba(50,200,140,.4)!important;}

/* history */
#history{position:fixed;bottom:130px;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:0 20px;}
.hn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(140,170,220,.1);background:rgba(10,12,24,.6);display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(120,145,200,.3);transition:all .3s;}
.hn.filled{border-color:rgba(140,170,220,.22);color:rgba(160,185,230,.5);}

/* sliders */
#sliders{position:fixed;bottom:56px;left:0;right:0;display:flex;gap:14px;padding:8px 20px;}
.sw{flex:1;display:flex;flex-direction:column;gap:4px;}
.sl{font-size:7px;letter-spacing:.16em;color:rgba(100,125,180,.32);text-transform:uppercase;}
input[type=range]{width:100%;height:2px;-webkit-appearance:none;background:rgba(140,170,220,.14);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:rgba(150,180,255,.7);}
.sv{font-size:8px;color:rgba(140,165,220,.45);text-align:center;}

/* bottom */
#bottom{position:fixed;bottom:0;left:0;right:0;height:56px;background:#0a0c14;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-top:1px solid rgba(255,255,255,.04);}
#status{font-size:8px;letter-spacing:.12em;color:rgba(100,130,180,.4);}
#fade-btn{font-size:7px;letter-spacing:.1em;color:rgba(180,140,80,.45);text-transform:uppercase;padding:5px 10px;border:1px solid rgba(180,130,60,.16);border-radius:4px;cursor:pointer;background:transparent;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="bar">
  <div id="bar-title">AVAJA · MIRROR PRO</div>
  <div id="mic-status">off</div>
  <button id="mic-btn" onclick="toggleMic()">🎤</button>
</div>

<!-- Note display -->
<div id="note-center">
  <div id="note-big">—</div>
  <div id="note-oct">—</div>
  <div id="note-hz">— Hz</div>
</div>

<!-- Meters -->
<div id="meters">
  <div class="meter">
    <span class="meter-label">Velocity</span>
    <div class="meter-track"><div class="meter-fill" id="vel-fill"></div></div>
  </div>
  <div class="meter">
    <span class="meter-label">Confidence</span>
    <div class="meter-track"><div class="meter-fill" id="conf-fill"></div></div>
  </div>
</div>

<!-- Ring -->
<div id="ring-wrap"><div id="ring"></div></div>

<!-- History -->
<div id="history">
  <div class="hn" id="h0">—</div>
  <div class="hn" id="h1">—</div>
  <div class="hn" id="h2">—</div>
  <div class="hn" id="h3">—</div>
  <div class="hn" id="h4">—</div>
</div>

<!-- Sliders -->
<div id="sliders">
  <div class="sw"><div class="sl">Vol</div><input type="range" id="sl-vol" min="10" max="100" value="80" oninput="document.getElementById('v-vol').textContent=this.value"><div class="sv" id="v-vol">80</div></div>
  <div class="sw"><div class="sl">Reverb</div><input type="range" id="sl-rvb" min="0" max="100" value="60" oninput="document.getElementById('v-rvb').textContent=this.value"><div class="sv" id="v-rvb">60</div></div>
  <div class="sw"><div class="sl">Sustain</div><input type="range" id="sl-sus" min="1" max="12" value="5" oninput="document.getElementById('v-sus').textContent=this.value+'s'"><div class="sv" id="v-sus">5s</div></div>
  <div class="sw"><div class="sl">X-Fade</div><input type="range" id="sl-xf" min="2" max="30" value="8" oninput="document.getElementById('v-xf').textContent=(this.value/10).toFixed(1)+'s'"><div class="sv" id="v-xf">0.8s</div></div>
</div>

<div id="bottom">
  <div id="status">—</div>
  <button id="fade-btn" onclick="killPadNow()">Fade Out</button>
</div>

<script>
// ── Notes ─────────────────────────────────────────────────────────────
var N=[
  ['F#','5',739.99],['E','5',659.26],['D','5',587.33],['C#','5',554.37],
  ['B','4',493.88],['A','4',440.00],['G#','4',415.30],['F#','4',369.99],
  ['E','4',329.63],['D','4',293.66],['C#','4',277.18],['B','3',246.94],
  ['A','3',220.00],['G#','3',207.65],['F#','3',185.00],['E','3',164.81],
  ['D','3',146.83],['B','2',123.47]
];
var calFreqs=N.map(function(x){return x[2];});
try{var cs=JSON.parse(localStorage.getItem('avaja_cal_v3'));if(cs&&cs.length===N.length)calFreqs=cs;}catch(e){}
var DING=16;

// ── State ─────────────────────────────────────────────────────────────
var ac=null,mg=null,rv=null;
var mOn=false,mStr=null,mAn=null,mTb=null,mFb=null,_mTid=null;
var FFT=8192,oH=[],envAvg=0.035,prevRMS=0,lO=0,silUntil=0;
var curPadG=null,curPadO=[],curPadIdx=-1;
var noteHistory=[];

// ── Getters ───────────────────────────────────────────────────────────
function gV(){return+document.getElementById('sl-vol').value/100;}
function gR(){return+document.getElementById('sl-rvb').value/100;}
function gSus(){return+document.getElementById('sl-sus').value;}
function gXF(){return+document.getElementById('sl-xf').value/10;}

// ── Audio init (exact hangscape_v10) ──────────────────────────────────
function ia(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
  mg=ac.createGain();mg.gain.value=0.82;mg.connect(ac.destination);
  var sr=ac.sampleRate,ln=sr*4,bf=ac.createBuffer(2,ln,sr);
  for(var c=0;c<2;c++){var d=bf.getChannelData(c);for(var i=0;i<ln;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/ln,2);}
  rv=ac.createConvolver();rv.buffer=bf;
  var rg=ac.createGain();rg.gain.value=0.42;mg.connect(rv);rv.connect(rg);rg.connect(ac.destination);
}
function rs(){if(ac&&ac.state==='suspended')ac.resume();}

// ── Pad ───────────────────────────────────────────────────────────────
function killPad(fd,quick){
  if(!curPadG||!ac)return;
  var t=ac.currentTime;
  var f=quick?fd*0.2:fd; // velocity-based: hard strike = fast fade
  curPadG.gain.cancelScheduledValues(t);
  curPadG.gain.setValueAtTime(curPadG.gain.value,t);
  curPadG.gain.linearRampToValueAtTime(0,t+f);
  var os=curPadO.slice();
  var prevIdx=curPadIdx;
  curPadG=null;curPadO=[];curPadIdx=-1;
  setTimeout(function(){
    os.forEach(function(o){try{o.stop();}catch(e){}});
    // clear ring highlight of previous note
    if(prevIdx>=0&&nbEls[prevIdx])nbEls[prevIdx].classList.remove('playing');
  },(f+0.4)*1000);
}
function killPadNow(){ia();rs();killPad(gXF(),false);}

function playPad(idx,velocity){
  var freq=calFreqs[idx];
  var v=gV()*velocity;
  var r=gR();
  var sus=gSus();
  var xf=gXF();

  // Velocity-based crossfade: hard=fast, soft=slow
  var quick=velocity>0.65;
  killPad(xf,quick);

  var atk=Math.min(0.5,sus*0.08);
  var pv=v*0.82;
  var t=ac.currentTime;

  var G=ac.createGain(),R=ac.createGain();
  R.gain.value=r*0.85;G.connect(mg);G.connect(R);R.connect(rv);

  // Smooth attack — blends with strike feel
  G.gain.setValueAtTime(0,t);
  G.gain.linearRampToValueAtTime(pv*0.12,t+0.02);
  G.gain.linearRampToValueAtTime(pv,t+atk);
  G.gain.setTargetAtTime(pv*0.72,t+atk,sus*0.25);
  G.gain.setTargetAtTime(0.001,t+atk+sus,sus*0.28);

  var os=[];
  var detunes=[-5,0,5,8];
  // 3 oscillators per voice, 3 harmonics — clean, not cluttered
  [[1,0.52],[2.02,0.22],[3.01,0.07]].forEach(function(p,pi){
    var o=ac.createOscillator(),og=ac.createGain();
    og.gain.value=p[1];o.type='sine';
    o.frequency.value=freq*p[0];
    o.detune.value=detunes[pi]||0;
    o.connect(og);og.connect(G);
    o.start(t);o.stop(t+atk+sus+xf+2);
    os.push(o);
  });
  // Slow LFO breathing
  var lf=ac.createOscillator(),lg=ac.createGain();
  lf.type='sine';lf.frequency.value=0.08;lg.gain.value=0.038;
  lf.connect(lg);lg.connect(G.gain);
  lf.start(t);lf.stop(t+atk+sus+xf+2);os.push(lf);

  curPadG=G;curPadO=os;curPadIdx=idx;

  // Ring highlight — stays on while pad plays
  nbEls.forEach(function(e){e.classList.remove('playing');});
  if(nbEls[idx])nbEls[idx].classList.add('playing');

  // Auto-clear after sustain ends
  setTimeout(function(){
    if(curPadIdx===idx&&nbEls[idx])nbEls[idx].classList.remove('playing');
  },(atk+sus+xf+0.5)*1000);
}

// ── UI update on detection ────────────────────────────────────────────
function onDetected(idx,velocity,confidence){
  var name=N[idx][0]+N[idx][1];
  var freq=calFreqs[idx];

  // Note display
  document.getElementById('note-big').textContent=N[idx][0];
  document.getElementById('note-big').classList.add('active');
  document.getElementById('note-oct').textContent=N[idx][1];
  document.getElementById('note-oct').classList.add('active');
  document.getElementById('note-hz').textContent=freq.toFixed(2)+' Hz';
  document.getElementById('note-hz').classList.add('active');

  // Meters
  document.getElementById('vel-fill').style.width=Math.round(velocity*100)+'%';
  document.getElementById('conf-fill').style.width=Math.round(confidence*100)+'%';
  setTimeout(function(){
    document.getElementById('vel-fill').style.width='0%';
    document.getElementById('conf-fill').style.width='0%';
  },600);

  // History
  noteHistory.unshift({idx:idx,name:name});
  if(noteHistory.length>5)noteHistory.pop();
  noteHistory.forEach(function(h,i){
    var el=document.getElementById('h'+i);
    if(el){el.textContent=h.name;el.classList.add('filled');}
  });

  // Status
  document.getElementById('status').textContent=name+' · '+Math.round(velocity*100)+'% · conf '+Math.round(confidence*100)+'%';

  // Flash ring
  if(nbEls[idx]){
    nbEls[idx].classList.add('flash');
    setTimeout(function(){if(nbEls[idx])nbEls[idx].classList.remove('flash');},180);
  }

  // Play pad
  playPad(idx,velocity);

  // Silent window — short, transient gate handles the rest
  silUntil=Date.now()+900;

  rpl(freq);
}

// ── Canvas ────────────────────────────────────────────────────────────
var cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
var W,H,CX,CY;
function sz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;CX=W/2;CY=H/2;}
window.addEventListener('resize',sz);sz();
var rps=[],rngs=[];
for(var i=0;i<3;i++)rngs.push({r:70+i*55,ph:i*1.2,sp:.00016+i*.00012});
function rpl(f){var h=Math.round(200+100*(f-120)/(740-120));rps.push({r:50,op:.5,sp:2.8,col:'hsla('+h+',55%,70%,'});}
function anim(){
  requestAnimationFrame(anim);ctx.clearRect(0,0,W,H);
  rngs.forEach(function(r){
    r.ph+=r.sp;
    var op=.018+.008*Math.sin(r.ph);
    ctx.beginPath();ctx.arc(CX,CY*.52,r.r+Math.sin(r.ph*1.6)*2,0,Math.PI*2);
    ctx.strokeStyle='rgba(100,130,220,'+op.toFixed(4)+')';ctx.lineWidth=1;ctx.stroke();
  });
  rps=rps.filter(function(r){
    r.r+=r.sp;r.op*=.93;if(r.op<.01)return false;
    ctx.beginPath();ctx.arc(CX,CY*.52,r.r,0,Math.PI*2);
    ctx.strokeStyle=r.col+r.op.toFixed(3)+')';ctx.lineWidth=1.5;ctx.stroke();
    return true;
  });
}
anim();

// ── Note ring ─────────────────────────────────────────────────────────
var ring=document.getElementById('ring'),nbEls=[];
N.forEach(function(s,i){
  var el=document.createElement('button');
  el.className='nb'+(i===DING?' dc':'');
  el.textContent=s[0]+s[1];
  if(i===DING){el.style.cssText='left:50%;top:50%;transform:translate(-50%,-50%)';}
  else{
    var ot=N.length-1,j=i<DING?i:i-1;
    var a=(j/ot)*Math.PI*2-Math.PI/2,r=110;
    var x=50+r/2.72*Math.cos(a),y=50+r/2.72*Math.sin(a);
    el.style.cssText='left:'+x+'%;top:'+y+'%;transform:translate(-50%,-50%)';
  }
  // Manual touch — also works
  el.addEventListener('touchstart',function(e){e.preventDefault();onDetected(i,1.0,1.0);},{passive:false});
  el.addEventListener('mousedown',function(){onDetected(i,1.0,1.0);});
  ring.appendChild(el);nbEls.push(el);
});

// ── Microphone ────────────────────────────────────────────────────────
var mSt=document.getElementById('mic-status');

function toggleMic(){if(!mOn)startMic();else stopMic();}

function startMic(){
  ia();
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false})
  .then(function(s){
    mStr=s;
    var src=ac.createMediaStreamSource(s);
    mAn=ac.createAnalyser();
    mAn.fftSize=FFT;
    mAn.smoothingTimeConstant=0.35;
    src.connect(mAn);
    mTb=new Float32Array(FFT);
    mFb=new Float32Array(mAn.frequencyBinCount);
    mOn=true;
    document.getElementById('mic-btn').classList.add('on');
    mSt.textContent='on';
    document.getElementById('status').textContent='listening...';
    micPoll();
  }).catch(function(e){mSt.textContent='err:'+e.name;});
}

function stopMic(){
  mOn=false;
  if(_mTid)clearTimeout(_mTid);_mTid=null;
  if(mStr)mStr.getTracks().forEach(function(t){t.stop();});
  mStr=null;mAn=null;
  document.getElementById('mic-btn').classList.remove('on');
  mSt.textContent='off';
  document.getElementById('status').textContent='—';
}

function gRMS(b){var s=0;for(var i=0;i<b.length;i++)s+=b[i]*b[i];return Math.sqrt(s/b.length);}

// HPS with confidence score
function dHPS(fd,sr){
  var bH=sr/FFT,bw=5;
  function bE(f){
    var b=Math.round(f/bH),e=0;
    for(var k=Math.max(0,b-bw);k<=Math.min(fd.length-1,b+bw);k++){
      var l=Math.pow(10,fd[k]/20);e+=l*l;
    }
    return Math.sqrt(e);
  }
  var scores=calFreqs.map(function(f,i){
    return{idx:i,sc:bE(f)*Math.pow(bE(f*2),.6)*Math.pow(bE(f*3),.3)*Math.pow(bE(f*4),.1)};
  });
  scores.sort(function(a,b){return b.sc-a.sc;});
  var best=scores[0],second=scores[1];
  var conf=second.sc>0?Math.min(1,(best.sc-second.sc)/best.sc):1;
  return{idx:best.idx,conf:conf};
}

function micPoll(){
  if(!mOn||!mAn)return;
  if(ac&&ac.state==='suspended')ac.resume();

  mAn.getFloatTimeDomainData(mTb);
  var r=gRMS(mTb);

  // Slow env tracking — adapts to room noise
  envAvg=envAvg*0.9990+r*0.0010;

  // Short history
  oH.push(r);if(oH.length>6)oH.shift();
  var avg=oH.reduce(function(a,b){return a+b;},0)/oH.length;

  // Transient rate — human strike vs AVAJA pad
  var dE=r-prevRMS;
  prevRMS=r;

  var now=Date.now();

  if(now>silUntil){
    var thresh=Math.max(0.026,envAvg*3.0);

    // Three gates:
    // 1. RMS above noise threshold
    // 2. RMS clearly above recent average (not just noise drift)
    // 3. Energy rising fast (transient = human strike)
    if(r>thresh && r>avg*1.7 && dE>thresh*0.48 && now-lO>200){
      lO=now;
      var velocity=Math.min(1.0,Math.max(0.18,(r-thresh)/(thresh*2.0)+0.20));

      // 60ms delay — lets attack settle for better pitch read
      setTimeout(function(){
        if(!mAn||!mOn||Date.now()<silUntil)return;
        mAn.getFloatFrequencyData(mFb);
        var res=dHPS(mFb,ac.sampleRate);
        // Reject low-confidence results
        if(res.conf>0.08){
          onDetected(res.idx,velocity,res.conf);
        }
      },60);
    }
  }

  _mTid=setTimeout(micPoll,22);
}

document.addEventListener('touchstart',function(){if(ac&&ac.state==='suspended')ac.resume();},{passive:true});
</script>
</body>
</html>
