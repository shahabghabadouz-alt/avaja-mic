<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AVAJA · Rhythm Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --void:#06080c;
  --deep:#0a0e14;
  --field:#0f1520;
  --ink:#c8d8e8;
  --ink2:#8a9db8;
  --ink3:#445566;
  --gold:#d4a840;
  --sage:#7aac68;
  --sky:#5a9ec8;
  --rust:#c85030;
  --glow:rgba(90,158,200,.18);
}
html,body{width:100%;height:100%;background:var(--void);color:var(--ink);
  font-family:'Helvetica Neue',Tahoma,sans-serif;overflow:hidden;user-select:none}

/* ── CANVAS FIELD ── */
#field{position:fixed;inset:0;z-index:0}

/* ── LAYOUT ── */
#app{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column}

/* ── HEADER ── */
#hdr{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#logo{font-size:9px;letter-spacing:.38em;color:rgba(90,158,200,.5);text-transform:uppercase}
#mode-name{font-size:10px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;
  opacity:0;transition:opacity .5s}
#mode-name.show{opacity:1}
#session-time{font-size:9px;color:var(--ink3);letter-spacing:.1em;font-feature-settings:'tnum'}

/* ── CENTER FIELD AREA ── */
#center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden}

/* BPM display */
#bpm-display{font-size:72px;font-weight:100;color:rgba(90,158,200,.12);
  letter-spacing:-.02em;transition:color .3s;line-height:1;pointer-events:none}
#bpm-display.active{color:rgba(90,158,200,.45)}
#bpm-label{font-size:8px;letter-spacing:.4em;color:var(--ink3);text-align:center;
  margin-top:4px;pointer-events:none;text-transform:uppercase}

/* Beat indicator */
#beat-ring{width:48px;height:48px;border-radius:50%;border:1.5px solid rgba(90,158,200,.2);
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  transition:all .06s ease-out;pointer-events:none}
#beat-ring.pulse{border-color:rgba(90,158,200,.9);transform:translate(-50%,-50%) scale(1.18);
  box-shadow:0 0 24px rgba(90,158,200,.4)}
#beat-ring.strong-pulse{border-color:rgba(212,168,64,.9);transform:translate(-50%,-50%) scale(1.22);
  box-shadow:0 0 32px rgba(212,168,64,.5)}

/* Beat dots */
#beat-dots{display:flex;gap:10px;margin-top:18px;position:absolute;bottom:68px}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--ink3);transition:all .08s}
.bdot.on{background:var(--gold);box-shadow:0 0 10px rgba(212,168,64,.7)}
.bdot.strong{background:var(--sky);box-shadow:0 0 12px rgba(90,158,200,.8);transform:scale(1.3)}

/* Call/response display */
#call-display{position:absolute;width:100%;text-align:center;top:30%;
  font-size:13px;letter-spacing:.25em;color:var(--ink2);line-height:1.8;
  pointer-events:none;opacity:0;transition:opacity .3s}
#call-display.show{opacity:1}
#call-text{font-size:14px;letter-spacing:.28em;color:var(--sky);min-height:22px}
#response-text{font-size:11px;letter-spacing:.2em;color:rgba(122,172,104,.7);min-height:18px}

/* Silence countdown */
#silence-info{position:absolute;bottom:110px;width:100%;text-align:center;
  font-size:9px;letter-spacing:.25em;color:var(--ink3);pointer-events:none;
  text-transform:uppercase;opacity:0;transition:opacity .4s}
#silence-info.show{opacity:1}

/* ── MODE TABS ── */
#modes{display:flex;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;
  background:rgba(6,8,12,.85)}
.mtab{flex:1;padding:10px 2px 8px;display:flex;flex-direction:column;
  align-items:center;gap:3px;border:none;background:transparent;cursor:pointer}
.mtab-icon{font-size:14px;opacity:.35;transition:opacity .2s}
.mtab-label{font-size:6px;letter-spacing:.14em;color:var(--ink3);text-transform:uppercase}
.mtab.sel .mtab-icon{opacity:1}
.mtab.sel .mtab-label{color:var(--gold)}

/* ── CONTROLS PANEL ── */
#ctrl{background:rgba(10,14,20,.92);border-top:1px solid rgba(255,255,255,.05);
  padding:12px 14px 10px;flex-shrink:0}
.ctrl-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ctrl-row:last-child{margin-bottom:0}
.ctrl-lbl{font-size:7px;letter-spacing:.18em;color:var(--ink3);min-width:42px;text-transform:uppercase}
input[type=range]{flex:1;height:2px;-webkit-appearance:none;background:rgba(90,158,200,.15);
  border-radius:1px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--sky);box-shadow:0 0 8px rgba(90,158,200,.4)}
.ctrl-val{font-size:9px;color:var(--gold);min-width:34px;text-align:left;font-feature-settings:'tnum'}
.sig-btns{display:flex;gap:4px}
.sig-btn{background:transparent;border:1px solid var(--ink3);border-radius:4px;
  color:var(--ink3);font:700 9px Tahoma;padding:5px 8px}
.sig-btn.sel{border-color:var(--sky);color:var(--sky);background:rgba(90,158,200,.08)}
.groove-btns{display:flex;gap:4px;flex-wrap:wrap}
.groove-btn{background:transparent;border:1px solid var(--ink3);border-radius:4px;
  color:var(--ink3);font:700 8px Tahoma;padding:5px 10px}
.groove-btn.sel{border-color:var(--gold);color:var(--gold);background:rgba(212,168,64,.08)}

/* ── PLAY BUTTON ── */
#play-area{display:flex;align-items:center;justify-content:center;gap:14px;padding:12px 0 10px;
  border-top:1px solid rgba(255,255,255,.04);flex-shrink:0;background:rgba(6,8,12,.85)}
#play-btn{width:52px;height:52px;border-radius:50%;border:1.5px solid var(--sky);
  background:transparent;color:var(--sky);font-size:18px;cursor:pointer;
  transition:all .25s;box-shadow:0 0 0 0 rgba(90,158,200,0)}
#play-btn.on{background:rgba(90,158,200,.12);border-color:var(--sky);
  box-shadow:0 0 28px rgba(90,158,200,.3)}
#play-btn.on.pulsing{animation:playglow 0s}
#tap-btn{padding:10px 20px;border-radius:8px;border:1px solid var(--ink3);
  background:transparent;color:var(--ink2);font:700 9px Tahoma;letter-spacing:.12em;cursor:pointer}
#tap-btn:active{background:rgba(90,158,200,.12);border-color:var(--sky)}

/* ── SESSION STATS ── */
#stats-overlay{position:fixed;inset:0;background:rgba(6,8,12,.94);z-index:20;
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px}
#stats-overlay.show{display:flex}
.stat-title{font-size:10px;letter-spacing:.35em;color:var(--ink3);text-transform:uppercase;margin-bottom:32px}
.stat-row{display:flex;justify-content:space-between;width:100%;
  border-bottom:1px solid rgba(255,255,255,.05);padding:14px 0}
.stat-key{font-size:9px;color:var(--ink3);letter-spacing:.1em}
.stat-val{font-size:14px;color:var(--gold);font-weight:300;letter-spacing:.05em}
#stats-close{margin-top:32px;padding:12px 32px;border-radius:8px;
  border:1px solid var(--sky);background:transparent;color:var(--sky);
  font:700 10px Tahoma;letter-spacing:.15em;cursor:pointer}
/* ── Pulse Lock status ── */
#lock-status{position:absolute;top:22%;width:100%;text-align:center;pointer-events:none;
  display:none}
#lock-status.show{display:block}
#lock-state{font-size:10px;letter-spacing:.3em;color:var(--ink3);text-transform:uppercase;margin-bottom:8px}
#lock-bpm{font-size:42px;font-weight:100;color:var(--gold);opacity:0;transition:opacity .4s}
#lock-bpm.show{opacity:1}
#lock-hint{font-size:8px;letter-spacing:.2em;color:var(--ink3);margin-top:6px;line-height:1.6}
#mic-btn{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--rust);
  background:transparent;color:var(--rust);font-size:15px;cursor:pointer;transition:all .25s}
#mic-btn.listening{border-color:var(--sage);color:var(--sage);
  box-shadow:0 0 20px rgba(122,172,104,.35);animation:micpulse 1.2s ease-in-out infinite}
@keyframes micpulse{0%,100%{box-shadow:0 0 12px rgba(122,172,104,.2);}
  50%{box-shadow:0 0 28px rgba(122,172,104,.55);}}
#cal-panel{display:none;border-top:1px solid rgba(255,255,255,.05);padding:10px 14px;
  background:rgba(10,14,20,.92);flex-shrink:0;overflow-y:auto}
#cal-panel.show{display:block}
.cal-section{margin-bottom:8px}
.cal-sec-title{font-size:7px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:5px}
.sound-select{display:flex;gap:4px;flex-wrap:wrap}
.ss-btn{background:transparent;border:1px solid var(--ink3);border-radius:4px;
  color:var(--ink3);font:700 8px Tahoma;padding:4px 8px}
.ss-btn.sel{border-color:var(--sky);color:var(--sky);background:rgba(90,158,200,.08)}
.sub-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.sub-toggle{width:32px;height:18px;border-radius:9px;border:1px solid var(--ink3);
  background:transparent;cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
.sub-toggle.on{border-color:var(--sage);background:rgba(122,172,104,.2)}
.sub-toggle::after{content:'';position:absolute;top:3px;left:3px;width:10px;height:10px;
  border-radius:50%;background:var(--ink3);transition:all .2s}
.sub-toggle.on::after{left:17px;background:var(--sage)}
#cal-toggle{padding:9px 14px;border-radius:6px;border:1px solid var(--ink3);
  background:transparent;color:var(--ink3);font:700 8px Tahoma;cursor:pointer}
#cal-toggle.active{border-color:var(--gold);color:var(--gold)}
</style>
</head>
<body>

<canvas id="field"></canvas>

<div id="app">
  <div id="hdr">
    <div id="logo">AVAJA · RHYTHM LAB</div>
    <div id="mode-name">PULSE</div>
    <div id="session-time">00:00</div>
  </div>

  <div id="center">
    <div id="beat-ring"></div>
    <div id="bpm-display">—</div>
    <div id="bpm-label">BPM</div>
    <div id="call-display">
      <div id="call-text"></div>
      <div id="response-text"></div>
    </div>
    <div id="silence-info">در سکوت ادامه بده ↗</div>
    <div id="beat-dots"></div>
    <!-- Pulse Lock overlay -->
    <div id="lock-status">
      <div id="lock-state">میک را فعال کن</div>
      <div id="lock-bpm">—</div>
      <div id="lock-hint"></div>
    </div>
  </div>

  <div id="modes">
    <button class="mtab sel" id="tab0" onclick="switchMode(0,this)">
      <div class="mtab-icon">◉</div><div class="mtab-label">پالس</div>
    </button>
    <button class="mtab" id="tab1" onclick="switchMode(1,this)">
      <div class="mtab-icon">◎</div><div class="mtab-label">سکوت</div>
    </button>
    <button class="mtab" id="tab2" onclick="switchMode(2,this)">
      <div class="mtab-icon">〰</div><div class="mtab-label">Groove</div>
    </button>
    <button class="mtab" id="tab3" onclick="switchMode(3,this)">
      <div class="mtab-icon">🎙</div><div class="mtab-label">Pulse Lock</div>
    </button>
  </div>

  <div id="ctrl">
    <!-- BPM + Tap -->
    <div class="ctrl-row">
      <div class="ctrl-lbl">BPM</div>
      <input type="range" id="sl-bpm" min="40" max="200" value="72"
        oninput="setBPM(+this.value)">
      <div class="ctrl-val" id="v-bpm">72</div>
    </div>
    <!-- Time Signature — shown in pulse/silence -->
    <div class="ctrl-row" id="sig-row">
      <div class="ctrl-lbl">میزان</div>
      <div class="sig-btns">
        <button class="sig-btn sel" onclick="setSig(4,this)">4/4</button>
        <button class="sig-btn" onclick="setSig(3,this)">3/4</button>
        <button class="sig-btn" onclick="setSig(6,this)">6/8</button>
      </div>
    </div>
    <!-- Groove selector — shown in groove mode -->
    <div class="ctrl-row" id="groove-row" style="display:none">
      <div class="ctrl-lbl">Groove</div>
      <div class="groove-btns">
        <button class="groove-btn sel" onclick="setGroove('earth',this)">Earth</button>
        <button class="groove-btn" onclick="setGroove('breath',this)">Breath</button>
        <button class="groove-btn" onclick="setGroove('stone',this)">Stone</button>
        <button class="groove-btn" onclick="setGroove('water',this)">Water</button>
      </div>
    </div>
  </div>

  <div id="play-area">
    <button id="tap-btn" onclick="onTap()">TAP</button>
    <button id="play-btn" onclick="togglePlay()">▶</button>
    <button id="mic-btn" onclick="toggleMic()" title="Pulse Lock mic">🎙</button>
    <button id="cal-toggle" onclick="toggleCal()">⚙ کوک</button>
    <button style="background:transparent;border:1px solid var(--ink3);border-radius:6px;
      color:var(--ink3);font:700 8px Tahoma;padding:9px 14px;cursor:pointer"
      onclick="showStats()">آمار</button>
  </div>

  <!-- CALIBRATION PANEL -->
  <div id="cal-panel">
    <div class="cal-section">
      <div class="cal-sec-title">صدای ضرب ۱ (قوی)</div>
      <div class="sound-select" id="ss-strong">
        <button class="ss-btn sel" onclick="setSoundType('strong','kick',this)">Kick</button>
        <button class="ss-btn" onclick="setSoundType('strong','d3',this)">D3</button>
        <button class="ss-btn" onclick="setSoundType('strong','fs3',this)">F#3</button>
        <button class="ss-btn" onclick="setSoundType('strong','a3',this)">A3</button>
      </div>
    </div>
    <div class="cal-section">
      <div class="cal-sec-title">صدای ضرب‌های دیگر</div>
      <div class="sound-select" id="ss-weak">
        <button class="ss-btn sel" onclick="setSoundType('weak','tak',this)">Tak</button>
        <button class="ss-btn" onclick="setSoundType('weak','soft',this)">Soft</button>
        <button class="ss-btn" onclick="setSoundType('weak','silence',this)">سکوت</button>
      </div>
    </div>
    <div class="ctrl-row" style="margin-top:2px">
      <div class="ctrl-lbl">حجم</div>
      <input type="range" id="sl-beat-vol" min="20" max="100" value="75"
        oninput="beatVol=this.value/100;document.getElementById('v-beat-vol').textContent=this.value+'%'">
      <div class="ctrl-val" id="v-beat-vol">75%</div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-lbl">تأخیر میک</div>
      <input type="range" id="sl-latency" min="0" max="3000" value="1400" step="50"
        oninput="MIC_LATENCY=+this.value/1000;document.getElementById('v-latency').textContent=(this.value/1000).toFixed(2)+'s'">
      <div class="ctrl-val" id="v-latency">1.40s</div>
    </div>
    <div class="sub-row">
      <div class="ctrl-lbl" style="font-size:7px;letter-spacing:.18em;color:var(--ink3);min-width:42px">ساب‌دیویژن</div>
      <button class="sub-toggle" id="sub-toggle" onclick="toggleSubdivision()"></button>
      <span style="font-size:7px;color:var(--ink3)">ضرب میانی در ۴/۴</span>
    </div>
  </div>
</div>

<!-- Session stats overlay -->
<div id="stats-overlay">
  <div class="stat-title">جلسه امروز</div>
  <div class="stat-row"><span class="stat-key">مدت زمان</span><span class="stat-val" id="st-dur">—</span></div>
  <div class="stat-row"><span class="stat-key">میانگین تمپو</span><span class="stat-val" id="st-bpm">—</span></div>
  <div class="stat-row"><span class="stat-key">ثبات</span><span class="stat-val" id="st-stab">—</span></div>
  <div class="stat-row"><span class="stat-key">طولانی‌ترین فلو</span><span class="stat-val" id="st-flow">—</span></div>
  <div class="stat-row"><span class="stat-key">بازه راحت</span><span class="stat-val" id="st-range">—</span></div>
  <button id="stats-close" onclick="document.getElementById('stats-overlay').classList.remove('show')">بستن</button>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════════
var ac=null,comp=null;

function initAudio(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
  comp=ac.createDynamicsCompressor();
  comp.threshold.value=-14;comp.knee.value=10;comp.ratio.value=4;
  comp.attack.value=0.002;comp.release.value=0.15;
  comp.connect(ac.destination);
}
function resum(){if(ac&&ac.state==='suspended')ac.resume();}

// ── Kick (strong beat / dum) ──
function soundKick(t,vol){
  var g=ac.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.9,t+.006);
  g.gain.exponentialRampToValueAtTime(.001,t+.55);g.connect(comp);
  var o=ac.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(88,t);o.frequency.exponentialRampToValueAtTime(32,t+.18);
  o.connect(g);o.start(t);o.stop(t+.6);
  // click transient
  var cg=ac.createGain();cg.gain.setValueAtTime(vol*0.3||0.25,t);cg.gain.exponentialRampToValueAtTime(.001,t+.04);cg.connect(comp);
  var co=ac.createOscillator();co.type='sine';co.frequency.value=220;co.connect(cg);co.start(t);co.stop(t+.05);
}

// ── Tak (light beat) ──
function soundTak(t,vol){
  var g=ac.createGain();g.gain.setValueAtTime(vol||0.55,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);g.connect(comp);
  var buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.22),ac.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  var lpf=ac.createBiquadFilter();lpf.type='bandpass';lpf.frequency.value=1800;lpf.Q.value=4;
  var src=ac.createBufferSource();src.buffer=buf;src.connect(lpf);lpf.connect(g);src.start(t);
}

// ── Shaker ──
function soundShaker(t,vol){
  var g=ac.createGain();g.gain.setValueAtTime(vol||0.35,t);g.gain.exponentialRampToValueAtTime(.001,t+.14);g.connect(comp);
  var buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.14),ac.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  var lpf=ac.createBiquadFilter();lpf.type='highpass';lpf.frequency.value=4000;
  var src=ac.createBufferSource();src.buffer=buf;src.connect(lpf);lpf.connect(g);src.start(t);
}

// ── Tone (handpan D3) ──
function soundTone(freq,t,vol){
  var g=ac.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.4,t+.012);
  g.gain.setTargetAtTime(.001,t+.05,0.9);g.connect(comp);
  [1,2.02,3.01].forEach(function(h,i){
    var o=ac.createOscillator();o.type='sine';o.frequency.value=freq*h;
    var og=ac.createGain();og.gain.value=[.65,.22,.08][i];o.connect(og);og.connect(g);o.start(t);o.stop(t+4);
  });
}

// ── Silence pad ──
function soundSilencePad(t){soundTone(146.83,t,0.18);}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
var mode=0; // 0=Pulse 1=Silence 2=Groove
var bpm=72,sig=4;
var playing=false,beatIdx=0,timer=null;
var sessionStart=null,sessionTimer=null;
var bpmHistory=[],tapTimes=[],flowStart=null,longestFlow=0;
var silencePhase='playing'; // playing / silence
var silenceBeats=0,silenceActive=false;
var groovePattern='earth';

// Groove pattern definitions: each step is {sound, vol} where sound in kick/tak/shaker/rest/tone
var GROOVES={
  earth: [ // 4/4: DUM..tak..DUM.tak..
    {s:'kick',v:.9},{s:'rest'},{s:'tak',v:.45},{s:'rest'},
    {s:'kick',v:.85},{s:'rest'},{s:'tak',v:.5},{s:'tak',v:.35}
  ],
  breath: [ // slow wave — long pauses
    {s:'kick',v:.65},{s:'rest'},{s:'rest'},{s:'rest'},
    {s:'shaker',v:.3},{s:'rest'},{s:'kick',v:.55},{s:'rest'}
  ],
  stone: [ // heavy, low, dense
    {s:'kick',v:.95},{s:'kick',v:.55},{s:'rest'},{s:'kick',v:.7},
    {s:'kick',v:.9},{s:'rest'},{s:'kick',v:.6},{s:'rest'}
  ],
  water: [ // shaker-led, fluid
    {s:'shaker',v:.5},{s:'tak',v:.3},{s:'shaker',v:.5},{s:'tak',v:.45},
    {s:'shaker',v:.4},{s:'kick',v:.7},{s:'shaker',v:.35},{s:'tak',v:.3}
  ]
};

// Call & Response patterns (for future use — shown in groove mode)
var CR_PATTERNS=[
  ['DUM','DUM'],
  ['DUM','TAK','DUM'],
  ['DUM','DUM','TAK','DUM'],
  ['DUM','rest','DUM','TAK'],
];
var crIdx=0,crPhase='call';

// ═══════════════════════════════════════════════════════════
// CANVAS RESONANCE FIELD
// ═══════════════════════════════════════════════════════════
var cv=document.getElementById('field'),ctx=cv.getContext('2d');
var W,H,CX,CY;
var particles=[];
var rings=[];
var beatFlash=0;

function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;CX=W/2;CY=H*0.46;}
window.addEventListener('resize',resize);resize();

// initialize ambient particles
for(var i=0;i<48;i++){
  particles.push({
    x:Math.random()*2-1,y:Math.random()*2-1,
    vx:(Math.random()-.5)*.0008,vy:(Math.random()-.5)*.0008,
    r:Math.random()*.9+.1,op:Math.random()*.18+.04,
    hue:Math.random()>0.7?44:210
  });
}

function spawnRing(strength,hue){
  rings.push({r:22,maxR:Math.min(W,H)*0.44,op:strength*.65,hue:hue||210,speed:2.4+strength*1.2});
}

function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,W,H);

  // ambient gradient
  var grd=ctx.createRadialGradient(CX,CY,0,CX,CY,Math.min(W,H)*.55);
  grd.addColorStop(0,'rgba(10,20,40,.22)');
  grd.addColorStop(1,'rgba(6,8,12,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  // rings (expand on beat)
  rings=rings.filter(function(rn){
    rn.r+=rn.speed;rn.op*=0.92;
    if(rn.op<.008||rn.r>rn.maxR)return false;
    ctx.beginPath();ctx.arc(CX,CY,rn.r,0,Math.PI*2);
    ctx.strokeStyle='hsla('+rn.hue+',55%,62%,'+rn.op.toFixed(3)+')';
    ctx.lineWidth=1.2;ctx.stroke();
    return true;
  });

  // ambient particles
  particles.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;
    if(Math.abs(p.x)>1.1){p.vx*=-1;}
    if(Math.abs(p.y)>1.1){p.vy*=-1;}
    var sx=CX+p.x*(Math.min(W,H)*.36);
    var sy=CY+p.y*(Math.min(W,H)*.36);
    ctx.beginPath();ctx.arc(sx,sy,p.r,0,Math.PI*2);
    ctx.fillStyle='hsla('+p.hue+',40%,65%,'+p.op.toFixed(3)+')';
    ctx.fill();
  });

  // beat flash background pulse
  if(beatFlash>0){
    beatFlash-=0.06;
    ctx.fillStyle='rgba(90,158,200,'+(beatFlash*.06).toFixed(3)+')';
    ctx.fillRect(0,0,W,H);
  }
}
draw();

// ═══════════════════════════════════════════════════════════
// BEAT DOTS
// ═══════════════════════════════════════════════════════════
function buildDots(){
  var el=document.getElementById('beat-dots'),html='';
  var count=sig===6?6:sig;
  for(var i=0;i<count;i++) html+='<div class="bdot" id="dot'+i+'"></div>';
  el.innerHTML=html;
}

function flashDot(idx,isStrong){
  var el=document.getElementById('dot'+idx);
  if(!el)return;
  el.classList.add(isStrong?'strong':'on');
  setTimeout(function(){el.classList.remove('strong','on');},180);
}

function flashRing(isStrong){
  var ring=document.getElementById('beat-ring');
  ring.classList.add(isStrong?'strong-pulse':'pulse');
  setTimeout(function(){ring.classList.remove('strong-pulse','pulse');},120);
}

// ═══════════════════════════════════════════════════════════
// TICK — the main beat engine
// ═══════════════════════════════════════════════════════════
function tick(){
  if(!playing)return;
  resum();
  var t=ac.currentTime+0.01;
  var isStrong=beatIdx===0;
  var beatCount=sig===6?6:sig;

  if(mode===0){
    // PULSE MODE
    if(isStrong){playStrongBeat(t);spawnRing(.9,44);beatFlash=1;}
    else{playWeakBeat(t);spawnRing(.45,210);beatFlash=.4;}
    // subdivision
    if(sig===4&&subdivisionOn&&!isStrong){playSubBeat(t);spawnRing(.15,200);}
    flashRing(isStrong);flashDot(beatIdx,isStrong);

  } else if(mode===1){
    // SILENCE MODE
    if(silencePhase==='playing'){
      if(isStrong){playStrongBeat(t);spawnRing(.9,44);beatFlash=1;}
      else{playWeakBeat(t);spawnRing(.45,210);beatFlash=.4;}
      flashRing(isStrong);flashDot(beatIdx,isStrong);
      silenceBeats++;
      // after one full phrase (e.g. 8 beats), go silent
      if(silenceBeats>=beatCount*2){
        silencePhase='silence';silenceBeats=0;
        document.getElementById('silence-info').classList.add('show');
        soundSilencePad(t+0.1);
      }
    } else {
      // SILENT — no sound, but still ticking internally
      silenceBeats++;
      // subtle visual so they know the pulse continues
      beatFlash=isStrong?.12:.04;
      flashDot(beatIdx,false);
      // return after 1 phrase
      if(silenceBeats>=beatCount*2){
        silencePhase='playing';silenceBeats=0;
        document.getElementById('silence-info').classList.remove('show');
        // re-entry sound
        soundSilencePad(t);
        spawnRing(.5,210);
      }
    }

  } else if(mode===2){
    // GROOVE COMPANION MODE
    var pat=GROOVES[groovePattern];
    var step=beatIdx%(pat.length);
    var ev=pat[step];
    if(ev.s==='kick'){soundKick(t,ev.v);spawnRing(ev.v*.9,44);}
    else if(ev.s==='tak'){soundTak(t,ev.v);spawnRing(ev.v*.6,210);}
    else if(ev.s==='shaker'){soundShaker(t,ev.v);spawnRing(ev.v*.4,180);}
    else if(ev.s==='tone'){soundTone(146.83,t,ev.v);spawnRing(ev.v*.5,130);}
    if(ev.s!=='rest'){beatFlash=ev.v*.6;flashRing(isStrong);}
    flashDot(beatIdx%beatCount,isStrong);
  }

  // session stats
  bpmHistory.push(bpm);
  beatIdx++;
  if(beatIdx>=(sig===6?6:sig)*32) beatIdx=0; // reset every 32 bars

  // update session clock
  if(sessionStart){
    var elapsed=Math.floor((Date.now()-sessionStart)/1000);
    var m=Math.floor(elapsed/60),s=elapsed%60;
    document.getElementById('session-time').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  }

  // BPM display
  document.getElementById('bpm-display').textContent=bpm;
  document.getElementById('bpm-display').classList.add('active');

  var stepMs=60/bpm*1000/(sig===6?1.5:1);
  timer=setTimeout(tick,stepMs);
}

// ═══════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════
function setBPM(v){
  bpm=v;
  document.getElementById('v-bpm').textContent=v;
  if(playing){clearTimeout(timer);}// restart with new tempo on next tick (natural re-schedule)
}

function setSig(s,btn){
  sig=s;
  document.querySelectorAll('.sig-btn').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
  beatIdx=0;buildDots();
}

function setGroove(g,btn){
  groovePattern=g;
  document.querySelectorAll('.groove-btn').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
  beatIdx=0;
}

function switchMode(m,tab){
  mode=m;beatIdx=0;silencePhase='playing';silenceBeats=0;
  document.getElementById('silence-info').classList.remove('show');
  document.querySelectorAll('.mtab').forEach(function(t){t.classList.remove('sel');});
  tab.classList.add('sel');
  var names=['PULSE','SILENCE','GROOVE','PULSE LOCK'];
  var el=document.getElementById('mode-name');
  el.textContent=names[m];el.classList.add('show');
  document.getElementById('sig-row').style.display=m===2?'none':'flex';
  document.getElementById('groove-row').style.display=m===2?'flex':'none';
  // Pulse Lock UI
  var isLock=m===3;
  document.getElementById('lock-status').classList.toggle('show',isLock);
  document.getElementById('bpm-display').style.opacity=isLock?'0':'';
  document.getElementById('mic-btn').style.display=isLock?'':'none';
  if(!isLock&&lockActive)stopMic();
  buildDots();
}

// ── TAP tempo detection ──
function onTap(){
  initAudio();resum();
  var now=Date.now();
  tapTimes.push(now);
  if(tapTimes.length>8)tapTimes.shift();
  if(tapTimes.length>=2){
    var intervals=[];
    for(var i=1;i<tapTimes.length;i++) intervals.push(tapTimes[i]-tapTimes[i-1]);
    var avg=intervals.reduce(function(a,b){return a+b},0)/intervals.length;
    var tapped=Math.round(60000/avg);
    tapped=Math.max(40,Math.min(200,tapped));
    bpm=tapped;
    document.getElementById('sl-bpm').value=tapped;
    document.getElementById('v-bpm').textContent=tapped;
    document.getElementById('bpm-display').textContent=tapped;
  }
  // click sound for feedback
  soundTak(ac.currentTime+0.01,0.5);
  spawnRing(.4,210);
}

function togglePlay(){
  if(playing){stopPlay();return;}
  startPlay();
}

function startPlay(){
  initAudio();resum();
  playing=true;beatIdx=0;silencePhase='playing';silenceBeats=0;tapTimes=[];
  if(!sessionStart){sessionStart=Date.now();flowStart=Date.now();}
  document.getElementById('play-btn').textContent='⏸';
  document.getElementById('play-btn').classList.add('on');
  tick();
}

function stopPlay(){
  playing=false;clearTimeout(timer);
  document.getElementById('play-btn').textContent='▶';
  document.getElementById('play-btn').classList.remove('on');
  document.getElementById('bpm-display').classList.remove('active');
  document.getElementById('silence-info').classList.remove('show');
  if(flowStart){
    var flowMs=Date.now()-flowStart;
    if(flowMs>longestFlow)longestFlow=flowMs;
  }
}

// ── Session stats ──
function showStats(){
  stopPlay();
  var dur=sessionStart?Math.floor((Date.now()-sessionStart)/1000):0;
  var m=Math.floor(dur/60),s=dur%60;
  document.getElementById('st-dur').textContent=(m>0?m+'دقیقه ':'')+s+'ثانیه';
  if(bpmHistory.length>0){
    var avg=Math.round(bpmHistory.reduce(function(a,b){return a+b},0)/bpmHistory.length);
    var mn=Math.min.apply(null,bpmHistory),mx=Math.max.apply(null,bpmHistory);
    document.getElementById('st-bpm').textContent=avg+' BPM';
    document.getElementById('st-range').textContent=mn+' – '+mx+' BPM';
    var variance=mx-mn;
    var stab=variance<5?'عالی':variance<12?'خوب':variance<22?'متوسط':'در حال رشد';
    document.getElementById('st-stab').textContent=stab;
  }
  var fmin=Math.floor(longestFlow/60000),fsec=Math.floor((longestFlow%60000)/1000);
  document.getElementById('st-flow').textContent=(fmin>0?fmin+'دقیقه ':'')+fsec+'ثانیه';
  document.getElementById('stats-overlay').classList.add('show');
}

// ── Init ──
buildDots();
document.getElementById('bpm-display').textContent='—';
document.getElementById('mode-name').classList.add('show');
document.getElementById('mic-btn').style.display='none'; // shown only in Pulse Lock mode
document.addEventListener('touchstart',function(){if(ac)ac.resume();},{passive:true});

// ═══════════════════════════════════════════════════════════
// CALIBRATION STATE
// ═══════════════════════════════════════════════════════════
var soundTypeStrong='kick';
var soundTypeWeak='tak';
var beatVol=0.75;
var subdivisionOn=false;
var MIC_LATENCY=1.4; // seconds — adjustable via calibration slider

function setSoundType(role,type,btn){
  if(role==='strong')soundTypeStrong=type;
  else soundTypeWeak=type;
  var container=document.getElementById('ss-'+role);
  container.querySelectorAll('.ss-btn').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
}
function toggleSubdivision(){
  subdivisionOn=!subdivisionOn;
  document.getElementById('sub-toggle').classList.toggle('on',subdivisionOn);
}
function toggleCal(){
  var p=document.getElementById('cal-panel');
  var t=document.getElementById('cal-toggle');
  p.classList.toggle('show');
  t.classList.toggle('active');
}

// Sound dispatcher — uses calibration choices
var HANDPAN_NOTES={'d3':146.83,'fs3':185.00,'a3':220.00,'e3':164.81,'b3':246.94};
function playStrongBeat(t){
  if(soundTypeStrong==='kick') soundKick(t,beatVol);
  else soundTone(HANDPAN_NOTES[soundTypeStrong]||146.83,t,beatVol*0.7);
}
function playWeakBeat(t){
  if(soundTypeWeak==='silence')return;
  if(soundTypeWeak==='soft') soundTak(t,beatVol*0.28);
  else soundTak(t,beatVol*0.45);
}
function playSubBeat(t){
  if(!subdivisionOn)return;
  soundShaker(t,beatVol*0.18);
}

// ═══════════════════════════════════════════════════════════
// PULSE LOCK — mic-based tempo detection with latency compensation
// ═══════════════════════════════════════════════════════════
var micStream=null,micAnalyser=null,micTick=null;
var lockActive=false;
var onsetTimes=[];          // timestamps of detected strikes (ac.currentTime)
var detectedBPM=0;
var detectedIOI=0;          // inter-onset interval in seconds
var lockPhase='idle';       // idle | listening | locked
var lockBeatIdx=0;
var lockTimer=null;
var lastOnsetTime=0;
var silenceWatchTimer=null;
var lockRoundsAfterStop=0;
var prevRMS=0;
var onsetThreshBase=0.004;

function setState(s,hint){
  document.getElementById('lock-state').textContent=s;
  document.getElementById('lock-hint').textContent=hint||'';
}

function toggleMic(){
  if(lockActive){stopMic();return;}
  startMic();
}

function startMic(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    setState('میک پشتیبانی نمی‌شود','');return;
  }
  initAudio();resum();
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}})
  .then(function(stream){
    lockActive=true;
    micStream=stream;
    var src=ac.createMediaStreamSource(stream);
    micAnalyser=ac.createAnalyser();
    micAnalyser.fftSize=1024;
    micAnalyser.smoothingTimeConstant=0.1;
    src.connect(micAnalyser);
    lockPhase='listening';
    onsetTimes=[];detectedBPM=0;lockBeatIdx=0;prevRMS=0;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('lock-status').classList.add('show');
    document.getElementById('bpm-display').style.opacity='0';
    setState('گوش می‌دهم...','بزن — حداقل ۳ ضربه');
    document.getElementById('lock-bpm').classList.remove('show');
    micTick=setInterval(micStep,22);
  })
  .catch(function(e){
    setState('خطا در دسترسی به میک',e.message);
  });
}

function stopMic(){
  lockActive=false;lockPhase='idle';
  if(micTick){clearInterval(micTick);micTick=null;}
  if(lockTimer){clearTimeout(lockTimer);lockTimer=null;}
  if(silenceWatchTimer){clearTimeout(silenceWatchTimer);silenceWatchTimer=null;}
  if(micStream){micStream.getTracks().forEach(function(t){t.stop();});micStream=null;}
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('lock-status').classList.remove('show');
  document.getElementById('bpm-display').style.opacity='';
  document.getElementById('lock-bpm').classList.remove('show');
  // stop any running metronome from pulse lock
  if(lockTimer){clearTimeout(lockTimer);lockTimer=null;}
}

var micBuf=null;
function micStep(){
  if(!micAnalyser||!lockActive)return;
  if(!micBuf||micBuf.length!==micAnalyser.fftSize)
    micBuf=new Float32Array(micAnalyser.fftSize);
  micAnalyser.getFloatTimeDomainData(micBuf);

  // RMS energy
  var sum=0;for(var i=0;i<micBuf.length;i++)sum+=micBuf[i]*micBuf[i];
  var rms=Math.sqrt(sum/micBuf.length);

  // transient gate: sudden energy rise = strike
  var dE=rms-prevRMS;
  prevRMS=rms;
  var now=ac.currentTime;
  var minIOI=0.22; // 272 BPM max

  if(dE>onsetThreshBase && rms>0.002 && (now-lastOnsetTime)>minIOI){
    lastOnsetTime=now;
    onsetDetected(now);
  }
}

function onsetDetected(t){
  onsetTimes.push(t);
  // keep last 8 onsets
  if(onsetTimes.length>8)onsetTimes.shift();
  // update adaptive threshold based on recent energy
  onsetThreshBase=Math.max(0.003,prevRMS*1.4);

  spawnRing(.35,130);
  // flash the ring visually so user can confirm onset was detected
  flashRing(false);
  beatFlash=0.3;

  if(onsetTimes.length>=3){
    // calculate IOI from recent intervals
    var iois=[];
    for(var i=1;i<onsetTimes.length;i++){
      var ioi=onsetTimes[i]-onsetTimes[i-1];
      if(ioi>0.22&&ioi<2.5)iois.push(ioi); // valid IOI range
    }
    if(iois.length<2)return;

    // median IOI for robustness
    iois.sort(function(a,b){return a-b;});
    var medianIOI=iois[Math.floor(iois.length/2)];
    var candidateBPM=Math.round(60/medianIOI);

    // handle double-time detection (if IOI is very short, might be 8th notes)
    if(candidateBPM>160)candidateBPM=Math.round(candidateBPM/2);
    candidateBPM=Math.max(40,Math.min(200,candidateBPM));

    document.getElementById('lock-bpm').textContent=candidateBPM+' BPM';
    document.getElementById('lock-bpm').classList.add('show');

    if(onsetTimes.length>=3&&lockPhase==='listening'){
      // enough data — lock and start metronome
      detectedBPM=candidateBPM;
      detectedIOI=60/detectedBPM;
      lockPhase='locked';
      setState('قفل شد','مترونوم همراه تو شروع کرد');
      // Schedule first beat:
      // The NEXT predicted beat = lastOnset + IOI
      // We want the user to HEAR it at that time.
      // Since the exciter has MIC_LATENCY delay, schedule it MIC_LATENCY seconds early.
      var nextBeatTime=onsetTimes[onsetTimes.length-1]+detectedIOI;
      var schedTime=nextBeatTime-MIC_LATENCY;
      if(schedTime<ac.currentTime+0.05)schedTime=ac.currentTime+0.05;
      lockBeatIdx=0;lockRoundsAfterStop=0;
      scheduleLockBeat(schedTime);
      startSilenceWatch();
    } else if(lockPhase==='locked'){
      // re-detected — update BPM smoothly if changed significantly
      if(Math.abs(candidateBPM-detectedBPM)>4){
        detectedBPM=candidateBPM;
        detectedIOI=60/detectedBPM;
        setState('تمپو بروز شد',candidateBPM+' BPM');
      }
      // Reset silence watch since player is still playing
      startSilenceWatch();
    }
  }
}

function scheduleLockBeat(t){
  if(!lockActive)return;
  lockTimer=setTimeout(function(){
    if(!lockActive)return;
    var isStrong=(lockBeatIdx%sig)===0;
    var audioT=ac.currentTime+0.01;
    if(isStrong){playStrongBeat(audioT);spawnRing(.85,44);beatFlash=.9;}
    else{playWeakBeat(audioT);spawnRing(.4,210);beatFlash=.3;}
    // subdivision (between beats, in 4/4)
    if(sig===4&&subdivisionOn){
      setTimeout(function(){
        playSubBeat(ac.currentTime+0.01);
        spawnRing(.15,200);
      },detectedIOI*500);
    }
    flashRing(isStrong);flashDot(lockBeatIdx%sig,isStrong);
    lockBeatIdx++;
    scheduleLockBeat(t+detectedIOI);
  }, Math.max(0,(t-ac.currentTime)*1000));
}

function startSilenceWatch(){
  // If no new onset arrives within 2.5 × IOI, player has stopped
  if(silenceWatchTimer)clearTimeout(silenceWatchTimer);
  var watchMs=(detectedIOI||0.75)*2.5*1000;
  silenceWatchTimer=setTimeout(function(){
    if(lockPhase!=='locked')return;
    lockPhase='stopping';
    setState('سکوت — ادامه می‌دهم...','');
    // continue 2 full bars then stop
    var stopsAfterMs=detectedIOI*sig*2*1000;
    silenceWatchTimer=setTimeout(function(){
      lockPhase='listening';
      setState('گوش می‌دهم...','دوباره بزن');
      document.getElementById('lock-bpm').classList.remove('show');
      if(lockTimer){clearTimeout(lockTimer);lockTimer=null;}
      onsetTimes=[];detectedBPM=0;
    },stopsAfterMs);
  },watchMs);
}
</script>
