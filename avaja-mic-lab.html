<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AVAJA · Presence Lab v11</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#0e0c0a;color:#c8d4e0;font-family:Tahoma,sans-serif;overflow:hidden;user-select:none;}
#canvas{position:fixed;inset:0;pointer-events:none;}
/* bar */
#bar{position:fixed;top:0;left:0;right:0;height:44px;background:#1a1612;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.06);}
#bar-title{font-size:8px;letter-spacing:.22em;color:rgba(180,160,120,.5);text-transform:uppercase;}
#mic-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(140,180,220,.25);background:transparent;color:rgba(140,180,220,.65);font-size:14px;cursor:pointer;}
#mic-btn.on{border-color:rgba(100,210,150,.75);color:rgba(100,220,160,.9);box-shadow:0 0 8px rgba(60,200,120,.2);}
#mic-status{font-size:8px;color:rgba(100,140,170,.4);letter-spacing:.08em;}
/* tabs */
#tabs{position:fixed;top:44px;left:0;right:0;height:30px;background:#151210;display:flex;border-bottom:1px solid rgba(255,255,255,.05);}
.tab{flex:1;font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:rgba(140,160,180,.4);background:transparent;border:none;cursor:pointer;}
.tab.sel{color:rgba(210,185,120,.85);border-bottom:2px solid rgba(185,140,20,.5);}
/* ring */
#ring-wrap{position:fixed;top:74px;left:0;right:0;bottom:274px;display:flex;align-items:center;justify-content:center;}
#ring{position:relative;width:278px;height:278px;}
.nb{position:absolute;width:42px;height:42px;border-radius:50%;border:1px solid rgba(140,170,200,.17);background:rgba(14,12,10,.88);color:rgba(180,200,220,.7);font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:Tahoma;transition:border-color .1s,box-shadow .1s;}
.nb.dc{width:55px;height:55px;font-size:11px;font-weight:700;border-color:rgba(185,140,20,.4);color:rgba(210,185,120,.9);}
.nb.heard{border-color:rgba(100,220,160,.9)!important;box-shadow:0 0 14px rgba(60,200,130,.4)!important;}
.nb.spl{border-color:rgba(80,140,255,.7)!important;box-shadow:0 0 8px rgba(40,100,255,.3)!important;}
/* technique */
#tech-row{position:fixed;bottom:220px;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:0 12px;}
.tb{flex:1;max-width:62px;height:28px;border-radius:5px;border:1px solid rgba(140,170,200,.14);background:rgba(20,18,14,.7);color:rgba(150,175,210,.52);font-size:7px;text-transform:uppercase;cursor:pointer;font-family:Tahoma;}
.tb.sel{border-color:rgba(185,140,20,.5);color:rgba(210,185,120,.85);background:rgba(100,70,10,.22);}
/* chord type */
#ctype-row{position:fixed;bottom:188px;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:0 12px;}
.ct{flex:1;max-width:78px;height:22px;border-radius:4px;border:1px solid rgba(140,170,200,.1);background:rgba(12,11,8,.6);color:rgba(120,150,185,.4);font-size:7px;cursor:pointer;font-family:Tahoma;}
.ct.sel{border-color:rgba(80,180,120,.45);color:rgba(100,200,140,.75);background:rgba(15,55,30,.35);}
/* layer panels */
#layers{position:fixed;bottom:50px;left:0;right:0;padding:4px 10px;display:flex;gap:6px;}
.lp{flex:1;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.055);border-radius:9px;padding:7px 8px;display:flex;flex-direction:column;gap:5px;transition:border-color .2s,background .2s;}
.lp.on{border-color:rgba(185,140,20,.28);background:rgba(38,28,5,.38);}
.lp-head{display:flex;align-items:center;justify-content:space-between;}
.lp-name{font-size:7px;letter-spacing:.1em;color:rgba(155,140,105,.45);text-transform:uppercase;}
/* toggle switch */
.tog{width:28px;height:16px;border-radius:8px;background:rgba(255,255,255,.07);border:none;cursor:pointer;position:relative;flex-shrink:0;}
.tog.on{background:rgba(185,140,20,.55);}
.tog::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .16s;}
.tog.on::after{left:14px;}
.lp-sliders{display:flex;flex-direction:column;gap:3px;}
.lp-sl{display:flex;align-items:center;gap:5px;}
.lp-sl span{font-size:6px;color:rgba(130,120,90,.38);text-transform:uppercase;min-width:30px;}
input[type=range]{flex:1;height:2px;-webkit-appearance:none;background:rgba(180,160,120,.14);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:rgba(185,140,20,.72);}
/* bottom */
#bottom{position:fixed;bottom:0;left:0;right:0;height:50px;background:#151210;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-top:1px solid rgba(255,255,255,.04);}
#heard{font-size:9px;color:rgba(100,200,150,.65);letter-spacing:.1em;}
#fade-btn{font-size:7px;color:rgba(200,150,80,.55);text-transform:uppercase;padding:4px 8px;border:1px solid rgba(185,120,20,.2);border-radius:4px;cursor:pointer;background:transparent;font-family:Tahoma;}
/* calibration */
#panel-cal{position:fixed;top:74px;left:0;right:0;bottom:0;display:none;flex-direction:column;}
#cal-scroll{flex:1;overflow-y:auto;padding:10px 14px 20px;}
.cal-row{display:flex;align-items:center;gap:5px;padding:6px 8px;background:rgba(255,255,255,.028);border:1px solid rgba(255,255,255,.055);border-radius:7px;margin-bottom:4px;}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.cname{font-weight:700;min-width:30px;font-size:10px;color:rgba(210,185,120,.85);}
.ndg{display:flex;gap:2px;}
.ndg button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(180,200,220,.7);font:700 8px Tahoma;padding:2px 5px;border-radius:3px;cursor:pointer;}
.cal-inp{width:56px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:5px;color:rgba(210,210,220,.9);font:700 10px Tahoma;text-align:center;padding:3px;outline:none;}
.cal-inp:focus{border-color:rgba(185,140,20,.6);}
.hz{font-size:7px;color:rgba(130,145,160,.38);}
.cpb{background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(130,195,130,.6);font:8px Tahoma;padding:3px 8px;border-radius:4px;cursor:pointer;margin-right:auto;}
#cal-tech-row{padding:8px 14px 0;display:flex;gap:6px;}
.ctb{flex:1;height:30px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:rgba(20,18,14,.8);color:rgba(150,175,210,.5);font-size:8px;cursor:pointer;font-family:Tahoma;}
.ctb.sel{border-color:rgba(185,140,20,.5);color:rgba(210,185,120,.85);background:rgba(80,55,8,.3);}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="bar">
  <div id="bar-title">AVAJA · PRESENCE LAB v11</div>
  <div id="mic-status">off</div>
  <button id="mic-btn" onclick="toggleMic()">🎤</button>
</div>
<div id="tabs">
  <button class="tab sel" onclick="showTab('play')">Play</button>
  <button class="tab" onclick="showTab('cal')">Calibrate</button>
</div>

<!-- PLAY panel -->
<div id="panel-play">
  <div id="ring-wrap"><div id="ring"></div></div>

  <div id="tech-row">
    <button class="tb sel" onclick="setTech('open')">Open</button>
    <button class="tb" onclick="setTech('strike')">Strike</button>
    <button class="tb" onclick="setTech('ding')">Ding</button>
    <button class="tb" onclick="setTech('anti')">Anti</button>
    <button class="tb" onclick="setTech('chord')">Chord</button>
  </div>

  <div id="ctype-row">
    <button class="ct sel" onclick="setCtype('harmonic')">Harmonic</button>
    <button class="ct" onclick="setCtype('deep')">Deep</button>
    <button class="ct" onclick="setCtype('open')">Open 5th</button>
  </div>

  <!-- 3 layer panels -->
  <div id="layers">
    <!-- PAD -->
    <div class="lp" id="lp-pad">
      <div class="lp-head">
        <span class="lp-name">Pad</span>
        <button class="tog" id="pad-tog" onclick="togglePad()"></button>
      </div>
      <div class="lp-sliders">
        <div class="lp-sl"><span>Sus</span><input type="range" id="sl-sus" min="1" max="15" value="5" oninput="document.getElementById('v-sus').textContent=this.value+'s'"><span id="v-sus">5s</span></div>
        <div class="lp-sl"><span>Fade</span><input type="range" id="sl-fad" min="1" max="8" value="2" oninput="document.getElementById('v-fad').textContent=this.value+'s'"><span id="v-fad">2s</span></div>
        <div class="lp-sl"><span>Vol</span><input type="range" id="sl-pvol" min="5" max="100" value="78" oninput="document.getElementById('v-pvol').textContent=this.value"><span id="v-pvol">78</span></div>
      </div>
    </div>
    <!-- RAIN -->
    <div class="lp" id="lp-rain">
      <div class="lp-head">
        <span class="lp-name">Rain</span>
        <button class="tog" id="rain-tog" onclick="toggleRain()"></button>
      </div>
      <div class="lp-sliders">
        <div class="lp-sl"><span>Vol</span><input type="range" id="sl-rvol" min="5" max="100" value="55" oninput="rainVol=+this.value/100"><span></span></div>
        <div class="lp-sl"><span>Dense</span><input type="range" id="sl-rden" min="1" max="10" value="5" oninput="rainDens=+this.value"><span></span></div>
      </div>
    </div>
    <!-- NOISE -->
    <div class="lp" id="lp-noise">
      <div class="lp-head">
        <span class="lp-name">Noise</span>
        <button class="tog" id="noise-tog" onclick="toggleNoise()"></button>
      </div>
      <div class="lp-sliders">
        <div class="lp-sl"><span>Vol</span><input type="range" id="sl-nvol" min="5" max="100" value="50" oninput="setNoiseVol(+this.value/100)"><span></span></div>
      </div>
    </div>
  </div>

  <div id="bottom">
    <div id="heard"></div>
    <div style="display:flex;gap:8px;align-items:center;">
      <input type="range" id="sl-mvol" min="10" max="100" value="85" style="width:70px" oninput="document.getElementById('v-mvol').textContent=this.value">
      <span id="v-mvol" style="font-size:8px;color:rgba(185,140,20,.6)">85</span>
      <button id="fade-btn" onclick="killPadNow()">Fade</button>
    </div>
  </div>
</div>

<!-- CALIBRATE panel -->
<div id="panel-cal">
  <div id="cal-tech-row">
    <button class="ctb sel" onclick="setCalTech('open',this)">Open</button>
    <button class="ctb" onclick="setCalTech('strike',this)">Strike</button>
    <button class="ctb" onclick="setCalTech('ding',this)">Ding</button>
  </div>
  <div id="cal-scroll"><div id="CAL_ROWS"></div></div>
</div>

<script>
// ── Notes — D minor ───────────────────────────────────────────────────
var N=[
  ['F#','5',739.99],['E','5',659.26],['D','5',587.33],['C#','5',554.37],
  ['B','4',493.88],['A','4',440.00],['G#','4',415.30],['F#','4',369.99],
  ['E','4',329.63],['D','4',293.66],['C#','4',277.18],['B','3',246.94],
  ['A','3',220.00],['G#','3',207.65],['F#','3',185.00],['E','3',164.81],
  ['D','3',146.83],['B','2',123.47]
];
var calFreqs=N.map(function(x){return x[2];});
try{var cs=JSON.parse(localStorage.getItem('avaja_cal_v3'));if(cs&&cs.length===N.length)calFreqs=cs;}catch(e){}
var DING=16;
var DOT_COLORS=['#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#c4a87a','#c4a87a','#c4a87a'];

// Chord maps
var CH_HARM=[[0,4,8],[1,5,9],[2,6,10],[3,7,11],[4,8,12],[5,9,13],[6,10,14],[7,11,15],[8,12,16],[9,13,17],[10,14,17],[11,15,16],[12,16,11],[13,16,12],[14,16,11],[15,16,12],[16,12,8],[17,16,12]];
var CH_DEEP=[[0,4,8,12],[1,5,9,13],[2,6,10,14],[3,7,11,15],[4,8,12,16],[5,9,13,17],[6,10,14,17],[7,11,15,17],[8,12,16,11],[9,13,16,12],[10,14,16,11],[11,15,16,12],[12,16,11,8],[13,16,12,8],[14,16,11,8],[15,16,12,8],[16,12,8,4],[17,16,12,8]];
var CH_OPEN=[[0,8,16],[1,9,17],[2,10,16],[3,11,17],[4,12,16],[5,13,17],[6,14,16],[7,15,17],[8,16,12],[9,17,12],[10,16,12],[11,17,15],[12,16,8],[13,16,9],[14,16,10],[15,16,11],[16,8,12],[17,16,12]];

// ── State ─────────────────────────────────────────────────────────────
var ac=null,mg=null,rv=null,sbus=null;
var tech='open',ctype='harmonic';
var padOn=false,rainOn=false,noiseOn=false;
var rainVol=0.55,rainDens=5;
// Pad state
var curPadG=null,curPadO=[];
var curChord=[16,12,8];
// Noise nodes
var noiseNodes=[];
// Rain timers
var rainAmbTimer=null;
// Activity tracking for auto-silence
var lastStrikeTime=0;
var AUTO_SILENCE_MS=7000; // 7s no strike → rain density drops

function ia(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
  mg=ac.createGain();mg.gain.value=0.82;mg.connect(ac.destination);
  // reverb
  var sr=ac.sampleRate,ln=sr*3.5,bf=ac.createBuffer(2,ln,sr);
  for(var c=0;c<2;c++){var d=bf.getChannelData(c);for(var i=0;i<ln;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/ln,2.1);}
  rv=ac.createConvolver();rv.buffer=bf;
  var rg=ac.createGain();rg.gain.value=0.42;mg.connect(rv);rv.connect(rg);rg.connect(ac.destination);
  // sbus for noise ducking
  sbus=ac.createGain();sbus.gain.value=1;sbus.connect(mg);
}
function rs(){if(ac&&ac.state==='suspended')ac.resume();}

// ── Getters ───────────────────────────────────────────────────────────
function gMV(){return+document.getElementById('sl-mvol').value/100;}
function gPV(){return+document.getElementById('sl-pvol').value/100;}
function gSus(){return+document.getElementById('sl-sus').value;}
function gFad(){return+document.getElementById('sl-fad').value;}
function gR(){return 0.52;}
function getChord(i){return ctype==='deep'?CH_DEEP[i]:ctype==='open'?CH_OPEN[i]:CH_HARM[i];}

// ── Sound functions (exact hangscape_v10) ─────────────────────────────
function sOpen(f,v,r,t){
  var fr=440/f,atk=.025*Math.pow(fr,.3),dec=2.5*Math.pow(fr,.2);
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=r*.6;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+atk);
  g.gain.setTargetAtTime(v*.5,t+atk,dec*.15);g.gain.setTargetAtTime(.001,t+dec*.6,dec*.5);
  [[1,.55],[2.02,.3],[3.01,.1]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=f*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+2);});
  var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=.8;lfg.gain.value=.08;lfo.connect(lfg);lfg.connect(g.gain);lfo.start(t);lfo.stop(t+dec+2);
}
function sStrike(f,v,r,t){
  var fr=440/f,atk=.005*Math.pow(fr,.35),dec=.45*Math.pow(fr,.45),gm=f<150?1.4:f<250?1.2:1;
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=r*.42;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v*.75*gm,t+atk);
  g.gain.setTargetAtTime(v*.12*gm,t+atk,dec*.2);g.gain.setTargetAtTime(.001,t+dec*.55,dec*.5);
  [[1,.58],[2.02,.25],[3.01,.09]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=f*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+.8);});
  var df=f*(f<250?1.2:1.28),dt=f*(f<250?.93:.97),dd=.05*Math.pow(fr,.4);
  var po=ac.createOscillator(),pg=ac.createGain();po.frequency.setValueAtTime(df,t);po.frequency.exponentialRampToValueAtTime(dt,t+dd);po.type='sine';pg.gain.setValueAtTime(v*(f<250?.28:.18)*gm,t);pg.gain.exponentialRampToValueAtTime(.001,t+dd*2);po.connect(pg);pg.connect(mg);po.start(t);po.stop(t+dd*3);
  if(f<140){var sg=ac.createGain();sg.connect(mg);sg.gain.setValueAtTime(0,t);sg.gain.linearRampToValueAtTime(v*.22,t+.04);sg.gain.exponentialRampToValueAtTime(.001,t+dec*1.8);var sb=ac.createOscillator(),sbg=ac.createGain();sbg.gain.value=.6;sb.type='sine';sb.frequency.value=f*.5;sb.connect(sbg);sbg.connect(sg);sb.start(t);sb.stop(t+dec*2);}
}
function sDing(f,v,r,t){
  var fr=440/f,atk=Math.max(.03,.025*Math.pow(fr,.3));
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=r*.78;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v*.65,t+atk);
  g.gain.setTargetAtTime(v*.45,t+atk,.3);g.gain.setTargetAtTime(.001,t+4,2.0);
  [[1,.55],[2.02,.3],[3.01,.1]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=f*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+6.5);});
  var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=.8;lfg.gain.value=.09;lfo.connect(lfg);lfg.connect(g.gain);lfo.start(t);lfo.stop(t+6.5);
}
function sAnti(f,v,r,t){
  var fr=440/f,atk=.008*Math.pow(fr,.35),dec=.5*Math.pow(fr,.45),gm=f<150?1.3:1,d=1.4;
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=r*.4;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v*.68*gm,t+atk);
  g.gain.setTargetAtTime(v*.08*gm,t+atk,dec*.22);g.gain.setTargetAtTime(.001,t+dec*.6+d,dec*.5);
  [[1,.55],[2.02,.28],[3.01,.09]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=f*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+d+.3);});
  var td=t+d,ag=ac.createGain();ag.connect(mg);
  ag.gain.setValueAtTime(0,td);ag.gain.linearRampToValueAtTime(-v*.68*gm,td+.015);ag.gain.exponentialRampToValueAtTime(.001,td+.06);
  [[1,.55],[2.02,.25]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=f*p[0];o.connect(og);og.connect(ag);o.start(td);o.stop(td+.1);});
}

// ── Pad layer ─────────────────────────────────────────────────────────
function killPad(fd){
  if(!curPadG||!ac)return;
  var t=ac.currentTime,f=fd||gFad();
  curPadG.gain.cancelScheduledValues(t);
  curPadG.gain.setValueAtTime(curPadG.gain.value,t);
  curPadG.gain.linearRampToValueAtTime(0,t+f);
  var os=curPadO.slice();curPadG=null;curPadO=[];
  setTimeout(function(){os.forEach(function(o){try{o.stop();}catch(e){}});},( f+.4)*1000);
}
function killPadNow(){ia();rs();killPad(gFad());}

function playPad(idxs,v,t){
  killPad(gFad());
  curChord=idxs;
  var sus=gSus(),atk=Math.min(1.2,sus*.18),pv=v*gPV();
  var G=ac.createGain(),R=ac.createGain();R.gain.value=.82;G.connect(mg);G.connect(R);R.connect(rv);
  // soft start — feels like continuation not new event
  G.gain.setValueAtTime(0,t);
  G.gain.linearRampToValueAtTime(pv*.25,t+.05);
  G.gain.linearRampToValueAtTime(pv,t+atk);
  G.gain.setTargetAtTime(pv*.75,t+atk,sus*.28);
  G.gain.setTargetAtTime(.001,t+atk+sus,sus*.3);
  var os=[];
  idxs.forEach(function(idx,i){
    var f=calFreqs[idx],dt=[-5,0,5,8][i%4];
    [[1,.5],[2.02,.24],[3.01,.07]].forEach(function(p){
      var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];
      o.type='sine';o.frequency.value=f*p[0];o.detune.value=dt;
      o.connect(og);og.connect(G);o.start(t);o.stop(t+atk+sus+gFad()+2);os.push(o);
    });
    var lf=ac.createOscillator(),lg=ac.createGain();lf.type='sine';lf.frequency.value=.09+i*.025;lg.gain.value=.042;
    lf.connect(lg);lg.connect(G.gain);lf.start(t);lf.stop(t+atk+sus+gFad()+2);os.push(lf);
  });
  curPadG=G;curPadO=os;
}

function togglePad(){
  padOn=!padOn;
  document.getElementById('pad-tog').classList.toggle('on',padOn);
  document.getElementById('lp-pad').classList.toggle('on',padOn);
  if(!padOn)killPad(gFad());
}

// ── Rain / Splash ─────────────────────────────────────────────────────
function playRainDrop(f,v){
  if(!ac)return;
  var fr=440/f,atk=.004,dec=.2*Math.pow(fr,.35);
  var t=ac.currentTime;
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=.62;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+atk);g.gain.exponentialRampToValueAtTime(.001,t+dec);
  [[1,.55],[2.02,.2]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=f*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+.15);});
}

// Splash: burst of drops around struck note
function doSplash(rootIdx,strength){
  if(!rainOn||!ac)return;
  var near=[];for(var d=-2;d<=2;d++){var ix=rootIdx+d;if(ix>=0&&ix<N.length)near.push(ix);}
  var cnt=2+Math.floor(rainDens*.4)+Math.floor(Math.random()*3);
  for(var i=0;i<cnt;i++){
    (function(delay,pick){
      setTimeout(function(){
        if(!ac)return;
        var v=rainVol*strength*(0.08+Math.random()*.1);
        playRainDrop(calFreqs[pick],v);
        if(nbEls[pick]){nbEls[pick].classList.add('spl');setTimeout(function(){nbEls[pick].classList.remove('spl');},65);}
      },delay);
    })(70+i*110+Math.random()*80, near[Math.floor(Math.random()*near.length)]);
  }
}

// Ambient rain: sparse in silence, stops after AUTO_SILENCE_MS
function scheduleAmbRain(){
  if(!rainOn)return;
  var now=Date.now();
  var sinceStrike=now-lastStrikeTime;
  // after AUTO_SILENCE_MS with no strike, stop ambient rain
  if(sinceStrike>AUTO_SILENCE_MS){
    rainAmbTimer=setTimeout(scheduleAmbRain, 3000);
    return;
  }
  // interval: 10-15s base, reduced by density
  var base=10000+(15000-rainDens*1000);
  var delay=base*0.5+Math.random()*base*0.5;
  rainAmbTimer=setTimeout(function(){
    if(!rainOn||!ac)return;
    var pick=curChord[Math.floor(Math.random()*curChord.length)];
    var v=rainVol*0.08;
    playRainDrop(calFreqs[pick],v);
    scheduleAmbRain();
  },delay);
}

function toggleRain(){
  rainOn=!rainOn;
  ia();
  document.getElementById('rain-tog').classList.toggle('on',rainOn);
  document.getElementById('lp-rain').classList.toggle('on',rainOn);
  if(rainOn){lastStrikeTime=Date.now();scheduleAmbRain();}
  else{if(rainAmbTimer){clearTimeout(rainAmbTimer);rainAmbTimer=null;}}
}

// ── Noise: brown + sparkle, auto-active in silence ────────────────────
var noiseVol=0.5,noiseFading=false;
function mkNoiseBuf(type){
  var sr=ac.sampleRate,n=sr*12,buf=ac.createBuffer(1,n,sr),d=buf.getChannelData(0);
  if(type==='b'){var l=0;for(var i=0;i<n;i++){var w=Math.random()*2-1;l=(l+.02*w)/1.02;d[i]=l*3.5;}}
  else{var b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;for(var i=0;i<n;i++){var w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.96900*b2+w*.1538520;b3=.86650*b3+w*.3104856;b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;d[i]=(b0+b1+b2+b3+b4+b5+w*.5362)*.11;}}
  return buf;
}
function buildNoiseNodes(){
  if(noiseNodes.length)return;
  // Brown — warm body
  (function(){
    var src=ac.createBufferSource();src.buffer=mkNoiseBuf('b');src.loop=true;
    var hp=ac.createBiquadFilter(),lp=ac.createBiquadFilter();
    hp.type='highpass';hp.frequency.value=40;lp.type='lowpass';lp.frequency.value=500;
    var g=ac.createGain();g.gain.value=0;
    src.connect(hp);hp.connect(lp);lp.connect(g);g.connect(sbus);
    var rg=ac.createGain();rg.gain.value=.28;g.connect(rg);rg.connect(rv);
    src.start();noiseNodes.push({src:src,g:g,base:.22});
  })();
  // Sparkle — high freq air
  (function(){
    var src=ac.createBufferSource();src.buffer=mkNoiseBuf('p');src.loop=true;
    var hp=ac.createBiquadFilter(),lp=ac.createBiquadFilter();
    hp.type='highpass';hp.frequency.value=1800;lp.type='lowpass';lp.frequency.value=6000;
    var g=ac.createGain();g.gain.value=0;
    src.connect(hp);hp.connect(lp);lp.connect(g);g.connect(sbus);
    src.start();noiseNodes.push({src:src,g:g,base:.08});
  })();
}
function setNoiseVol(v){
  noiseVol=v;
  noiseNodes.forEach(function(nd){
    if(ac&&!noiseFading)nd.g.gain.setTargetAtTime(nd.base*noiseVol,ac.currentTime,.25);
  });
}
function fadeNoiseIn(){
  if(!noiseOn||!ac)return;
  noiseFading=false;
  noiseNodes.forEach(function(nd){nd.g.gain.setTargetAtTime(nd.base*noiseVol,ac.currentTime,1.8);});
}
function fadeNoiseOut(){
  if(!ac)return;
  noiseFading=true;
  noiseNodes.forEach(function(nd){nd.g.gain.setTargetAtTime(0,ac.currentTime,.08);});
}
function stopNoiseNodes(){
  noiseNodes.forEach(function(nd){
    try{nd.g.gain.setTargetAtTime(0,ac.currentTime,.5);setTimeout(function(){try{nd.src.stop();}catch(e){}},1200);}catch(e){}
  });
  noiseNodes=[];
}
function toggleNoise(){
  noiseOn=!noiseOn;ia();
  document.getElementById('noise-tog').classList.toggle('on',noiseOn);
  document.getElementById('lp-noise').classList.toggle('on',noiseOn);
  if(noiseOn){buildNoiseNodes();fadeNoiseIn();}
  else{stopNoiseNodes();}
}

// ── Duck sbus on play ─────────────────────────────────────────────────
function duckNoise(sec){
  if(!noiseOn||!ac)return;
  fadeNoiseOut();
  // restore after sec seconds
  setTimeout(fadeNoiseIn, sec*1000);
}

// ── Play ──────────────────────────────────────────────────────────────
function play(idx){
  ia();rs();
  var f=calFreqs[idx],t=ac.currentTime,v=gMV(),r=gR();
  lastStrikeTime=Date.now();
  duckNoise(2.5);
  if(tech==='open')sOpen(f,v,r,t);
  else if(tech==='strike')sStrike(f,v,r,t);
  else if(tech==='ding')sDing(f,v,r,t);
  else if(tech==='anti')sAnti(f,v,r,t);
  else if(tech==='chord'&&padOn)playPad(getChord(idx),v,t);
  if(padOn&&tech!=='chord')playPad(getChord(idx),v,t+.03);
  doSplash(idx,v);
  rpl(f);
}

// ── Canvas ────────────────────────────────────────────────────────────
var cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
var W,H,CX,CY;
function sz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;CX=W/2;CY=H/2;}
window.addEventListener('resize',sz);sz();
var rps=[],rngs=[];
for(var i=0;i<4;i++)rngs.push({r:56+i*46,ph:i*.9,sp:.00018+i*.00014});
function rpl(f){var h=Math.round(30+80*(f-120)/(740-120));rps.push({r:42,op:.5,sp:2.4,col:'hsla('+h+',50%,65%,'});}
function anim(){
  requestAnimationFrame(anim);ctx.clearRect(0,0,W,H);
  rngs.forEach(function(r){r.ph+=r.sp;var op=.013+.005*Math.sin(r.ph);ctx.beginPath();ctx.arc(CX,CY*.47,r.r+Math.sin(r.ph*1.8)*2,0,Math.PI*2);ctx.strokeStyle='rgba(160,130,80,'+op.toFixed(3)+')';ctx.lineWidth=1;ctx.stroke();});
  rps=rps.filter(function(r){r.r+=r.sp;r.op*=.94;if(r.op<.01)return false;ctx.beginPath();ctx.arc(CX,CY*.47,r.r,0,Math.PI*2);ctx.strokeStyle=r.col+r.op.toFixed(3)+')';ctx.lineWidth=1.5;ctx.stroke();return true;});
}
anim();

// ── Note ring ─────────────────────────────────────────────────────────
var ring=document.getElementById('ring'),nbEls=[];
N.forEach(function(s,i){
  var el=document.createElement('button');
  el.className='nb'+(i===DING?' dc':'');el.textContent=s[0]+s[1];
  if(i===DING){el.style.cssText='left:50%;top:50%;transform:translate(-50%,-50%)';}
  else{var ot=N.length-1,j=i<DING?i:i-1,a=(j/ot)*Math.PI*2-Math.PI/2,r=114,x=50+r/2.78*Math.cos(a),y=50+r/2.78*Math.sin(a);el.style.cssText='left:'+x+'%;top:'+y+'%;transform:translate(-50%,-50%)';}
  el.addEventListener('touchstart',function(e){e.preventDefault();play(i);fl(el);},{passive:false});
  el.addEventListener('mousedown',function(){play(i);fl(el);});
  ring.appendChild(el);nbEls.push(el);
});
function fl(el){el.style.borderColor='rgba(185,140,20,.8)';setTimeout(function(){el.style.borderColor='';},110);}
function mH(idx){nbEls.forEach(function(e){e.classList.remove('heard');});if(idx>=0&&nbEls[idx]){nbEls[idx].classList.add('heard');setTimeout(function(){if(nbEls[idx])nbEls[idx].classList.remove('heard');},1400);}}
function setTech(t){tech=t;document.querySelectorAll('.tb').forEach(function(b){b.classList.toggle('sel',b.textContent.toLowerCase()===t);});}
function setCtype(t){ctype=t;document.querySelectorAll('.ct').forEach(function(b){b.classList.toggle('sel',b.textContent.toLowerCase().startsWith(t.substring(0,4)));});}
function showTab(t){
  document.getElementById('panel-play').style.display=t==='play'?'block':'none';
  document.getElementById('panel-cal').style.display=t==='cal'?'flex':'none';
  document.querySelectorAll('.tab').forEach(function(b){b.classList.toggle('sel',b.textContent.toLowerCase()===t);});
  if(t==='cal')buildCal();
}

// ── Microphone ────────────────────────────────────────────────────────
var mStr=null,mAn=null,mTb=null,mFb=null,mOn=false,micTid=null;
var lO=0,oH=[],FFT=8192,silUntil=0;
var hEl=document.getElementById('heard'),mSt=document.getElementById('mic-status');
var envAvg=0.04;

function toggleMic(){if(!mOn)startMic();else stopMic();}
function startMic(){
  ia();
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false})
  .then(function(s){
    mStr=s;var src=ac.createMediaStreamSource(s);
    mAn=ac.createAnalyser();mAn.fftSize=FFT;mAn.smoothingTimeConstant=0.55;
    src.connect(mAn);mTb=new Float32Array(FFT);mFb=new Float32Array(mAn.frequencyBinCount);
    mOn=true;document.getElementById('mic-btn').classList.add('on');mSt.textContent='on';
    micPoll();
  }).catch(function(e){mSt.textContent='err';});
}
function stopMic(){
  mOn=false;if(micTid)clearTimeout(micTid);micTid=null;
  if(mStr)mStr.getTracks().forEach(function(t){t.stop();});
  document.getElementById('mic-btn').classList.remove('on');mSt.textContent='off';
}
function gRMS(b){var s=0;for(var i=0;i<b.length;i++)s+=b[i]*b[i];return Math.sqrt(s/b.length);}
function dHPS(fd,sr){
  var bH=sr/FFT,bw=5;
  function bE(f){var b=Math.round(f/bH),e=0;for(var k=Math.max(0,b-bw);k<=Math.min(fd.length-1,b+bw);k++){var l=Math.pow(10,fd[k]/20);e+=l*l;}return Math.sqrt(e);}
  var best=-1,bs=-Infinity;
  calFreqs.forEach(function(f,i){var sc=bE(f)*Math.pow(bE(f*2),.6)*Math.pow(bE(f*3),.3)*Math.pow(bE(f*4),.1);if(sc>bs){bs=sc;best=i;}});
  return best;
}
function echoChord(idx){
  ia();rs();
  silUntil=Date.now()+2200;
  lastStrikeTime=Date.now();
  duckNoise(2.8);
  if(padOn)playPad(getChord(idx),gMV()*.85,ac.currentTime+.07);
  doSplash(idx,gMV()*.6);
  mH(idx);hEl.textContent='← '+N[idx][0]+N[idx][1];
  setTimeout(function(){hEl.textContent='';},2000);
}

// Use setTimeout loop — stable on mobile, no rAF crash
function micPoll(){
  if(!mOn||!mAn){return;}
  if(ac&&ac.state==='suspended')ac.resume();
  mAn.getFloatTimeDomainData(mTb);
  var r=gRMS(mTb);
  envAvg=envAvg*.9985+r*.0015;
  oH.push(r);if(oH.length>6)oH.shift();
  var avg=oH.reduce(function(a,b){return a+b;},0)/oH.length;
  var now=Date.now();
  if(now>silUntil){
    var thresh=Math.max(0.03,envAvg*3.2);
    if(r>thresh&&r>avg*1.8&&now-lO>350){
      lO=now;
      setTimeout(function(){
        if(!mAn||!mOn||Date.now()<silUntil)return;
        mAn.getFloatFrequencyData(mFb);
        var idx=dHPS(mFb,ac.sampleRate);
        if(idx>=0)echoChord(idx);
      },75);
    }
  }
  micTid=setTimeout(micPoll,22);
}

// ── Calibration ───────────────────────────────────────────────────────
var calTech='open';
function buildCal(){
  var el=document.getElementById('CAL_ROWS'),html='';
  for(var i=0;i<N.length;i++){
    html+='<div class="cal-row"><div class="cdot" style="background:'+DOT_COLORS[i]+'"></div><span class="cname">'+N[i][0]+N[i][1]+'</span>';
    html+='<div class="ndg"><button onclick="nudge('+i+',-1)">−1</button><button onclick="nudge('+i+',-.1)">−.1</button><button onclick="nudge('+i+',.1)">+.1</button><button onclick="nudge('+i+',1)">+1</button></div>';
    html+='<input class="cal-inp" type="number" id="CF'+i+'" value="'+calFreqs[i].toFixed(2)+'" step="0.1" min="20" max="2000" oninput="calFreqs['+i+']=+this.value;saveCal()">';
    html+='<span class="hz">Hz</span><button class="cpb" onclick="playCal('+i+')">▶</button></div>';
  }
  el.innerHTML=html;
}
function playCal(i){ia();rs();if(calTech==='open')sOpen(calFreqs[i],.7,.45,ac.currentTime);else if(calTech==='strike')sStrike(calFreqs[i],.7,.45,ac.currentTime);else sDing(calFreqs[i],.7,.45,ac.currentTime);}
function nudge(idx,d){calFreqs[idx]=parseFloat((calFreqs[idx]+d).toFixed(2));var inp=document.getElementById('CF'+idx);if(inp)inp.value=calFreqs[idx].toFixed(2);playCal(idx);saveCal();}
function setCalTech(t,btn){calTech=t;document.querySelectorAll('.ctb').forEach(function(b){b.classList.remove('sel');});btn.classList.add('sel');}
function saveCal(){try{localStorage.setItem('avaja_cal_v3',JSON.stringify(calFreqs));}catch(e){}}

document.addEventListener('touchstart',function(){if(ac&&ac.state==='suspended')ac.resume();},{passive:true});
</script>
