<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AVAJA · Mirror Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#0a090e;color:#c8d4e0;font-family:Tahoma,sans-serif;overflow:hidden;user-select:none;}
#canvas{position:fixed;inset:0;pointer-events:none;}
/* bar */
#bar{position:fixed;top:0;left:0;right:0;height:44px;background:#12101a;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.05);}
#bar-title{font-size:8px;letter-spacing:.22em;color:rgba(160,140,210,.45);text-transform:uppercase;}
#mic-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(160,140,220,.22);background:transparent;color:rgba(160,140,220,.6);font-size:14px;cursor:pointer;}
#mic-btn.on{border-color:rgba(100,210,150,.75);color:rgba(100,220,160,.9);box-shadow:0 0 10px rgba(60,200,120,.2);}
#mic-status{font-size:8px;color:rgba(100,120,170,.4);}
/* note display */
#note-display{position:fixed;top:54px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:16px;padding:10px;}
.nd{display:flex;flex-direction:column;align-items:center;gap:3px;}
.nd-label{font-size:6px;letter-spacing:.22em;color:rgba(120,110,170,.38);text-transform:uppercase;}
.nd-note{font-size:28px;font-weight:200;letter-spacing:.08em;min-width:60px;text-align:center;transition:all .15s;}
.nd-hz{font-size:8px;color:rgba(120,110,170,.35);}
#nd-detected .nd-note{color:rgba(100,220,160,.8);}
#nd-mirror .nd-note{color:rgba(160,120,255,.8);}
.nd-arrow{font-size:18px;color:rgba(120,110,170,.25);margin-top:8px;}
/* confidence */
#conf-bar{position:fixed;top:140px;left:0;right:0;padding:0 20px;}
.cbar-wrap{display:flex;align-items:center;gap:8px;}
.cbar-label{font-size:6px;letter-spacing:.18em;color:rgba(120,110,170,.35);width:60px;text-transform:uppercase;}
.cbar{flex:1;height:2px;background:rgba(255,255,255,.06);border-radius:1px;}
.cbar-fill{height:100%;border-radius:1px;transition:width .1s;}
#conf-fill{background:rgba(100,220,160,.6);width:0%;}
#vel-fill{background:rgba(160,120,255,.6);width:0%;}
/* mode row */
#mode-row{position:fixed;top:168px;left:0;right:0;display:flex;justify-content:center;gap:7px;padding:0 14px;}
.mb{flex:1;max-width:90px;height:30px;border-radius:5px;border:1px solid rgba(160,140,220,.12);background:rgba(14,12,20,.7);color:rgba(140,120,200,.42);font-size:7px;text-transform:uppercase;cursor:pointer;font-family:Tahoma;transition:all .2s;}
.mb.sel{border-color:rgba(160,120,255,.55);color:rgba(180,145,255,.88);background:rgba(40,20,65,.45);}
/* sliders panel */
#sliders{position:fixed;top:210px;left:0;right:0;padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.sr{display:flex;align-items:center;gap:10px;}
.sr-label{font-size:7px;letter-spacing:.12em;color:rgba(120,110,170,.38);text-transform:uppercase;width:72px;text-align:right;}
input[type=range]{flex:1;height:2px;-webkit-appearance:none;background:rgba(160,140,220,.14);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:rgba(160,120,255,.75);}
.sr-val{font-size:8px;color:rgba(160,120,255,.65);width:36px;}
/* log */
#log{position:fixed;bottom:52px;left:0;right:0;padding:0 16px;display:flex;flex-direction:column;gap:3px;}
.log-title{font-size:6px;letter-spacing:.22em;color:rgba(120,110,170,.3);margin-bottom:2px;}
.log-item{font-size:8px;color:rgba(120,110,170,.38);letter-spacing:.08em;transition:opacity .5s;}
.log-item.new{color:rgba(160,120,255,.75);}
/* bottom */
#bottom{position:fixed;bottom:0;left:0;right:0;height:52px;background:#12101a;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-top:1px solid rgba(255,255,255,.04);}
#status{font-size:8px;color:rgba(160,120,255,.55);letter-spacing:.1em;}
#stop-btn{font-size:7px;color:rgba(200,150,100,.55);text-transform:uppercase;padding:5px 10px;border:1px solid rgba(185,120,20,.18);border-radius:4px;cursor:pointer;background:transparent;font-family:Tahoma;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="bar">
  <div id="bar-title">AVAJA · MIRROR LAB</div>
  <div id="mic-status">off</div>
  <button id="mic-btn" onclick="toggleMic()">🎤</button>
</div>

<!-- Note display -->
<div id="note-display">
  <div class="nd" id="nd-detected">
    <div class="nd-label">Detected</div>
    <div class="nd-note" id="det-note">—</div>
    <div class="nd-hz" id="det-hz">— Hz</div>
  </div>
  <div class="nd-arrow">→</div>
  <div class="nd" id="nd-mirror">
    <div class="nd-label">Mirror</div>
    <div class="nd-note" id="mir-note">—</div>
    <div class="nd-hz" id="mir-hz">— Hz</div>
  </div>
</div>

<!-- Confidence + Velocity bars -->
<div id="conf-bar">
  <div class="cbar-wrap">
    <span class="cbar-label">Confidence</span>
    <div class="cbar"><div class="cbar-fill" id="conf-fill"></div></div>
  </div>
  <div style="height:5px"></div>
  <div class="cbar-wrap">
    <span class="cbar-label">Velocity</span>
    <div class="cbar"><div class="cbar-fill" id="vel-fill"></div></div>
  </div>
</div>

<!-- Mode -->
<div id="mode-row">
  <button class="mb sel" onclick="setMode('pad')">Pad</button>
  <button class="mb" onclick="setMode('strikes')">Fade Strikes</button>
</div>

<!-- Sliders -->
<div id="sliders">
  <div class="sr">
    <span class="sr-label">Volume</span>
    <input type="range" id="sl-vol" min="10" max="100" value="82">
    <span class="sr-val" id="v-vol">82</span>
  </div>
  <div class="sr">
    <span class="sr-label">Reverb</span>
    <input type="range" id="sl-rvb" min="0" max="100" value="58">
    <span class="sr-val" id="v-rvb">58</span>
  </div>
  <div class="sr">
    <span class="sr-label">Sustain</span>
    <input type="range" id="sl-sus" min="1" max="12" value="4">
    <span class="sr-val" id="v-sus">4s</span>
  </div>
  <div class="sr" id="row-strikes">
    <span class="sr-label">Strikes</span>
    <input type="range" id="sl-str" min="1" max="5" value="3">
    <span class="sr-val" id="v-str">3</span>
  </div>
  <div class="sr" id="row-gap">
    <span class="sr-label">Gap</span>
    <input type="range" id="sl-gap" min="3" max="25" value="8">
    <span class="sr-val" id="v-gap">0.8s</span>
  </div>
  <div class="sr">
    <span class="sr-label">Sensitivity</span>
    <input type="range" id="sl-sens" min="1" max="10" value="5">
    <span class="sr-val" id="v-sens">5</span>
  </div>
</div>

<!-- Log -->
<div id="log">
  <div class="log-title">DETECTION LOG</div>
  <div class="log-item" id="l0">—</div>
  <div class="log-item" id="l1">—</div>
  <div class="log-item" id="l2">—</div>
  <div class="log-item" id="l3">—</div>
</div>

<div id="bottom">
  <div id="status">listening...</div>
  <button id="stop-btn" onclick="stopAll()">⏹ Stop</button>
</div>

<script>
// ── Notes ─────────────────────────────────────────────────────────────
var N=[
  ['F#','5',739.99],['E','5',659.26],['D','5',587.33],['C#','5',554.37],
  ['B','4',493.88],['A','4',440.00],['G#','4',415.30],['F#','4',369.99],
  ['E','4',329.63],['D','4',293.66],['C#','4',277.18],['B','3',246.94],
  ['A','3',220.00],['G#','3',207.65],['F#','3',185.00],['E','3',164.81],
  ['D','3',146.83],['B','2',123.47]
];
var calFreqs=N.map(function(x){return x[2];});
try{var cs=JSON.parse(localStorage.getItem('avaja_cal_v3'));if(cs&&cs.length===N.length)calFreqs=cs;}catch(e){}

// ── State ─────────────────────────────────────────────────────────────
var ac=null,mg=null,rv=null;
var mOn=false,mStr=null,mAn=null,mTb=null,mFb=null,_mTid=null;
var FFT=8192,oH=[],envAvg=0.04,prevRMS=0,lO=0;
var silUntil=0;
var mirrorMode='pad';
var curPadG=null,curPadO=[];
var logLines=[];

// Sliders
function gV(){return+document.getElementById('sl-vol').value/100;}
function gR(){return+document.getElementById('sl-rvb').value/100;}
function gSus(){return+document.getElementById('sl-sus').value;}
function gStr(){return+document.getElementById('sl-str').value;}
function gGap(){return+document.getElementById('sl-gap').value/10;}
function gSens(){return+document.getElementById('sl-sens').value;}

// Wire sliders
document.getElementById('sl-vol').oninput=function(){document.getElementById('v-vol').textContent=this.value;};
document.getElementById('sl-rvb').oninput=function(){document.getElementById('v-rvb').textContent=this.value;};
document.getElementById('sl-sus').oninput=function(){document.getElementById('v-sus').textContent=this.value+'s';};
document.getElementById('sl-str').oninput=function(){document.getElementById('v-str').textContent=this.value;};
document.getElementById('sl-gap').oninput=function(){document.getElementById('v-gap').textContent=(this.value/10).toFixed(1)+'s';};
document.getElementById('sl-sens').oninput=function(){document.getElementById('v-sens').textContent=this.value;};

function setMode(m){
  mirrorMode=m;
  document.querySelectorAll('.mb').forEach(function(b){b.classList.toggle('sel',b.textContent.toLowerCase().indexOf(m.substring(0,3))>=0);});
  // show/hide strike sliders
  var show=m==='strikes';
  document.getElementById('row-strikes').style.opacity=show?'1':'0.3';
  document.getElementById('row-gap').style.opacity=show?'1':'0.3';
}

// ── Audio ─────────────────────────────────────────────────────────────
function ia(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
  mg=ac.createGain();mg.gain.value=0.88;mg.connect(ac.destination);
  // reverb
  var sr=ac.sampleRate,ln=sr*4.5,bf=ac.createBuffer(2,ln,sr);
  for(var c=0;c<2;c++){var d=bf.getChannelData(c);for(var i=0;i<ln;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/ln,1.9);}
  rv=ac.createConvolver();rv.buffer=bf;
  var rg=ac.createGain();rg.gain.value=0.44;mg.connect(rv);rv.connect(rg);rg.connect(ac.destination);
}
function rs(){if(ac&&ac.state==='suspended')ac.resume();}

// ── sDing (exact hangscape_v10) ───────────────────────────────────────
function sDing(f,v,r,t){
  var fr=440/f,atk=Math.max(.03,.025*Math.pow(fr,.3));
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=r*.78;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v*.65,t+atk);
  g.gain.setTargetAtTime(v*.45,t+atk,.3);g.gain.setTargetAtTime(.001,t+4,2.0);
  [[1,.55],[2.02,.30],[3.01,.10]].forEach(function(p){
    var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';
    o.frequency.value=f*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+6.5);
  });
  var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=.8;lfg.gain.value=.09;lfo.connect(lfg);lfg.connect(g.gain);lfo.start(t);lfo.stop(t+6.5);
}

// ── sStrike (exact hangscape_v10) ─────────────────────────────────────
function sStrike(f,v,r,t){
  var fr=440/f,atk=.005*Math.pow(fr,.35),dec=.45*Math.pow(fr,.45),gm=f<150?1.4:f<250?1.2:1;
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=r*.42;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v*.75*gm,t+atk);
  g.gain.setTargetAtTime(v*.12*gm,t+atk,dec*.2);g.gain.setTargetAtTime(.001,t+dec*.55,dec*.5);
  [[1,.58],[2.02,.25],[3.01,.09]].forEach(function(p){
    var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';
    o.frequency.value=f*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+.8);
  });
  var df=f*(f<250?1.2:1.28),dt=f*(f<250?.93:.97),dd=.05*Math.pow(fr,.4);
  var po=ac.createOscillator(),pg=ac.createGain();
  po.frequency.setValueAtTime(df,t);po.frequency.exponentialRampToValueAtTime(dt,t+dd);
  po.type='sine';pg.gain.setValueAtTime(v*(f<250?.28:.18)*gm,t);pg.gain.exponentialRampToValueAtTime(.001,t+dd*2);
  po.connect(pg);pg.connect(mg);po.start(t);po.stop(t+dd*3);
}

// ── Pad ───────────────────────────────────────────────────────────────
function killPad(fd){
  if(!curPadG||!ac)return;
  var t=ac.currentTime,f=fd||1.5;
  curPadG.gain.cancelScheduledValues(t);
  curPadG.gain.setValueAtTime(curPadG.gain.value,t);
  curPadG.gain.linearRampToValueAtTime(0,t+f);
  var os=curPadO.slice();curPadG=null;curPadO=[];
  setTimeout(function(){os.forEach(function(o){try{o.stop();}catch(e){}});},(f+.5)*1000);
}

function playPad(freq,vel,rvb){
  killPad(1.2);
  var v=vel*gV()*0.80,r=rvb,t=ac.currentTime,sus=gSus();
  var atk=Math.min(0.6,sus*0.10);
  var G=ac.createGain(),R=ac.createGain();R.gain.value=r*0.88;G.connect(mg);G.connect(R);R.connect(rv);
  G.gain.setValueAtTime(0,t);
  G.gain.linearRampToValueAtTime(v*0.15,t+0.025);
  G.gain.linearRampToValueAtTime(v,t+atk);
  G.gain.setTargetAtTime(v*0.72,t+atk,sus*0.28);
  G.gain.setTargetAtTime(0.001,t+atk+sus,sus*0.30);
  var os=[];
  var detune=[-5,0,5,8];
  [[1,.52],[2.02,.22],[3.01,.07]].forEach(function(p,pi){
    var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];
    o.type='sine';o.frequency.value=freq*p[0];o.detune.value=detune[pi]||0;
    o.connect(og);og.connect(G);o.start(t);o.stop(t+atk+sus+2);os.push(o);
  });
  var lf=ac.createOscillator(),lg=ac.createGain();lf.type='sine';lf.frequency.value=0.09;lg.gain.value=0.04;
  lf.connect(lg);lg.connect(G.gain);lf.start(t);lf.stop(t+atk+sus+2);os.push(lf);
  curPadG=G;curPadO=os;
}

// ── Fade Strikes ──────────────────────────────────────────────────────
function playFadeStrikes(freq,vel,rvb){
  var count=Math.round(gStr());
  var gap=gGap();
  var baseVol=vel*gV();
  var t=ac.currentTime;
  for(var i=0;i<count;i++){
    var v=baseVol*Math.pow(0.58,i); // each strike 58% of previous
    var st=t+i*gap;
    (function(fv,ft){
      // Use sDing for first (most resonant), sStrike for subsequent
      if(fv===baseVol)sDing(freq,fv*0.65,rvb,ft);
      else sStrike(freq,fv,rvb*0.6,ft);
    })(v,st);
  }
}

// ── Mirror response ───────────────────────────────────────────────────
function doMirror(idx,velocity,confidence){
  var freq=calFreqs[idx];
  var rvb=gR();

  // Update UI
  document.getElementById('det-note').textContent=N[idx][0]+N[idx][1];
  document.getElementById('det-hz').textContent=freq.toFixed(2)+' Hz';
  document.getElementById('mir-note').textContent=N[idx][0]+N[idx][1];
  document.getElementById('mir-hz').textContent=freq.toFixed(2)+' Hz';
  document.getElementById('conf-fill').style.width=Math.round(confidence*100)+'%';
  document.getElementById('vel-fill').style.width=Math.round(velocity*100)+'%';

  // Log
  var t=new Date();var ts=t.getHours()+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
  var line=ts+' · '+N[idx][0]+N[idx][1]+' · vel:'+Math.round(velocity*100)+'% · conf:'+Math.round(confidence*100)+'%';
  logLines.unshift(line);if(logLines.length>4)logLines.pop();
  for(var i=0;i<4;i++){
    var el=document.getElementById('l'+i);
    el.textContent=logLines[i]||'—';
    el.classList.toggle('new',i===0);
  }
  setTimeout(function(){var el=document.getElementById('l0');if(el)el.classList.remove('new');},800);

  // Status
  document.getElementById('status').textContent='▶ '+N[idx][0]+N[idx][1]+' · '+Math.round(velocity*100)+'%';

  // Play
  if(mirrorMode==='pad')playPad(freq,velocity,rvb);
  else playFadeStrikes(freq,velocity,rvb);

  // Silent window — short because sDing has slow attack (transient gate handles the rest)
  var silDur=mirrorMode==='pad'?(gSus()+1.5)*1000:((gStr()*gGap())+1.5)*1000;
  silUntil=Date.now()+Math.min(silDur,9000);

  // Clear status after
  setTimeout(function(){document.getElementById('status').textContent='listening...';},2500);
}

function stopAll(){
  killPad(1.0);
  document.getElementById('det-note').textContent='—';
  document.getElementById('mir-note').textContent='—';
  document.getElementById('det-hz').textContent='— Hz';
  document.getElementById('mir-hz').textContent='— Hz';
  document.getElementById('conf-fill').style.width='0%';
  document.getElementById('vel-fill').style.width='0%';
  document.getElementById('status').textContent='stopped';
}

// ── Microphone ────────────────────────────────────────────────────────
function toggleMic(){if(!mOn)startMic();else stopMic();}

function startMic(){
  ia();
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false})
  .then(function(s){
    mStr=s;
    var src=ac.createMediaStreamSource(s);
    mAn=ac.createAnalyser();mAn.fftSize=FFT;mAn.smoothingTimeConstant=0.4;
    src.connect(mAn);
    mTb=new Float32Array(FFT);
    mFb=new Float32Array(mAn.frequencyBinCount);
    mOn=true;
    document.getElementById('mic-btn').classList.add('on');
    document.getElementById('mic-status').textContent='on';
    document.getElementById('status').textContent='listening...';
    micPoll();
  }).catch(function(e){document.getElementById('mic-status').textContent='err';});
}

function stopMic(){
  mOn=false;
  if(_mTid)clearTimeout(_mTid);_mTid=null;
  if(mStr)mStr.getTracks().forEach(function(t){t.stop();});
  mStr=null;mAn=null;
  document.getElementById('mic-btn').classList.remove('on');
  document.getElementById('mic-status').textContent='off';
  document.getElementById('status').textContent='—';
}

function gRMS(b){var s=0;for(var i=0;i<b.length;i++)s+=b[i]*b[i];return Math.sqrt(s/b.length);}

// HPS with confidence score
function dHPS(fd,sr){
  var bH=sr/FFT,bw=5;
  function bE(f){var b=Math.round(f/bH),e=0;for(var k=Math.max(0,b-bw);k<=Math.min(fd.length-1,b+bw);k++){var l=Math.pow(10,fd[k]/20);e+=l*l;}return Math.sqrt(e);}
  var scores=[];
  calFreqs.forEach(function(f,i){
    var sc=bE(f)*Math.pow(bE(f*2),.6)*Math.pow(bE(f*3),.3)*Math.pow(bE(f*4),.1);
    scores.push({idx:i,sc:sc});
  });
  scores.sort(function(a,b){return b.sc-a.sc;});
  var best=scores[0],second=scores[1];
  // Confidence = how much better best is than second
  var conf=second.sc>0?Math.min(1,(best.sc-second.sc)/best.sc):1;
  return{idx:best.idx,conf:conf,score:best.sc};
}

function micPoll(){
  if(!mOn||!mAn)return;
  if(ac&&ac.state==='suspended')ac.resume();

  mAn.getFloatTimeDomainData(mTb);
  var r=gRMS(mTb);

  // Slow env average — adapts to room
  envAvg=envAvg*0.9988+r*0.0012;

  // History for average
  oH.push(r);if(oH.length>8)oH.shift();
  var avg=oH.reduce(function(a,b){return a+b;},0)/oH.length;

  // Transient detection — dE/dt
  var dE=r-prevRMS;
  prevRMS=r;

  var now=Date.now();

  if(now>silUntil){
    // Sensitivity slider adjusts threshold (1=sensitive, 10=strict)
    var sens=gSens();
    var threshMult=2.0+sens*0.35; // 2.35 to 5.5
    var thresh=Math.max(0.025,envAvg*threshMult);
    var transientThresh=thresh*0.45;

    // Three conditions must all be true:
    // 1. RMS above threshold
    // 2. RMS significantly above recent average
    // 3. Energy rising fast (transient — human strike)
    if(r>thresh && r>avg*1.7 && dE>transientThresh && now-lO>350){
      lO=now;
      var velocity=Math.min(1.0,Math.max(0.15,(r-thresh)/(thresh*2)+0.2));

      setTimeout(function(){
        if(!mAn||!mOn||Date.now()<silUntil)return;
        mAn.getFloatFrequencyData(mFb);
        var result=dHPS(mFb,ac.sampleRate);
        // Minimum confidence threshold — reject ambiguous detections
        var minConf=0.12+(gSens()-1)*0.04;
        if(result.conf>=minConf){
          doMirror(result.idx,velocity,result.conf);
        } else {
          document.getElementById('status').textContent='low conf: '+Math.round(result.conf*100)+'%';
          setTimeout(function(){document.getElementById('status').textContent='listening...';},800);
        }
      },75);
    }
  }
  _mTid=setTimeout(micPoll,22);
}

// ── Canvas ────────────────────────────────────────────────────────────
var cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
function sz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
window.addEventListener('resize',sz);sz();
var ph=0;
function anim(){
  requestAnimationFrame(anim);
  ph+=0.00015;
  ctx.clearRect(0,0,cv.width,cv.height);
  var CX=cv.width/2,CY=cv.height/2;
  for(var i=0;i<3;i++){
    var r=60+i*55+Math.sin(ph*(1.2+i*.3))*4;
    var op=0.018+0.008*Math.sin(ph*(1.4+i*.2));
    ctx.beginPath();ctx.arc(CX,CY*.35,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(160,120,255,'+op.toFixed(4)+')';ctx.lineWidth=1;ctx.stroke();
  }
}
anim();

document.addEventListener('touchstart',function(){if(ac&&ac.state==='suspended')ac.resume();},{passive:true});
</script>
