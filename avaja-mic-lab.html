<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AVAJA · Presence Lab v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#0e0c0a;color:#c8d4e0;font-family:Tahoma,sans-serif;overflow:hidden;user-select:none;}
#canvas{position:fixed;inset:0;pointer-events:none;}
/* bar */
#bar{position:fixed;top:0;left:0;right:0;height:44px;background:#1a1612;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.06);}
#bar-title{font-size:8px;letter-spacing:.25em;color:rgba(180,160,120,.5);text-transform:uppercase;}
#mic-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(140,180,220,.25);background:transparent;color:rgba(140,180,220,.65);font-size:14px;cursor:pointer;}
#mic-btn.on{border-color:rgba(100,210,150,.75);color:rgba(100,220,160,.9);box-shadow:0 0 10px rgba(60,200,120,.2);}
#mic-status{font-size:8px;letter-spacing:.1em;color:rgba(100,140,170,.4);}
/* tabs */
#tabs{position:fixed;top:44px;left:0;right:0;height:30px;background:#151210;display:flex;border-bottom:1px solid rgba(255,255,255,.05);}
.tab{flex:1;font-size:7px;letter-spacing:.15em;text-transform:uppercase;color:rgba(140,160,180,.4);background:transparent;border:none;cursor:pointer;}
.tab.sel{color:rgba(210,185,120,.85);border-bottom:2px solid rgba(185,140,20,.5);}
/* ring */
#ring-wrap{position:fixed;top:74px;left:0;right:0;bottom:185px;display:flex;align-items:center;justify-content:center;}
#ring{position:relative;width:290px;height:290px;}
.nb{position:absolute;width:44px;height:44px;border-radius:50%;border:1px solid rgba(140,170,200,.18);background:rgba(14,12,10,.88);color:rgba(180,200,220,.72);font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:Tahoma;}
.nb.dc{width:58px;height:58px;font-size:11px;font-weight:700;border-color:rgba(185,140,20,.4);color:rgba(210,185,120,.9);}
.nb.heard{border-color:rgba(100,220,160,.9);box-shadow:0 0 16px rgba(60,200,130,.4);}
/* tech row */
#tech-row{position:fixed;bottom:132px;left:0;right:0;display:flex;justify-content:center;gap:7px;padding:0 14px;}
.tb{flex:1;max-width:72px;height:34px;border-radius:6px;border:1px solid rgba(140,170,200,.15);background:rgba(20,18,14,.7);color:rgba(150,175,210,.55);font-size:8px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:Tahoma;}
.tb.sel{border-color:rgba(185,140,20,.55);color:rgba(210,185,120,.88);background:rgba(100,70,10,.25);}
/* sliders */
#sliders{position:fixed;bottom:48px;left:0;right:0;display:flex;gap:14px;padding:10px 16px;}
.sw{flex:1;display:flex;flex-direction:column;gap:4px;}
.sl{font-size:7px;letter-spacing:.15em;color:rgba(140,155,170,.35);text-transform:uppercase;}
input[type=range]{width:100%;height:2px;-webkit-appearance:none;background:rgba(180,160,120,.15);border-radius:1px;outline:none;accent-color:rgba(185,140,20,.7);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:rgba(185,140,20,.75);}
.sv{font-size:8px;color:rgba(185,140,20,.6);text-align:center;}
/* bottom */
#bottom{position:fixed;bottom:0;left:0;right:0;height:48px;background:#151210;display:flex;align-items:center;justify-content:center;gap:12px;border-top:1px solid rgba(255,255,255,.04);}
#heard{font-size:10px;letter-spacing:.12em;color:rgba(100,200,150,.7);}
#ntog{font-size:7px;letter-spacing:.12em;color:rgba(140,155,170,.35);text-transform:uppercase;padding:5px 10px;border:1px solid rgba(180,160,120,.12);border-radius:4px;cursor:pointer;background:transparent;font-family:Tahoma;}
#ntog.on{color:rgba(185,140,20,.7);border-color:rgba(185,140,20,.3);}
/* calibration panel */
#panel-cal{position:fixed;top:74px;left:0;right:0;bottom:0;display:none;flex-direction:column;}
#cal-scroll{flex:1;overflow-y:auto;padding:10px 14px 20px;}
.cal-row{display:flex;align-items:center;gap:6px;padding:7px 9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:4px;}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.cname{font-weight:700;min-width:30px;font-size:10px;color:rgba(210,185,120,.85);}
.ndg{display:flex;gap:2px;}
.ndg button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(180,200,220,.7);font:700 8px Tahoma;padding:2px 5px;border-radius:3px;cursor:pointer;}
.cal-inp{width:58px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:5px;color:rgba(210,210,220,.9);font:700 10px Tahoma;text-align:center;padding:3px;outline:none;}
.cal-inp:focus{border-color:rgba(185,140,20,.6);}
.hz{font-size:7px;color:rgba(140,155,170,.4);}
.cpb{background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(140,200,140,.6);font:8px Tahoma;padding:3px 8px;border-radius:5px;cursor:pointer;margin-right:auto;}
#cal-tech-row{padding:8px 14px 0;display:flex;gap:6px;}
.ctb{flex:1;height:30px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:rgba(20,18,14,.8);color:rgba(150,175,210,.5);font-size:8px;cursor:pointer;font-family:Tahoma;}
.ctb.sel{border-color:rgba(185,140,20,.5);color:rgba(210,185,120,.85);background:rgba(80,55,8,.3);}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="bar">
  <div id="bar-title">AVAJA · PRESENCE LAB v3</div>
  <div id="mic-status">off</div>
  <button id="mic-btn" onclick="toggleMic()">🎤</button>
</div>
<div id="tabs">
  <button class="tab sel" onclick="showTab('play')">Play</button>
  <button class="tab" onclick="showTab('cal')">Calibrate</button>
</div>

<!-- PLAY panel -->
<div id="panel-play">
  <div id="ring-wrap"><div id="ring"></div></div>
  <div id="tech-row">
    <button class="tb sel" onclick="setTech('open')">Open</button>
    <button class="tb" onclick="setTech('strike')">Strike</button>
    <button class="tb" onclick="setTech('ding')">Ding</button>
    <button class="tb" onclick="setTech('anti')">Anti</button>
    <button class="tb" onclick="setTech('chord')">Chord</button>
  </div>
  <div id="sliders">
    <div class="sw"><div class="sl">Vol</div><input type="range" id="svol" min="10" max="100" value="78" oninput="document.getElementById('vval').textContent=this.value"><div class="sv" id="vval">78</div></div>
    <div class="sw"><div class="sl">Reverb</div><input type="range" id="srvb" min="0" max="100" value="50" oninput="document.getElementById('rval').textContent=this.value"><div class="sv" id="rval">50</div></div>
    <div class="sw"><div class="sl">Decay</div><input type="range" id="sdec" min="10" max="100" value="60" oninput="document.getElementById('dval').textContent=this.value"><div class="sv" id="dval">60</div></div>
  </div>
  <div id="bottom">
    <div id="heard"></div>
    <button id="ntog" onclick="toggleNoise()">Noise OFF</button>
  </div>
</div>

<!-- CALIBRATE panel -->
<div id="panel-cal">
  <div id="cal-tech-row">
    <button class="ctb sel" id="ct_open" onclick="setCalTech('open',this)">Open</button>
    <button class="ctb" id="ct_strike" onclick="setCalTech('strike',this)">Strike</button>
    <button class="ctb" id="ct_ding" onclick="setCalTech('ding',this)">Ding</button>
  </div>
  <div id="cal-scroll"><div id="CAL_ROWS"></div></div>
</div>

<script>
// ── Notes — D minor hangpan (from hangscape_v10) ──────────────────────
var N=[
  ['F#','5',739.99],['E','5',659.26],['D','5',587.33],['C#','5',554.37],
  ['B','4',493.88],['A','4',440.00],['G#','4',415.30],['F#','4',369.99],
  ['E','4',329.63],['D','4',293.66],['C#','4',277.18],['B','3',246.94],
  ['A','3',220.00],['G#','3',207.65],['F#','3',185.00],['E','3',164.81],
  ['D','3',146.83],['B','2',123.47]
];
var calFreqs=N.map(function(x){return x[2];});
try{var cs=JSON.parse(localStorage.getItem('avaja_cal_v3'));if(cs&&cs.length===N.length)calFreqs=cs;}catch(e){}

// Chords — from hangscape_v10 CHORDS + DEEP_CHORDS adapted
var CHORDS={
  0:[0,4,8],1:[1,5,9],2:[2,6,10],3:[3,7,11],
  4:[4,8,12],5:[5,9,13],6:[6,10,14],7:[7,11,15],
  8:[8,12,16],9:[9,13,17],10:[10,14,17],11:[11,15,17],
  12:[12,16,17],13:[13,16,17],14:[14,16,17],15:[15,17],
  16:[16,17],17:[17,16]
};

var DOT_COLORS=['#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#c4a87a','#c4a87a','#c4a87a'];

var DING_IDX=16; // D3 center

// ── Audio (from hangscape_v10) ────────────────────────────────────────
var ac=null,mg=null,rv=null,sbus=null;
var noiseOn=false,nNodes={};
var tech='open';

function ia(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
  mg=ac.createGain();mg.gain.value=0.82;mg.connect(ac.destination);
  rv=ac.createConvolver();
  var sr=ac.sampleRate,ln=sr*4,bf=ac.createBuffer(2,ln,sr);
  for(var c=0;c<2;c++){var d=bf.getChannelData(c);for(var i=0;i<ln;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/ln,2);}
  rv.buffer=bf;
  var rg=ac.createGain();rg.gain.value=0.42;mg.connect(rv);rv.connect(rg);rg.connect(ac.destination);
  sbus=ac.createGain();sbus.gain.value=1;sbus.connect(mg);
}
function rs(){if(ac&&ac.state==='suspended')ac.resume();}

// ── Sound functions (exact from hangscape_v10) ────────────────────────
function sOpen(freq,vol,rvb,t){
  var fr=440/freq,atk=0.025*Math.pow(fr,.3),dec=2.5*Math.pow(fr,.2);
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=rvb*.6;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+atk);
  g.gain.setTargetAtTime(vol*.5,t+atk,dec*.15);g.gain.setTargetAtTime(.001,t+dec*.6,dec*.5);
  [[1,.55],[2.02,.30],[3.01,.10]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=freq*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+2);});
  var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=.8;lfg.gain.value=.08;lfo.connect(lfg);lfg.connect(g.gain);lfo.start(t);lfo.stop(t+dec+2);
}
function sStrike(freq,vol,rvb,t){
  var fr=440/freq,atk=.005*Math.pow(fr,.35),dec=.45*Math.pow(fr,.45),sus=.15+.08*(freq/440),gm=freq<150?1.4:freq<250?1.2:1;
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=rvb*.42;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol*.75*gm,t+atk);
  g.gain.setTargetAtTime(vol*sus*.5*gm,t+atk,dec*.2);g.gain.setTargetAtTime(.001,t+dec*.55,dec*.5);
  [[1,.58],[2.02,.25],[3.01,.09]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=freq*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+.8);});
  var df=freq*(freq<250?1.2:1.28),dt=freq*(freq<250?.93:.97),dd=.05*Math.pow(fr,.4);
  var po=ac.createOscillator(),pg=ac.createGain();po.frequency.setValueAtTime(df,t);po.frequency.exponentialRampToValueAtTime(dt,t+dd);po.type='sine';pg.gain.setValueAtTime(vol*(freq<250?.28:.18)*gm,t);pg.gain.exponentialRampToValueAtTime(.001,t+dd*2);po.connect(pg);pg.connect(mg);po.start(t);po.stop(t+dd*3);
  var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=.8;lfg.gain.value=.04;lfo.connect(lfg);lfg.connect(g.gain);lfo.start(t);lfo.stop(t+dec+.3);
  if(freq<140){var sg=ac.createGain();sg.connect(mg);sg.gain.setValueAtTime(0,t);sg.gain.linearRampToValueAtTime(vol*.22,t+.04);sg.gain.exponentialRampToValueAtTime(.001,t+dec*1.8);var sub=ac.createOscillator(),subg=ac.createGain();subg.gain.value=.6;sub.type='sine';sub.frequency.value=freq*.5;sub.connect(subg);subg.connect(sg);sub.start(t);sub.stop(t+dec*2);}
}
function sDing(freq,vol,rvb,t){
  var fr=440/freq,atk=Math.max(.03,.025*Math.pow(fr,.3)),dec=4.0;
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=rvb*.78;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol*.65,t+atk);
  g.gain.setTargetAtTime(vol*.45,t+atk,.3);g.gain.setTargetAtTime(.001,t+dec,2.0);
  [[1,.55],[2.02,.30],[3.01,.10]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=freq*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+2.5);});
  var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=.8;lfg.gain.value=.09;lfo.connect(lfg);lfg.connect(g.gain);lfo.start(t);lfo.stop(t+dec+2.5);
}
function sAnti(freq,vol,rvb,t,delay){
  var fr=440/freq,atk=.008*Math.pow(fr,.35),dec=.5*Math.pow(fr,.45),gm=freq<150?1.3:1;
  var d=(delay||1400)/1000;
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=rvb*.4;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol*.68*gm,t+atk);
  g.gain.setTargetAtTime(vol*.08*gm,t+atk,dec*.22);g.gain.setTargetAtTime(.001,t+dec*.6+d+.1,dec*.5);
  [[1,.55],[2.02,.28],[3.01,.09]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=freq*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+d+.3);});
  var td=t+d,ag=ac.createGain();ag.connect(mg);
  ag.gain.setValueAtTime(0,td);ag.gain.linearRampToValueAtTime(-vol*.68*gm,td+.015);ag.gain.exponentialRampToValueAtTime(.001,td+.06);
  [[1,.55],[2.02,.25]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=freq*p[0];o.connect(og);og.connect(ag);o.start(td);o.stop(td+.1);});
}

function playNote(freq,t,vol,rvb){
  if(tech==='open')sOpen(freq,vol,rvb,t);
  else if(tech==='strike')sStrike(freq,vol,rvb,t);
  else if(tech==='ding')sDing(freq,vol,rvb,t);
  else if(tech==='anti')sAnti(freq,vol,rvb,t,1400);
  else sPad(freq,t,vol,rvb);
}

function sPad(rootFreq,t,vol,rvb){
  // find index of root
  var ri=calFreqs.indexOf(rootFreq);if(ri<0){ri=0;for(var i=1;i<calFreqs.length;i++)if(Math.abs(calFreqs[i]-rootFreq)<Math.abs(calFreqs[ri]-rootFreq))ri=i;}
  var idxs=CHORDS[ri]||[ri];
  var v=vol*.32;
  idxs.forEach(function(idx,i){
    var f=calFreqs[idx];
    var dec=2.5*Math.pow(440/f,.2),atk=Math.max(.025,.03*Math.pow(440/f,.3));
    var g=ac.createGain(),rg2=ac.createGain();rg2.gain.value=rvb*.72;g.connect(mg);g.connect(rg2);rg2.connect(rv);
    var ts=t+i*.025;
    g.gain.setValueAtTime(0,ts);g.gain.linearRampToValueAtTime(v,ts+atk);
    g.gain.setTargetAtTime(v*.45,ts+atk,dec*.18);g.gain.setTargetAtTime(.001,ts+dec*.65,dec*.55);
    [[1,.55],[2.02,.28],[3.01,.09]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=f*p[0];o.connect(og);og.connect(g);o.start(ts);o.stop(ts+dec+2);});
    var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=.7;lfg.gain.value=.07;lfo.connect(lfg);lfg.connect(g.gain);lfo.start(ts);lfo.stop(ts+dec+2);
  });
}

function gV(){return+document.getElementById('svol').value/100;}
function gR(){return+document.getElementById('srvb').value/100;}

function play(idx){
  ia();rs();
  dn(.4,.8);
  playNote(calFreqs[idx],ac.currentTime,gV(),gR());
  rpl(calFreqs[idx]);
}

function dn(a,s){
  if(!sbus)return;var t=ac.currentTime;
  sbus.gain.cancelScheduledValues(t);sbus.gain.setValueAtTime(sbus.gain.value,t);
  sbus.gain.linearRampToValueAtTime(1-a,t+.05);sbus.gain.linearRampToValueAtTime(1,t+.05+s);
}

// noise
function mBuf(type){
  var sr=ac.sampleRate,n=sr*60,buf=ac.createBuffer(2,n,sr);
  for(var c=0;c<2;c++){var d=buf.getChannelData(c);if(type==='b'){var l=0;for(var i=0;i<n;i++){var w=Math.random()*2-1;l=(l+.02*w)/1.02;d[i]=l*3.5;}}else{var b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;for(var i=0;i<n;i++){var w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.96900*b2+w*.1538520;b3=.86650*b3+w*.3104856;b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;d[i]=(b0+b1+b2+b3+b4+b5+w*.5362)*.11;}}}return buf;
}
function toggleNoise(){
  ia();noiseOn=!noiseOn;
  var el=document.getElementById('ntog');el.textContent=noiseOn?'Noise ON':'Noise OFF';el.classList.toggle('on',noiseOn);
  if(noiseOn){
    ['b','p'].forEach(function(tp){
      var src=ac.createBufferSource();src.buffer=mBuf(tp);src.loop=true;
      var f1=ac.createBiquadFilter(),f2=ac.createBiquadFilter();f1.type='highpass';f2.type='lowpass';
      if(tp==='b'){f1.frequency.value=20;f2.frequency.value=180;}else{f1.frequency.value=180;f2.frequency.value=600;}
      var g=ac.createGain();g.gain.value=0;src.connect(f1);f1.connect(f2);f2.connect(g);g.connect(sbus);
      var rg=ac.createGain();rg.gain.value=.3;g.connect(rg);rg.connect(rv);src.start();
      g.gain.setTargetAtTime(tp==='b'?.06:.04,ac.currentTime,3);nNodes[tp]={src:src,g:g};
    });
  } else {
    Object.keys(nNodes).forEach(function(k){if(nNodes[k]){try{nNodes[k].g.gain.setTargetAtTime(0,ac.currentTime,1.5);}catch(e){}nNodes[k]=null;}});
  }
}

// ── Canvas ────────────────────────────────────────────────────────────
var cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
var W,H,CX,CY;
function sz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;CX=W/2;CY=H/2;}
window.addEventListener('resize',sz);sz();
var rps=[],rngs=[];
for(var i=0;i<4;i++)rngs.push({r:65+i*52,ph:i*.9,sp:.0002+i*.00015});
function rpl(f){var h=Math.round(30+80*(f-120)/(740-120));rps.push({r:50,op:.5,sp:2.8,col:'hsla('+h+',50%,65%,'});}
function df(){
  requestAnimationFrame(df);ctx.clearRect(0,0,W,H);
  rngs.forEach(function(r){r.ph+=r.sp;var op=.018+.008*Math.sin(r.ph);ctx.beginPath();ctx.arc(CX,CY*.52,r.r+Math.sin(r.ph*1.8)*2,0,Math.PI*2);ctx.strokeStyle='rgba(160,130,80,'+op.toFixed(3)+')';ctx.lineWidth=1;ctx.stroke();});
  rps=rps.filter(function(r){r.r+=r.sp;r.op*=.94;if(r.op<.01)return false;ctx.beginPath();ctx.arc(CX,CY*.52,r.r,0,Math.PI*2);ctx.strokeStyle=r.col+r.op.toFixed(3)+')';ctx.lineWidth=1.5;ctx.stroke();return true;});
}
df();

// ── Note ring ─────────────────────────────────────────────────────────
var ring=document.getElementById('ring'),nbEls=[];
N.forEach(function(s,i){
  var el=document.createElement('button');
  el.className='nb'+(i===DING_IDX?' dc':'');
  el.textContent=s[0]+s[1];
  if(i===DING_IDX){el.style.cssText='left:50%;top:50%;transform:translate(-50%,-50%)';}
  else{var ot=N.length-1,j=i<DING_IDX?i:i-1,a=(j/ot)*Math.PI*2-Math.PI/2,r=122,x=50+r/2.9*Math.cos(a),y=50+r/2.9*Math.sin(a);el.style.cssText='left:'+x+'%;top:'+y+'%;transform:translate(-50%,-50%)';}
  el.addEventListener('touchstart',function(e){e.preventDefault();play(i);fl(el);},{passive:false});
  el.addEventListener('mousedown',function(){play(i);fl(el);});
  ring.appendChild(el);nbEls.push(el);
});
function fl(el){el.style.borderColor='rgba(185,140,20,.8)';setTimeout(function(){el.style.borderColor='';},130);}
function mH(idx){nbEls.forEach(function(e){e.classList.remove('heard');});if(idx>=0&&nbEls[idx]){nbEls[idx].classList.add('heard');setTimeout(function(){if(nbEls[idx])nbEls[idx].classList.remove('heard');},1800);}}
function setTech(t){tech=t;document.querySelectorAll('.tb').forEach(function(b){b.classList.toggle('sel',b.textContent.toLowerCase()===t);});}

// ── Tabs ──────────────────────────────────────────────────────────────
function showTab(t){
  document.getElementById('panel-play').style.display=t==='play'?'block':'none';
  document.getElementById('panel-cal').style.display=t==='cal'?'flex':'none';
  document.querySelectorAll('.tab').forEach(function(b){b.classList.toggle('sel',b.textContent.toLowerCase()===t);});
  if(t==='cal')buildCal();
}

// ── Calibration (from hangscape_v10) ─────────────────────────────────
var calTech='open';
function buildCal(){
  var el=document.getElementById('CAL_ROWS'),html='';
  for(var i=0;i<N.length;i++){
    html+='<div class="cal-row">';
    html+='<div class="cdot" style="background:'+DOT_COLORS[i]+'"></div>';
    html+='<span class="cname">'+N[i][0]+N[i][1]+'</span>';
    html+='<div class="ndg"><button onclick="nudge('+i+',-1)">−1</button><button onclick="nudge('+i+',-.1)">−.1</button><button onclick="nudge('+i+',.1)">+.1</button><button onclick="nudge('+i+',1)">+1</button></div>';
    html+='<input class="cal-inp" type="number" id="CF'+i+'" value="'+calFreqs[i].toFixed(2)+'" step="0.1" min="20" max="2000" oninput="calFreqs['+i+']=+this.value;saveCal()">';
    html+='<span class="hz">Hz</span>';
    html+='<button class="cpb" onclick="ia();rs();var t=calTech;if(t===\'open\')sOpen(calFreqs['+i+'],0.7,0.45,ac.currentTime);else if(t===\'strike\')sStrike(calFreqs['+i+'],0.7,0.45,ac.currentTime);else sDing(calFreqs['+i+'],0.7,0.45,ac.currentTime)">▶</button>';
    html+='</div>';
  }
  el.innerHTML=html;
}
function nudge(idx,d){
  calFreqs[idx]=parseFloat((calFreqs[idx]+d).toFixed(2));
  var inp=document.getElementById('CF'+idx);if(inp)inp.value=calFreqs[idx].toFixed(2);
  ia();rs();
  if(calTech==='open')sOpen(calFreqs[idx],0.7,0.45,ac.currentTime);
  else if(calTech==='strike')sStrike(calFreqs[idx],0.7,0.45,ac.currentTime);
  else sDing(calFreqs[idx],0.7,0.45,ac.currentTime);
  saveCal();
}
function setCalTech(t,btn){
  calTech=t;
  document.querySelectorAll('.ctb').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
}
function saveCal(){try{localStorage.setItem('avaja_cal_v3',JSON.stringify(calFreqs));}catch(e){}}

// ── Microphone ────────────────────────────────────────────────────────
var mStr=null,mAn=null,mTb=null,mFb=null,mOn=false,lO=0,oH=[],FFT=8192;
var hEl=document.getElementById('heard'),mSt=document.getElementById('mic-status');
var silentUntil=0;

function toggleMic(){if(!mOn)startMic();else stopMic();}
function startMic(){
  ia();
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false})
  .then(function(s){
    mStr=s;var src=ac.createMediaStreamSource(s);
    mAn=ac.createAnalyser();mAn.fftSize=FFT;mAn.smoothingTimeConstant=0.5;
    src.connect(mAn);mTb=new Float32Array(FFT);mFb=new Float32Array(mAn.frequencyBinCount);
    mOn=true;document.getElementById('mic-btn').classList.add('on');mSt.textContent='on';
    mTick();
  }).catch(function(e){mSt.textContent='denied:'+e.name;});
}
function stopMic(){
  mOn=false;if(mStr)mStr.getTracks().forEach(function(t){t.stop();});
  document.getElementById('mic-btn').classList.remove('on');mSt.textContent='off';
}
function gRMS(b){var s=0;for(var i=0;i<b.length;i++)s+=b[i]*b[i];return Math.sqrt(s/b.length);}
function dHPS(fd,sr){
  var bH=sr/FFT,bw=5;
  function bE(f){var b=Math.round(f/bH),e=0;for(var i=Math.max(0,b-bw);i<=Math.min(fd.length-1,b+bw);i++){var l=Math.pow(10,fd[i]/20);e+=l*l;}return Math.sqrt(e);}
  var best=-1,bs=-Infinity;
  calFreqs.forEach(function(f,i){var sc=bE(f)*Math.pow(bE(f*2),.6)*Math.pow(bE(f*3),.3)*Math.pow(bE(f*4),.1);if(sc>bs){bs=sc;best=i;}});
  return best;
}
function echo(idx){
  ia();rs();
  var t=ac.currentTime+.06;
  silentUntil=Date.now()+950;
  sPad(calFreqs[idx],t,gV(),gR());
  mH(idx);
  hEl.textContent='← '+N[idx][0]+N[idx][1];
  setTimeout(function(){hEl.textContent='';},2500);
}
function mTick(){
  if(!mOn||!mAn)return;
  if(ac&&ac.state==='suspended')ac.resume();
  requestAnimationFrame(mTick);
  mAn.getFloatTimeDomainData(mTb);
  var r=gRMS(mTb);
  oH.push(r);if(oH.length>8)oH.shift();
  var avg=oH.reduce(function(a,b){return a+b;},0)/oH.length;
  var now=Date.now();
  if(now<silentUntil)return;
  if(r>0.03&&r>avg*1.5&&now-lO>280){
    lO=now;dn(.3,.6);
    setTimeout(function(){
      if(!mAn||Date.now()<silentUntil)return;
      mAn.getFloatFrequencyData(mFb);
      var idx=dHPS(mFb,ac.sampleRate);
      if(idx>=0)echo(idx);
    },80);
  }
}
document.addEventListener('touchstart',function(){if(ac&&ac.state==='suspended')ac.resume();},{passive:true});
</script>
