<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AVAJA · Presence Lab v15</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#0e0c0a;color:#c8d4e0;font-family:Tahoma,sans-serif;overflow:hidden;user-select:none;}
#canvas{position:fixed;inset:0;pointer-events:none;}
#bar{position:fixed;top:0;left:0;right:0;height:44px;background:#1a1612;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.06);}
#bar-title{font-size:8px;letter-spacing:.25em;color:rgba(180,160,120,.5);text-transform:uppercase;}
#mic-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(140,180,220,.25);background:transparent;color:rgba(140,180,220,.65);font-size:14px;cursor:pointer;}
#mic-btn.on{border-color:rgba(100,210,150,.75);color:rgba(100,220,160,.9);box-shadow:0 0 10px rgba(60,200,120,.2);}
#mic-status{font-size:8px;letter-spacing:.1em;color:rgba(100,140,170,.4);}
#tabs{position:fixed;top:44px;left:0;right:0;height:30px;background:#151210;display:flex;border-bottom:1px solid rgba(255,255,255,.05);}
.tab{flex:1;font-size:7px;letter-spacing:.15em;text-transform:uppercase;color:rgba(140,160,180,.4);background:transparent;border:none;cursor:pointer;}
.tab.sel{color:rgba(210,185,120,.85);border-bottom:2px solid rgba(185,140,20,.5);}
/* ring */
#ring-wrap{position:fixed;top:74px;left:0;right:0;bottom:265px;display:flex;align-items:center;justify-content:center;}
#ring{position:relative;width:280px;height:280px;}
.nb{position:absolute;width:43px;height:43px;border-radius:50%;border:1px solid rgba(140,170,200,.18);background:rgba(14,12,10,.88);color:rgba(180,200,220,.72);font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:Tahoma;transition:border-color .15s;}
.nb.dc{width:56px;height:56px;font-size:11px;font-weight:700;border-color:rgba(185,140,20,.4);color:rgba(210,185,120,.9);}
.nb.heard{border-color:rgba(100,220,160,.9);box-shadow:0 0 16px rgba(60,200,130,.4);}
/* technique */
#tech-row{position:fixed;bottom:210px;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:0 12px;}
.tb{flex:1;max-width:65px;height:30px;border-radius:5px;border:1px solid rgba(140,170,200,.15);background:rgba(20,18,14,.7);color:rgba(150,175,210,.55);font-size:7px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;font-family:Tahoma;}
.tb.sel{border-color:rgba(185,140,20,.55);color:rgba(210,185,120,.88);background:rgba(100,70,10,.25);}
/* chord mode */
#chord-row{position:fixed;bottom:176px;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:0 12px;}
.cb2{flex:1;max-width:80px;height:24px;border-radius:4px;border:1px solid rgba(140,170,200,.12);background:rgba(15,14,10,.6);color:rgba(130,160,190,.45);font-size:7px;cursor:pointer;font-family:Tahoma;}
.cb2.sel{border-color:rgba(100,180,140,.5);color:rgba(120,200,160,.8);background:rgba(20,60,40,.3);}
/* ambient layers */
#layers{position:fixed;bottom:96px;left:0;right:0;padding:6px 12px;display:flex;gap:8px;}
.layer{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:6px 8px;display:flex;flex-direction:column;gap:5px;}
.layer.on{border-color:rgba(185,140,20,.3);background:rgba(40,30,5,.4);}
.ly-top{display:flex;align-items:center;justify-content:space-between;}
.ly-name{font-size:7px;letter-spacing:.12em;color:rgba(160,145,110,.5);text-transform:uppercase;}
.ly-tog{width:24px;height:14px;border-radius:7px;background:rgba(255,255,255,.08);border:none;cursor:pointer;position:relative;transition:background .2s;}
.ly-tog.on{background:rgba(185,140,20,.6);}
.ly-tog::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;}
.ly-tog.on::after{left:12px;}
input[type=range]{width:100%;height:2px;-webkit-appearance:none;background:rgba(180,160,120,.15);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:rgba(185,140,20,.7);}
/* pad sliders */
#sliders{position:fixed;bottom:48px;left:0;right:0;padding:6px 12px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.sw{display:flex;flex-direction:column;gap:3px;}
.sl{font-size:7px;letter-spacing:.1em;color:rgba(140,155,170,.35);text-transform:uppercase;text-align:center;}
.sv{font-size:8px;color:rgba(185,140,20,.6);text-align:center;}
/* bottom */
#bottom{position:fixed;bottom:0;left:0;right:0;height:48px;background:#151210;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-top:1px solid rgba(255,255,255,.04);}
#heard{font-size:9px;letter-spacing:.1em;color:rgba(100,200,150,.7);}
#fade-btn{font-size:7px;letter-spacing:.08em;color:rgba(200,150,80,.6);text-transform:uppercase;padding:4px 8px;border:1px solid rgba(185,120,20,.22);border-radius:4px;cursor:pointer;background:transparent;font-family:Tahoma;}
/* calibration */
#panel-cal{position:fixed;top:74px;left:0;right:0;bottom:0;display:none;flex-direction:column;}
#cal-scroll{flex:1;overflow-y:auto;padding:10px 14px 20px;}
.cal-row{display:flex;align-items:center;gap:5px;padding:6px 8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:4px;}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.cname{font-weight:700;min-width:30px;font-size:10px;color:rgba(210,185,120,.85);}
.ndg{display:flex;gap:2px;}
.ndg button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(180,200,220,.7);font:700 8px Tahoma;padding:2px 5px;border-radius:3px;cursor:pointer;}
.cal-inp{width:56px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:5px;color:rgba(210,210,220,.9);font:700 10px Tahoma;text-align:center;padding:3px;outline:none;}
.hz{font-size:7px;color:rgba(140,155,170,.4);}
.cpb{background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(140,200,140,.6);font:8px Tahoma;padding:3px 8px;border-radius:5px;cursor:pointer;margin-right:auto;}
#cal-tech-row{padding:8px 14px 0;display:flex;gap:6px;}
.ctb{flex:1;height:30px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:rgba(20,18,14,.8);color:rgba(150,175,210,.5);font-size:8px;cursor:pointer;font-family:Tahoma;}
.ctb.sel{border-color:rgba(185,140,20,.5);color:rgba(210,185,120,.85);background:rgba(80,55,8,.3);}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="bar">
  <div id="bar-title">AVAJA · PRESENCE LAB v15</div>
  <div id="mic-status">off</div>
  <button id="mic-btn" onclick="toggleMic()">🎤</button>
</div>
<div id="tabs">
  <button class="tab sel" onclick="showTab('play')">Play</button>
  <button class="tab" onclick="showTab('cal')">Calibrate</button>
</div>

<div id="panel-play">
  <div id="ring-wrap"><div id="ring"></div></div>

  <div id="tech-row">
    <button class="tb sel" onclick="setTech('open')">Open</button>
    <button class="tb" onclick="setTech('strike')">Strike</button>
    <button class="tb" onclick="setTech('ding')">Ding</button>
    <button class="tb" onclick="setTech('anti')">Anti</button>
    <button class="tb" onclick="setTech('chord')">Chord</button>
  </div>

  <div id="chord-row">
    <button class="cb2" onclick="setChordMode('interval')">Interval</button>
    <button class="cb2 sel" onclick="setChordMode('harmonic')">Harmonic</button>
    <button class="cb2" onclick="setChordMode('deep')">Deep</button>
  </div>



  <!-- Strum mode -->
  <div id="strum-row" style="position:fixed;bottom:152px;left:0;right:0;display:flex;justify-content:center;gap:8px;padding:0 12px;">
    <button class="cb2 sel" id="sm-pad" onclick="setStrumMode('pad')">Pad</button>
    <button class="cb2" id="sm-strum" onclick="setStrumMode('strum')">Strum</button>
    <button class="cb2" id="sm-pulse" onclick="setStrumMode('pulse')">Pulse</button>
  </div>

  <!-- Pad sliders -->
  <div id="sliders">
    <div class="sw"><div class="sl">Vol</div><input type="range" id="svol" min="10" max="100" value="85" oninput="document.getElementById('vval').textContent=this.value"><div class="sv" id="vval">85</div></div>
    <div class="sw"><div class="sl">Reverb</div><input type="range" id="srvb" min="0" max="100" value="55" oninput="document.getElementById('rval').textContent=this.value"><div class="sv" id="rval">55</div></div>
    <div class="sw"><div class="sl">Sustain</div><input type="range" id="ssus" min="2" max="10" value="5" oninput="document.getElementById('sval').textContent=this.value+'s'"><div class="sv" id="sval">5s</div></div>
    <div class="sw"><div class="sl">Fade</div><input type="range" id="sfade" min="1" max="10" value="3" oninput="document.getElementById('fval').textContent=this.value+'s'"><div class="sv" id="fval">3s</div></div>
  </div>

  <div id="bottom">
    <div id="heard"></div>
    <button id="fade-btn" onclick="fadeOutNow()">Fade Out</button>
  </div>
</div>

<div id="panel-cal">
  <div id="cal-tech-row">
    <button class="ctb sel" onclick="setCalTech('open',this)">Open</button>
    <button class="ctb" onclick="setCalTech('strike',this)">Strike</button>
    <button class="ctb" onclick="setCalTech('ding',this)">Ding</button>
  </div>
  <div id="cal-scroll"><div id="CAL_ROWS"></div></div>
</div>

<script>
// ── Notes ─────────────────────────────────────────────────────────────
var N=[
  ['F#','5',739.99],['E','5',659.26],['D','5',587.33],['C#','5',554.37],
  ['B','4',493.88],['A','4',440.00],['G#','4',415.30],['F#','4',369.99],
  ['E','4',329.63],['D','4',293.66],['C#','4',277.18],['B','3',246.94],
  ['A','3',220.00],['G#','3',207.65],['F#','3',185.00],['E','3',164.81],
  ['D','3',146.83],['B','2',123.47]
];
var calFreqs=N.map(function(x){return x[2];});
try{var cs=JSON.parse(localStorage.getItem('avaja_cal_v3'));if(cs&&cs.length===N.length)calFreqs=cs;}catch(e){}

var CHORDS_INTERVAL={0:[0,4,8],1:[1,5,9],2:[2,6,10],3:[3,7,11],4:[4,8,12],5:[5,9,13],6:[6,10,14],7:[7,11,15],8:[8,12,16],9:[9,13,17],10:[10,14,17],11:[11,15,17],12:[12,16,17],13:[13,16,17],14:[14,16,17],15:[15,17],16:[16,11,8],17:[17,16,12]};
var CHORDS_HARMONIC={0:[0,4,8],1:[1,5,9],2:[2,6,10],3:[3,7,11],4:[4,8,12],5:[5,9,13],6:[6,10,14],7:[7,11,15],8:[8,12,16],9:[9,13,17],10:[10,14,17],11:[11,15,17],12:[12,16,17],13:[13,16,17],14:[14,16,17],15:[15,16,17],16:[16,12,8],17:[17,16,12]};
var CHORDS_DEEP={0:[0,4,8,12],1:[1,5,9,13],2:[2,6,10,14],3:[3,7,11,15],4:[4,8,12,16],5:[5,9,13,17],6:[6,10,14,17],7:[7,11,15,17],8:[8,12,16,17],9:[9,13,16,17],10:[10,14,16,17],11:[11,15,16,17],12:[12,16,11,8],13:[13,16,12,8],14:[14,16,12,9],15:[15,16,12,8],16:[16,12,8,4],17:[17,16,12,8]};
var DOT_COLORS=['#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c9c','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#6b9c6a','#c4a87a','#c4a87a','#c4a87a'];
var DING_IDX=16;

// ── Audio ─────────────────────────────────────────────────────────────
var ac=null,mg=null,rv=null;
var tech='open',chordMode='harmonic';
var currentPadGain=null,currentPadOscs=[];
var currentChordIdxs=[16,12,8];

function ia(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
  mg=ac.createGain();mg.gain.value=0.82;mg.connect(ac.destination);
  rv=ac.createConvolver();
  var sr=ac.sampleRate,ln=sr*4,bf=ac.createBuffer(2,ln,sr);
  for(var c=0;c<2;c++){var d=bf.getChannelData(c);for(var i=0;i<ln;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/ln,2);}
  rv.buffer=bf;
  var rg=ac.createGain();rg.gain.value=0.42;mg.connect(rv);rv.connect(rg);rg.connect(ac.destination);
}

function rs(){if(ac&&ac.state==='suspended')ac.resume();}
function gV(){return+document.getElementById('svol').value/100;}
function gR(){return+document.getElementById('srvb').value/100;}
function gSus(){return+document.getElementById('ssus').value;}
function gFade(){return+document.getElementById('sfade').value;}

// ── Sound functions (exact from hangscape_v10) ────────────────────────
function sOpen(freq,vol,rvb,t){
  var fr=440/freq,atk=0.025*Math.pow(fr,.3),dec=2.5*Math.pow(fr,.2);
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=rvb*.6;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+atk);
  g.gain.setTargetAtTime(vol*.5,t+atk,dec*.15);g.gain.setTargetAtTime(.001,t+dec*.6,dec*.5);
  [[1,.55],[2.02,.30],[3.01,.10]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=freq*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+2);});
  var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=.8;lfg.gain.value=.08;lfo.connect(lfg);lfg.connect(g.gain);lfo.start(t);lfo.stop(t+dec+2);
}
function sStrike(freq,vol,rvb,t){
  var fr=440/freq,atk=.005*Math.pow(fr,.35),dec=.45*Math.pow(fr,.45),sus=.15+.08*(freq/440),gm=freq<150?1.4:freq<250?1.2:1;
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=rvb*.42;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol*.75*gm,t+atk);
  g.gain.setTargetAtTime(vol*sus*.5*gm,t+atk,dec*.2);g.gain.setTargetAtTime(.001,t+dec*.55,dec*.5);
  [[1,.58],[2.02,.25],[3.01,.09]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=freq*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+.8);});
  var df=freq*(freq<250?1.2:1.28),dt=freq*(freq<250?.93:.97),dd=.05*Math.pow(fr,.4);
  var po=ac.createOscillator(),pg=ac.createGain();po.frequency.setValueAtTime(df,t);po.frequency.exponentialRampToValueAtTime(dt,t+dd);po.type='sine';pg.gain.setValueAtTime(vol*(freq<250?.28:.18)*gm,t);pg.gain.exponentialRampToValueAtTime(.001,t+dd*2);po.connect(pg);pg.connect(mg);po.start(t);po.stop(t+dd*3);
  var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=.8;lfg.gain.value=.04;lfo.connect(lfg);lfg.connect(g.gain);lfo.start(t);lfo.stop(t+dec+.3);
  if(freq<140){var sg=ac.createGain();sg.connect(mg);sg.gain.setValueAtTime(0,t);sg.gain.linearRampToValueAtTime(vol*.22,t+.04);sg.gain.exponentialRampToValueAtTime(.001,t+dec*1.8);var sub=ac.createOscillator(),subg=ac.createGain();subg.gain.value=.6;sub.type='sine';sub.frequency.value=freq*.5;sub.connect(subg);subg.connect(sg);sub.start(t);sub.stop(t+dec*2);}
}
function sDing(freq,vol,rvb,t){
  var fr=440/freq,atk=Math.max(.03,.025*Math.pow(fr,.3)),dec=4.0;
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=rvb*.78;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol*.65,t+atk);
  g.gain.setTargetAtTime(vol*.45,t+atk,.3);g.gain.setTargetAtTime(.001,t+dec,2.0);
  [[1,.55],[2.02,.30],[3.01,.10]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=freq*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+2.5);});
  var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=.8;lfg.gain.value=.09;lfo.connect(lfg);lfg.connect(g.gain);lfo.start(t);lfo.stop(t+dec+2.5);
}
function sAnti(freq,vol,rvb,t){
  var fr=440/freq,atk=.008*Math.pow(fr,.35),dec=.5*Math.pow(fr,.45),gm=freq<150?1.3:1,d=1.4;
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=rvb*.4;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol*.68*gm,t+atk);
  g.gain.setTargetAtTime(vol*.08*gm,t+atk,dec*.22);g.gain.setTargetAtTime(.001,t+dec*.6+d+.1,dec*.5);
  [[1,.55],[2.02,.28],[3.01,.09]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=freq*p[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+dec+d+.3);});
  var td=t+d,ag=ac.createGain();ag.connect(mg);
  ag.gain.setValueAtTime(0,td);ag.gain.linearRampToValueAtTime(-vol*.68*gm,td+.015);ag.gain.exponentialRampToValueAtTime(.001,td+.06);
  [[1,.55],[2.02,.25]].forEach(function(p){var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=freq*p[0];o.connect(og);og.connect(ag);o.start(td);o.stop(td+.1);});
}

// ── Gu Bass (from hangscape_v10, slider-free version) ─────────────────
function sGuBass(vol,t){
  var kd=2.2,sf=41;
  var ko=ac.createOscillator(),kg=ac.createGain();
  ko.frequency.setValueAtTime(80,t);ko.frequency.exponentialRampToValueAtTime(28,t+kd*.5);
  ko.type='sine';kg.gain.setValueAtTime(0,t);kg.gain.linearRampToValueAtTime(vol*.62,t+.08);kg.gain.exponentialRampToValueAtTime(.001,t+kd*.7);
  ko.connect(kg);kg.connect(mg);ko.start(t);ko.stop(t+kd*.8);
  var so=ac.createOscillator(),sg=ac.createGain();so.frequency.value=sf;so.type='sine';
  sg.gain.setValueAtTime(0,t);sg.gain.linearRampToValueAtTime(vol*.45,t+.12);sg.gain.exponentialRampToValueAtTime(.001,t+kd*1.4);
  so.connect(sg);sg.connect(mg);so.start(t);so.stop(t+kd*1.5);
  var g=ac.createGain(),rg=ac.createGain();rg.gain.value=0.35;g.connect(mg);g.connect(rg);rg.connect(rv);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol*.72,t+.15);
  g.gain.setTargetAtTime(vol*.35,t+.15,.55);g.gain.setTargetAtTime(.001,t+2.0,1.1);
  [[123.47,.58,4.5],[61.74,.48,5.0],[30.87,.28,3.8]].forEach(function(f){
    var o=ac.createOscillator(),og=ac.createGain();og.gain.value=f[1];o.type='sine';o.frequency.value=f[0];o.connect(og);og.connect(g);o.start(t);o.stop(t+f[2]);
  });
}

// ── Pad with crossfade ────────────────────────────────────────────────
function fadeOutPad(dur){
  if(!currentPadGain)return;
  var t=ac.currentTime,fd=dur||gFade();
  currentPadGain.gain.cancelScheduledValues(t);
  currentPadGain.gain.setValueAtTime(currentPadGain.gain.value,t);
  currentPadGain.gain.linearRampToValueAtTime(0,t+fd);
  var oscs=currentPadOscs.slice();
  currentPadGain=null;currentPadOscs=[];
  setTimeout(function(){oscs.forEach(function(o){try{o.stop();}catch(e){}});},( fd+0.3)*1000);
}
function fadeOutNow(){ia();rs();fadeOutPad(gFade());}

function sPad(indices,vol,rvb,t){
  fadeOutPad(gFade());
  currentChordIdxs=indices; // update for rain layer
  var sus=gSus(),atk=Math.min(2.0,sus*0.25),padVol=vol*0.80;
  var masterG=ac.createGain(),rvbG=ac.createGain();
  rvbG.gain.value=rvb*0.88;masterG.connect(mg);masterG.connect(rvbG);rvbG.connect(rv);
  masterG.gain.setValueAtTime(0,t);masterG.gain.linearRampToValueAtTime(padVol,t+atk);
  masterG.gain.setTargetAtTime(padVol*0.8,t+atk,sus*0.3);
  masterG.gain.setTargetAtTime(0.001,t+atk+sus,sus*0.4);
  var oscs=[];
  indices.forEach(function(idx,i){
    var f=calFreqs[idx],detune=[-4,0,4,7][i%4];
    [[1,.52],[2.02,.26],[3.01,.09]].forEach(function(p){
      var o=ac.createOscillator(),og=ac.createGain();og.gain.value=p[1];o.type='sine';o.frequency.value=f*p[0];o.detune.value=detune;o.connect(og);og.connect(masterG);o.start(t);o.stop(t+atk+sus+gFade()+2);oscs.push(o);
    });
    var lfo=ac.createOscillator(),lfg=ac.createGain();lfo.type='sine';lfo.frequency.value=0.12+i*0.035;lfg.gain.value=0.055;lfo.connect(lfg);lfg.connect(masterG.gain);lfo.start(t);lfo.stop(t+atk+sus+gFade()+2);oscs.push(lfo);
  });
  currentPadGain=masterG;currentPadOscs=oscs;
}

function getChords(idx){
  if(chordMode==='harmonic')return CHORDS_HARMONIC[idx]||[idx];
  if(chordMode==='deep')return CHORDS_DEEP[idx]||[idx];
  return CHORDS_INTERVAL[idx]||[idx];
}

function play(idx){
  ia();rs();
  var f=calFreqs[idx],t=ac.currentTime,v=gV(),r=gR();
  if(tech==='open')sOpen(f,v,r,t);
  else if(tech==='strike')sStrike(f,v,r,t);
  else if(tech==='ding')sDing(f,v,r,t);
  else if(tech==='anti')sAnti(f,v,r,t);
  else{playChord(getChords(idx),v,r,t);}
  rpl(f);
}


// ── Microphone ────────────────────────────────────────────────────────
var mStr=null,mAn=null,mTb=null,mFb=null,mOn=false,lO=0,oH=[],FFT=8192;
var hEl=document.getElementById('heard'),mSt=document.getElementById('mic-status');
var silentUntil=0;
function toggleMic(){if(!mOn)startMic();else stopMic();}
function startMic(){
  ia();
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false})
  .then(function(s){mStr=s;var src=ac.createMediaStreamSource(s);mAn=ac.createAnalyser();mAn.fftSize=FFT;mAn.smoothingTimeConstant=0.5;src.connect(mAn);mTb=new Float32Array(FFT);mFb=new Float32Array(mAn.frequencyBinCount);mOn=true;document.getElementById('mic-btn').classList.add('on');mSt.textContent='on';mTick();})
  .catch(function(e){mSt.textContent='denied:'+e.name;});
}
function stopMic(){mOn=false;if(_mTid)clearTimeout(_mTid);_mTid=null;if(mStr)mStr.getTracks().forEach(function(t){t.stop();});document.getElementById('mic-btn').classList.remove('on');mSt.textContent='off';}
function gRMS(b){var s=0;for(var i=0;i<b.length;i++)s+=b[i]*b[i];return Math.sqrt(s/b.length);}
function dHPS(fd,sr){
  var bH=sr/FFT,bw=5;
  function bE(f){var b=Math.round(f/bH),e=0;for(var i=Math.max(0,b-bw);i<=Math.min(fd.length-1,b+bw);i++){var l=Math.pow(10,fd[i]/20);e+=l*l;}return Math.sqrt(e);}
  var best=-1,bs=-Infinity;
  calFreqs.forEach(function(f,i){var sc=bE(f)*Math.pow(bE(f*2),.6)*Math.pow(bE(f*3),.3)*Math.pow(bE(f*4),.1);if(sc>bs){bs=sc;best=i;}});
  return best;
}
function echo(idx){
  ia();rs();
  var silDur=Math.min((gSus()+gFade()+1.5)*1000,9000);
  silentUntil=Date.now()+silDur;
  playChord(getChords(idx),gV(),gR(),ac.currentTime+.06);
  mH(idx);hEl.textContent='← '+N[idx][0]+N[idx][1];setTimeout(function(){hEl.textContent='';},2500);
}
var _mTid=null;
function mTick(){
  if(!mOn||!mAn)return;
  if(ac&&ac.state==='suspended')ac.resume();
  mAn.getFloatTimeDomainData(mTb);var r=gRMS(mTb);
  oH.push(r);if(oH.length>8)oH.shift();
  var avg=oH.reduce(function(a,b){return a+b;},0)/oH.length;
  var now=Date.now();
  if(now>silentUntil){
    if(r>0.03&&r>avg*1.5&&now-lO>300){
      lO=now;
      setTimeout(function(){if(!mAn||!mOn||Date.now()<silentUntil)return;mAn.getFloatFrequencyData(mFb);var idx=dHPS(mFb,ac.sampleRate);if(idx>=0)echo(idx);},80);
    }
  }
  _mTid=setTimeout(mTick,22);
}
document.addEventListener('touchstart',function(){if(ac&&ac.state==='suspended')ac.resume();},{passive:true});
</script>
